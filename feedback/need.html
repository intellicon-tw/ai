    }

    }

      grid-template-rows: auto 1fr;
    }

      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .title-group {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
      font-weight: 760;
      letter-spacing: 0;
    }

    .subtitle {

      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .top-actions {

      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {

      background: var(--surface);
      color: var(--text);
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 7px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
      white-space: nowrap;
    }

    .button:hover {
      border-color: #b9c3cb;
      background: #f9fbfb;
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .button.primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
      min-height: 0;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: #fbfcfd;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .filters {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .field {
      position: relative;
    }

    .search {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 9px 11px;
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .search:focus,
    .select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 9px 11px;
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .count-line {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .list {
      overflow: auto;
      padding: 8px;
      min-height: 0;
    }

    .slot-group {
      padding: 6px 0 12px;
    }

    .slot-heading {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;

      margin: 0 0 4px;
      background: #fbfcfd;
      color: #334155;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-weight: 760;
      line-height: 1.4;

      padding: 11px 12px;

      cursor: pointer;
      color: var(--text);

    }

      font-weight: 700;

      font-weight: 700;

      justify-content: space-between;
      gap: 16px;

    .detail-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.35;
      letter-spacing: 0;
      word-break: break-word;
    }

      display: grid;

      gap: 8px;
    }

      padding: 9px 10px;
      background: #fbfcfd;
      min-width: 0;
    }

      font-size: 12px;
      margin-bottom: 4px;

    .meta-value {
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
    }

    .sections {

      gap: 12px;

    .section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 20px;

      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.35;
      letter-spacing: 0;
      color: #111827;
    }

      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
    }

    .empty {
      color: var(--muted);
      padding: 24px;
      text-align: center;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: #1f2933;
      color: white;
      padding: 10px 13px;
      border-radius: 7px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      font-size: 14px;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 920px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      }

      .sidebar {
        border-right: 0;

      }

      .content {
        padding: 16px;
      }

      .detail-title-row {
        flex-direction: column;
      }

      .meta-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .topbar {
        padding: 14px 16px;
      }

      .button {
        width: 100%;
      }

      .top-actions {
        width: 100%;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .detail-head,
      .section {
        padding: 16px;
      }
    }
  </style>

uency": "20次", "people": "11人", "input": "輸入多筆品號→即時輸出可用庫存和在途預計入庫日；若有因缺料尚未發單的工單，自動寄信通知生/物管PULL IN材料交期。\n追料流程：\n業務收到客戶詢問→要確認庫存和在途入庫日。\n登入 ERP和SFT→查詢現有庫存並人工計算可用庫存、在途現況、詢問生管/採購預計入庫日→回覆客戶", "output": "品號：13095-BMLE000\n現有庫存：0 EA\n未交貨數量：298 EA (並列出各客戶未交數量)\n未發單數量：180 EA\n在途數量：136 EA\n列出在製進度和預計交期\n在途工單：線切課-金屬磨床-A面*18 EA/預計入庫日/生管回覆的交期\n在途工單：金屬一-銑床-A面*80 EA/預計入庫日/生管回覆的交期\n(預計入庫日：依歷史製程自動計算後段製程所需時間)\n(生管回覆的交期：生管排程回覆的日期)", "logic": "輸入產品品號，AI整合各報表資訊，彙整產品現況和預計交期，協助業務判斷並回覆客戶。\n缺料產品自動寄信通知生管/物管需追蹤該品號。", "data": "1. BI-訂單工單資訊5_M\n2. SFT\n3. BI-即時各倉庫存量\n4. Order_2026xxxx", "markdown": "# 34. 輔助追料助手\n\n## 顧問日時段\nC · 10:10-11:30 業務+生物管\n\n## (輸入)希望 AI 處理的問題\n輸入多筆品號→即時輸出可用庫存和在途預計入庫日；若有因缺料尚未發單的工單，自動寄信通知生/物管PULL IN材料交期。\n追料流程：\n業務收到客戶詢問→要確認庫存和在途入庫日。\n登入 ERP和SFT→查詢現有庫存並人工計算可用庫存、在途現況、詢問生管/採購預計入庫日→回覆客戶\n\n## (輸出)預期輸出成果\n品號：13095-BMLE000\n現有庫存：0 EA\n未交貨數量：298 EA (並列出各客戶未交數量)\n未發單數量：180 EA\n在途數量：136 EA\n列出在製進度和預計交期\n在途工單：線切課-金屬磨床-A面*18 EA/預計入庫日/生管回覆的交期\n在途工單：金屬一-銑床-A面*80 EA/預計入庫日/生管回覆的交期\n(預計入庫日：依歷史製程自動計算後段製程所需時間)\n(生管回覆的交期：生管排程回覆的日期)\n\n## 任務步驟或處理邏輯\n輸入產品品號，AI整合各報表資訊，彙整產品現況和預計交期，協助業務判斷並回覆客戶。\n缺料產品自動寄信通知生管/物管需追蹤該品號。\n\n## 資料\n1. BI-訂單工單資訊5_M\n2. SFT\n3. BI-即時各倉庫存量\n4. Order_2026xxxx\n\n## 其他資訊\n- 部門：業務部\n- 人員：蔡旻芳\n- 每次執行耗費時間：20分鐘\n- 每月執行頻率：20次\n- 有需求的人數：11人"}, {"id": 35, "title": "自助排貨系統", "slotCode": "C", "slotText": "C · 10:10-11:30 業務+生物管", "slotTitle": "C 業務+生物管", "slotTime": "10:10-11:30", "slotSummary": "15 題", "slotOrder": 1, "agendaOrder": 31, "agendaGroup": "#35", "department": "業務部", "owner": "李宜婷", "time": "40分鐘", "frequency": "20次", "people": "11人", "input": "依照系統預交日自動排貨，讓AI計算出當月份需出貨筆數及預估營收。\n若有共用品號，則按照訂單預交日平均分配", "output": "依照AI轉出的排貨表，由秘書篩選出當周需出貨筆數，再轉拋至ERP產生出貨單據(銷貨單or出通單)", "logic": "利用品號去統整出貨明細，減少助理排貨時間。\n無庫存部分可同時追蹤WIP進度。", "data": "ERP預交日須即時維護(建議每周1次)", "markdown": "# 35. 自助排貨系統\n\n## 顧問日時段\nC · 10:10-11:30 業務+生物管\n\n## (輸入)希望 AI 處理的問題\n依照系統預交日自動排貨，讓AI計算出當月份需出貨筆數及預估營收。\n若有共用品號，則按照訂單預交日平均分配\n\n## (輸出)預期輸出成果\n依照AI轉出的排貨表，由秘書篩選出當周需出貨筆數，再轉拋至ERP產生出貨單據(銷貨單or出通單)\n\n## 任務步驟或處理邏輯\n利用品號去統整出貨明細，減少助理排貨時間。\n無庫存部分可同時追蹤WIP進度。\n\n## 資料\nERP預交日須即時維護(建議每周1次)\n\n## 其他資訊\n- 部門：業務部\n- 人員：李宜婷\n- 每次執行耗費時間：40分鐘\n- 每月執行頻率：20次\n- 有需求的人數：11人"}, {"id": 36, "title": "交期回覆幫手", "slotCode": "C", "slotText": "C · 10:10-11:30 業務+生物管", "slotTitle": "C 業務+生物管", "slotTime": "10:10-11:30", "slotSummary": "15 題", "slotOrder": 1, "agendaOrder": 32, "agendaGroup": "#36", "department": "業務部", "owner": "王思敏", "time": "至少1HR", "frequency": "每天", "people": "11人", "input": "客戶自行輸入訂單資料，讓AI自動回覆目前ERP最新的交期。(在公司網頁設置AI小幫手)\n助理僅需維護特定欄位，或是利用公式維護資料。", "output": "(1)客戶輸入特定訂單資料後(訂單單號/序號/品號…)，AI至ERP內的特定欄位，帶出該訂單產品的最新交期、未交數量…等資訊，並自動回覆客戶。 (2)為確保安全性，客戶端可能需要有自己專屬的帳號密碼。", "logic": "先建立一個專門的小程式，並且提供資料欄位(單號/序號/品號...)給客戶填寫。\nAI到ERP訂單帶出 交期、未交數量的資料，並回覆給客戶。", "data": "ERP訂單資料、開發程式。", "markdown": "# 36. 交期回覆幫手\n\n## 顧問日時段\nC · 10:10-11:30 業務+生物管\n\n## (輸入)希望 AI 處理的問題\n客戶自行輸入訂單資料，讓AI自動回覆目前ERP最新的交期。(在公司網頁設置AI小幫手)\n助理僅需維護特定欄位，或是利用公式維護資料。\n\n## (輸出)預期輸出成果\n(1)客戶輸入特定訂單資料後(訂單單號/序號/品號…)，AI至ERP內的特定欄位，帶出該訂單產品的最新交期、未交數量…等資訊，並自動回覆客戶。 (2)為確保安全性，客戶端可能需要有自己專屬的帳號密碼。\n\n## 任務步驟或處理邏輯\n先建立一個專門的小程式，並且提供資料欄位(單號/序號/品號...)給客戶填寫。\nAI到ERP訂單帶出 交期、未交數量的資料，並回覆給客戶。\n\n## 資料\nERP訂單資料、開發程式。\n\n## 其他資訊\n- 部門：業務部\n- 人員：王思敏\n- 每次執行耗費時間：至少1HR\n- 每月執行頻率：每天\n- 有需求的人數：11人"}, {"id": 37, "title": "採購報表更新及判斷多廠區分貨", "slotCode": "C", "slotText": "C · 10:10-11:30 業務+生物管", "slotTitle": "C 業務+生物管", "slotTime": "10:10-11:30", "slotSummary": "15 題", "slotOrder": 1, "agendaOrder": 33, "agendaGroup": "#37", "department": "業務部", "owner": "王偲懿", "time": "1.5小時", "frequency": "20次", "people": "11人", "input": "因目前AMAT集團不同廠區/不同採購/訂單或寄庫會有不同格式的報表，希望AI依照平常信件往來&客戶需求日&寄庫水位自動配貨及回填客戶報表，與此同時，將無法滿足客戶需求的料件同步警示給廠內及業務&業助", "output": "將配貨結果自動回填各採購報表並擬好信件草稿，業助只需核對並回信給客戶，針對無法滿足客戶需求的產品可以提前向廠內追料", "logic": "AI紀錄平常與客戶的信件往來以及答應過的交期，依照先進先出的大原則(同一個採購的訂單交貨順序可以依照需求日調換)，以及將我們的產出依照寄庫水位&訂單的需求時間配貨，回填至符合各採購不同需求格式的報表，經過分配依然無法滿足客戶需求的產品，示警給廠內&業務業助執行追料", "data": "客戶端各個採購的交期格式", "markdown": "# 37. 採購報表更新及判斷多廠區分貨\n\n## 顧問日時段\nC · 10:10-11:30 業務+生物管\n\n## (輸入)希望 AI 處理的問題\n因目前AMAT集團不同廠區/不同採購/訂單或寄庫會有不同格式的報表，希望AI依照平常信件往來&客戶需求日&寄庫水位自動配貨及回填客戶報表，與此同時，將無法滿足客戶需求的料件同步警示給廠內及業務&業助\n\n## (輸出)預期輸出成果\n將配貨結果自動回填各採購報表並擬好信件草稿，業助只需核對並回信給客戶，針對無法滿足客戶需求的產品可以提前向廠內追料\n\n## 任務步驟或處理邏輯\nAI紀錄平常與客戶的信件往來以及答應過的交期，依照先進先出的大原則(同一個採購的訂單交貨順序可以依照需求日調換)，以及將我們的產出依照寄庫水位&訂單的需求時間配貨，回填至符合各採購不同需求格式的報表，經過分配依然無法滿足客戶需求的產品，示警給廠內&業務業助執行追料\n\n## 資料\n客戶端各個採購的交期格式\n\n## 其他資訊\n- 部門：業務部\n- 人員：王偲懿\n- 每次執行耗費時間：1.5小時\n- 每月執行頻率：20次\n- 有需求的人數：11人"}, {"id": 39, "title": "PLM-新建品號和ECR簽核追蹤", "slotCode": "C", "slotText": "C · 10:10-11:30 業務+生物管", "slotTitle": "C 業務+生物管", "slotTime": "10:10-11:30", "slotSummary": "15 題", "slotOrder": 1, "agendaOrder": 35, "agendaGroup": "#39", "department": "業務部", "owner": "傅瓊瑩", "time": "10分鐘", "frequency": "每天", "people": "20", "input": "1. 輸入多筆品號讓AI產出簽核流程現況\n(未輸入品號時可查詢全部未簽核的狀態)\n2. 異常提醒和自動催簽", "output": "1. 電子看板包含 :\n品號：xxxxx-xxxxxxx\n狀態：待簽核 / 卡關部門：業務部\n待簽核人員：王小明\n已停留天數：3天\n2. 自動催簽(填入急件理由)→已待簽 3 天，請協助確認。", "logic": "1. 輸入多筆品號→AI自動查詢各部門簽核狀態→整理成現況報告。\n2. 異常提醒觸發條件：超時未簽/退件/流程異常\n自動催簽觸發條件：勾選&填寫急件理由", "data": "PLM", "markdown": "# 39. PLM-新建品號和ECR簽核追蹤\n\n## 顧問日時段\nC · 10:10-11:30 業務+生物管\n\n## (輸入)希望 AI 處理的問題\n1. 輸入多筆品號讓AI產出簽核流程現況\n(未輸入品號時可查詢全部未簽核的狀態)\n2. 異常提醒和自動催簽\n\n## (輸出)預期輸出成果\n1. 電子看板包含 :\n品號：xxxxx-xxxxxxx\n狀態：待簽核 / 卡關部門：業務部\n待簽核人員：王小明\n已停留天數：3天\n2. 自動催簽(填入急件理由)→已待簽 3 天，請協助確認。\n\n## 任務步驟或處理邏輯\n1. 輸入多筆品號→AI自動查詢各部門簽核狀態→整理成現況報告。\n2. 異常提醒觸發條件：超時未簽/退件/流程異常\n自動催簽觸發條件：勾選&填寫急件理由\n\n## 資料\nPLM\n\n## 其他資訊\n- 部門：業務部\n- 人員：傅瓊瑩\n- 每次執行耗費時間：10分鐘\n- 每月執行頻率：每天\n- 有需求的人數：20"}, {"id": 40, "title": "PLM系統操作 / -新建品號 / -ECR申請", "slotCode": "C", "slotText": "C · 10:10-11:30 業務+生物管", "slotTitle": "C 業務+生物管", "slotTime": "10:10-11:30", "slotSummary": "15 題", "slotOrder": 1, "agendaOrder": 36, "agendaGroup": "#40", "department": "業務部", "owner": "王雅芝", "time": "5-15分鐘", "frequency": "100-200次", "people": "2", "input": "1.初步審核申請人的表格是否正確\n2.依照圖面請AI辨別是否有相似產品及差異點(確認是否真的需要新增)", "output": "1.若有提供圖面比對現有品號圖面資料庫,確認是否有類似產品,是否尺寸公差相近\n2.檢查提供的圖面資訊是否和申請表一致(品名、規格、材質)\n3.檢查品名、規格、貨號是否有透漏原廠設備資訊\n4.若有欄位未填寫或是有誤,由AI先反饋給申請人修改,非DCC一筆一筆人工比對", "logic": "依照申請人提供的excel及上傳的圖面,逐筆確認必要欄位的正確性", "data": "新品號申請表\nECR申請表\nPLM網址", "markdown": "# 40. PLM系統操作 / -新建品號 / -ECR申請\n\n## 顧問日時段\nC · 10:10-11:30 業務+生物管\n\n## (輸入)希望 AI 處理的問題\n1.初步審核申請人的表格是否正確\n2.依照圖面請AI辨別是否有相似產品及差異點(確認是否真的需要新增)\n\n## (輸出)預期輸出成果\n1.若有提供圖面比對現有品號圖面資料庫,確認是否有類似產品,是否尺寸公差相近\n2.檢查提供的圖面資訊是否和申請表一致(品名、規格、材質)\n3.檢查品名、規格、貨號是否有透漏原廠設備資訊\n4.若有欄位未填寫或是有誤,由AI先反饋給申請人修改,非DCC一筆一筆人工比對\n\n## 任務步驟或處理邏輯\n依照申請人提供的excel及上傳的圖面,逐筆確認必要欄位的正確性\n\n## 資料\n新品號申請表\nECR申請表\nPLM網址\n\n## 其他資訊\n- 部門：業務部\n- 人員：王雅芝\n- 每次執行耗費時間：5-15分鐘\n- 每月執行頻率：100-200次\n- 有需求的人數：2"}, {"id": 43, "title": "執行ECR/N", "slotCode": "C", "slotText": "C · 10:10-11:30 業務+生物管", "slotTitle": "C 業務+生物管", "slotTime": "10:10-11:30", "slotSummary": "15 題", "slotOrder": 1, "agendaOrder": 39, "agendaGroup": "#43", "department": "生/物管部", "owner": "彭明威", "time": "0.5H", "frequency": "60~100筆", "people": "3", "input": "1. 核對ECR變更內容與PLM、圖面、EEP三方間的差異性\n2. 於PLM中執行ECR發起變更通知\n3. 於PLM中執行ECN變更, 完成後自動檢查ERP變更後內容\n4. 編寫ECN後通知mail", "output": "1. 三方比對資訊供人員檢查\n2. 完成ECR變更通知至簽核前檢查步驟\n3. 依照ECR變更通知內容執行PLM實際變更\n4. 依照範例填入當次變更事項mail", "logic": "1. 數據檢索: a. ECR變更項目\nb. 新版圖面內資訊比對(如工程已將圖面進版, 則圖面檔在ECR內可查閱)\nc. PLM現行版次該品號相關資訊\nd. 進入 ERP 查找料號相關資訊, 及在庫、在途訂單、工單、採購單數量\n2. 關聯檢查: 自動確認是否關聯圖面、途程、MIP 自主檢查表, 若有缺失, 須在比對畫面上標記警告\n3. 系統變更: 更新 PLM 內的品名、規格、BOM 內容\na. 自動檢核更新內容是否符合編碼原則 (料號申請SOP.doc)\nb. 自動將變更後的品名、規格、BOM 內容填入 PLM 指定暫存欄位，並由人員（物管）執行最終確認後一鍵寫入\n4. Mail 發布: 依標準範本自動彙整變更項、物管意見與 ERP 畫面生成 Mail 草稿，待確認後寄出", "data": "1. PLM首頁(待辦任務頁面)\nhttp://plm.feedback.com.tw/Windchill/app/#ptc1/homepage\n2. ERP-庫存狀況查詢作業\n3. ERP-品號資料建立作業MCP\n4. ERP-BOM用量資料建立作業", "markdown": "# 43. 執行ECR/N\n\n## 顧問日時段\nC · 10:10-11:30 業務+生物管\n\n## (輸入)希望 AI 處理的問題\n1. 核對ECR變更內容與PLM、圖面、EEP三方間的差異性\n2. 於PLM中執行ECR發起變更通知\n3. 於PLM中執行ECN變更, 完成後自動檢查ERP變更後內容\n4. 編寫ECN後通知mail\n\n## (輸出)預期輸出成果\n1. 三方比對資訊供人員檢查\n2. 完成ECR變更通知至簽核前檢查步驟\n3. 依照ECR變更通知內容執行PLM實際變更\n4. 依照範例填入當次變更事項mail\n\n## 任務步驟或處理邏輯\n1. 數據檢索: a. ECR變更項目\nb. 新版圖面內資訊比對(如工程已將圖面進版, 則圖面檔在ECR內可查閱)\nc. PLM現行版次該品號相關資訊\nd. 進入 ERP 查找料號相關資訊, 及在庫、在途訂單、工單、採購單數量\n2. 關聯檢查: 自動確認是否關聯圖面、途程、MIP 自主檢查表, 若有缺失, 須在比對畫面上標記警告\n3. 系統變更: 更新 PLM 內的品名、規格、BOM 內容\na. 自動檢核更新內容是否符合編碼原則 (料號申請SOP.doc)\nb. 自動將變更後的品名、規格、BOM 內容填入 PLM 指定暫存欄位，並由人員（物管）執行最終確認後一鍵寫入\n4. Mail 發布: 依標準範本自動彙整變更項、物管意見與 ERP 畫面生成 Mail 草稿，待確認後寄出\n\n## 資料\n1. PLM首頁(待辦任務頁面)\nhttp://plm.feedback.com.tw/Windchill/app/#ptc1/homepage\n2. ERP-庫存狀況查詢作業\n3. ERP-品號資料建立作業MCP\n4. ERP-BOM用量資料建立作業\n\n## 其他資訊\n- 部門：生/物管部\n- 人員：彭明威\n- 每次執行耗費時間：0.5H\n- 每月執行頻率：60~100筆\n- 有需求的人數：3"}, {"id": 44, "title": "市購標準件詢價", "slotCode": "C", "slotText": "C · 10:10-11:30 業務+生物管", "slotTitle": "C 業務+生物管", "slotTime": "10:10-11:30", "slotSummary": "15 題", "slotOrder": 1, "agendaOrder": 40, "agendaGroup": "#44", "department": "採購部", "owner": "吳予茿", "time": "1~2HR", "frequency": "10次", "people": "1人", "input": "客人BOM表", "output": "EXCEL報價表", "logic": "根據客人BOM表辨識規格，對照廠內料號，依近一年歷史進價報價，針對未曾詢價過的料號，搜尋該原廠網站並發出詢價EMAIL或於該公司網站留下詢價資訊，收到報價後，EMAIL收到報價後，整理成EXCEL表並發出給詢價人員", "data": "未提供", "markdown": "# 44. 市購標準件詢價\n\n## 顧問日時段\nC · 10:10-11:30 業務+生物管\n\n## (輸入)希望 AI 處理的問題\n客人BOM表\n\n## (輸出)預期輸出成果\nEXCEL報價表\n\n## 任務步驟或處理邏輯\n根據客人BOM表辨識規格，對照廠內料號，依近一年歷史進價報價，針對未曾詢價過的料號，搜尋該原廠網站並發出詢價EMAIL或於該公司網站留下詢價資訊，收到報價後，EMAIL收到報價後，整理成EXCEL表並發出給詢價人員\n\n## 資料\n未提供\n\n## 其他資訊\n- 部門：採購部\n- 人員：吳予茿\n- 每次執行耗費時間：1~2HR\n- 每月執行頻率：10次\n- 有需求的人數：1人"}, {"id": 46, "title": "月底委外廠商請款移轉單明細比對", "slotCode": "C", "slotText": "C · 10:10-11:30 業務+生物管", "slotTitle": "C 業務+生物管", "slotTime": "10:10-11:30", "slotSummary": "15 題", "slotOrder": 1, "agendaOrder": 42, "agendaGroup": "#46", "department": "生/物管部", "owner": "鄭佳儀", "time": "3分鐘/筆", "frequency": "1次，比對筆數達400筆以上", "people": "5", "input": "依照提供的檔案，比對系統移轉單實際維護金額與預計給廠商請款的金額是否有相異處，及是否有遺漏未登記在委外報表內的移轉單", "output": "提供相異處，減少交叉比對的時間", "logic": "1.開啟「委外報表」→尋找該請款廠商\n2.開啟「委外加工異常表」確認該請款廠商的加工金額是否同「委外報表」中的加工金額一樣\n3.確認「委外加工異常表」中是否有遺漏未維護在「委外報表」內的移轉單號，將其維護回去", "data": "1.委外報表\n2.委外加工異常表\n3.預計提供給AI，供其辨識的整理報表「請款金額比對報表格式_資料提供」", "markdown": "# 46. 月底委外廠商請款移轉單明細比對\n\n## 顧問日時段\nC · 10:10-11:30 業務+生物管\n\n## (輸入)希望 AI 處理的問題\n依照提供的檔案，比對系統移轉單實際維護金額與預計給廠商請款的金額是否有相異處，及是否有遺漏未登記在委外報表內的移轉單\n\n## (輸出)預期輸出成果\n提供相異處，減少交叉比對的時間\n\n## 任務步驟或處理邏輯\n1.開啟「委外報表」→尋找該請款廠商\n2.開啟「委外加工異常表」確認該請款廠商的加工金額是否同「委外報表」中的加工金額一樣\n3.確認「委外加工異常表」中是否有遺漏未維護在「委外報表」內的移轉單號，將其維護回去\n\n## 資料\n1.委外報表\n2.委外加工異常表\n3.預計提供給AI，供其辨識的整理報表「請款金額比對報表格式_資料提供」\n\n## 其他資訊\n- 部門：生/物管部\n- 人員：鄭佳儀\n- 每次執行耗費時間：3分鐘/筆\n- 每月執行頻率：1次，比對筆數達400筆以上\n- 有需求的人數：5"}, {"id": 47, "title": "採購件進貨品項查詢其對應使用的產品", "slotCode": "C", "slotText": "C · 10:10-11:30 業務+生物管", "slotTitle": "C 業務+生物管", "slotTime": "10:10-11:30", "slotSummary": "15 題", "slotOrder": 1, "agendaOrder": 43, "agendaGroup": "#47", "department": "生/物管部", "owner": "鄭佳儀", "time": "10分鐘", "frequency": "工作日上午+下午進貨", "people": "5", "input": "依照提供的檔案，一次查詢ERP*庫存作業中的未來異動量", "output": "原先採購件逐筆查詢未來異動量，轉為一次查詢", "logic": "1.開啟「待檢驗進貨明細」\n2.複製採購件品號\n3.鼎新ERP系統→庫存管理系統→*庫存狀況查詢作業\n4.查詢該採購件品號\n5.點選未來異動量\n6.將「客戶供料是否納入預計/計劃領用計算」、「增列未確認的預計異動數量」的勾勾打勾\n7.開始查詢", "data": "1.待檢驗進貨明細4點30分_35_1893322118693401128\n2.鼎新ERP系統→庫存管理系統→*庫存狀況查詢作業", "markdown": "# 47. 採購件進貨品項查詢其對應使用的產品\n\n## 顧問日時段\nC · 10:10-11:30 業務+生物管\n\n## (輸入)希望 AI 處理的問題\n依照提供的檔案，一次查詢ERP*庫存作業中的未來異動量\n\n## (輸出)預期輸出成果\n原先採購件逐筆查詢未來異動量，轉為一次查詢\n\n## 任務步驟或處理邏輯\n1.開啟「待檢驗進貨明細」\n2.複製採購件品號\n3.鼎新ERP系統→庫存管理系統→*庫存狀況查詢作業\n4.查詢該採購件品號\n5.點選未來異動量\n6.將「客戶供料是否納入預計/計劃領用計算」、「增列未確認的預計異動數量」的勾勾打勾\n7.開始查詢\n\n## 資料\n1.待檢驗進貨明細4點30分_35_1893322118693401128\n2.鼎新ERP系統→庫存管理系統→*庫存狀況查詢作業\n\n## 其他資訊\n- 部門：生/物管部\n- 人員：鄭佳儀\n- 每次執行耗費時間：10分鐘\n- 每月執行頻率：工作日上午+下午進貨\n- 有需求的人數：5"}, {"id": 48, "title": "出貨日將至預警追件", "slotCode": "C", "slotText": "C · 10:10-11:30 業務+生物管", "slotTitle": "C 業務+生物管", "slotTime": "10:10-11:30", "slotSummary": "15 題", "slotOrder": 1, "agendaOrder": 44, "agendaGroup": "#48", "department": "生/物管部", "owner": "鄭佳儀", "time": "不一定", "frequency": "每個工作日", "people": "5", "input": "依照我們提供的客戶簡稱、指定日期區間(例如:2026/6/1~2026/6/15)，撈出訂單報表內的出貨日符合日期區間內，尚未入庫存的產品預警(需扣除在庫庫存)，並產出一份其產品由工序最大遞減排序的工單，包含其工單是否有尚未領用的材料品號(需確認其未領用的材料品號是否有庫存)的報表", "output": "依照產出的報表，快速得知該客戶目前交期將至但尚未完工的產品列表", "logic": "1.開啟「訂單報表」\n2.開啟篩選→填入「客戶簡稱」\n3.逐筆確認個產品的出貨日，使否庫存已滿足此出貨日的產品訂單數量\n4.若還有在線上加工的，查詢下一支「WIP」報表\n5.開啟篩選→填入品號→列出需請製造安排加工的製令排序\n6.查詢該製令是否有未領用的材料(鼎新ERP→製令/託外管理系統→*製造命令建立作業MCP)\n7.如有尚未到廠的材料/半成品/採購件，請物管確認到料時間/請製造加工半成品/請採購確認到料時間", "data": "1.訂單報表\n2.WIP報表\n3.鼎新ERP→製令/託外管理系統→*製造命令建立作業MCP\n4.鼎新ERP系統→庫存管理系統→*庫存狀況查詢作業", "markdown": "# 48. 出貨日將至預警追件\n\n## 顧問日時段\nC · 10:10-11:30 業務+生物管\n\n## (輸入)希望 AI 處理的問題\n依照我們提供的客戶簡稱、指定日期區間(例如:2026/6/1~2026/6/15)，撈出訂單報表內的出貨日符合日期區間內，尚未入庫存的產品預警(需扣除在庫庫存)，並產出一份其產品由工序最大遞減排序的工單，包含其工單是否有尚未領用的材料品號(需確認其未領用的材料品號是否有庫存)的報表\n\n## (輸出)預期輸出成果\n依照產出的報表，快速得知該客戶目前交期將至但尚未完工的產品列表\n\n## 任務步驟或處理邏輯\n1.開啟「訂單報表」\n2.開啟篩選→填入「客戶簡稱」\n3.逐筆確認個產品的出貨日，使否庫存已滿足此出貨日的產品訂單數量\n4.若還有在線上加工的，查詢下一支「WIP」報表\n5.開啟篩選→填入品號→列出需請製造安排加工的製令排序\n6.查詢該製令是否有未領用的材料(鼎新ERP→製令/託外管理系統→*製造命令建立作業MCP)\n7.如有尚未到廠的材料/半成品/採購件，請物管確認到料時間/請製造加工半成品/請採購確認到料時間\n\n## 資料\n1.訂單報表\n2.WIP報表\n3.鼎新ERP→製令/託外管理系統→*製造命令建立作業MCP\n4.鼎新ERP系統→庫存管理系統→*庫存狀況查詢作業\n\n## 其他資訊\n- 部門：生/物管部\n- 人員：鄭佳儀\n- 每次執行耗費時間：不一定\n- 每月執行頻率：每個工作日\n- 有需求的人數：5"}, {"id": 14, "title": "合約對比", "slotCode": "B", "slotText": "B · 11:30-12:00 合約比對", "slotTitle": "B 合約比對", "slotTime": "11:30-12:00", "slotSummary": "2 題", "slotOrder": 2, "agendaOrder": 13, "agendaGroup": "#14_17", "department": "廠務部", "owner": "廖雅茹", "time": "60", "frequency": "依實際需求", "people": "7", "input": "將廠商提供的合約或保養合約等.能夠與去年合約做對比並提出異處", "output": "協助提供:\n1. 相異處\n2. 建議如何改善", "logic": "匯入廠商提供合約→確認合約內容→標示合約異常或修改處", "data": "1.年度純水系統保養合約\n2.年度空壓系統保養合約\n3.年度冰水系統保養合約", "markdown": "# 14. 合約對比\n\n## 顧問日時段\nB · 11:30-12:00 合約比對\n\n## (輸入)希望 AI 處理的問題\n將廠商提供的合約或保養合約等.能夠與去年合約做對比並提出異處\n\n## (輸出)預期輸出成果\n協助提供:\n1. 相異處\n2. 建議如何改善\n\n## 任務步驟或處理邏輯\n匯入廠商提供合約→確認合約內容→標示合約異常或修改處\n\n## 資料\n1.年度純水系統保養合約\n2.年度空壓系統保養合約\n3.年度冰水系統保養合約\n\n## 其他資訊\n- 部門：廠務部\n- 人員：廖雅茹\n- 每次執行耗費時間：60\n- 每月執行頻率：依實際需求\n- 有需求的人數：7"}, {"id": 17, "title": "合約對比", "slotCode": "B", "slotText": "B · 11:30-12:00 合約比對", "slotTitle": "B 合約比對", "slotTime": "11:30-12:00", "slotSummary": "2 題", "slotOrder": 2, "agendaOrder": 13, "agendaGroup": "#14_17", "department": "業務部", "owner": "林珠英", "time": "3小時", "frequency": "不 一定", "people": "5", "input": "將客戶提供的合約如NDA, 採購合約, 寄庫合約, 備料合約等等.能夠與市面上同類型公司的相似合約做對比並提出建議", "output": "協助提供:\n1. 相異處\n2. 建議如何改善\n3. 有無風險", "logic": "未提供", "data": "20250604 FEEDBA-IND-0060028.docx", "markdown": "# 17. 合約對比\n\n## 顧問日時段\nB · 11:30-12:00 合約比對\n\n## (輸入)希望 AI 處理的問題\n將客戶提供的合約如NDA, 採購合約, 寄庫合約, 備料合約等等.能夠與市面上同類型公司的相似合約做對比並提出建議\n\n## (輸出)預期輸出成果\n協助提供:\n1. 相異處\n2. 建議如何改善\n3. 有無風險\n\n## 任務步驟或處理邏輯\n未提供\n\n## 資料\n20250604 FEEDBA-IND-0060028.docx\n\n## 其他資訊\n- 部門：業務部\n- 人員：林珠英\n- 每次執行耗費時間：3小時\n- 每月執行頻率：不 一定\n- 有需求的人數：5"}, {"id": 15, "title": "合約審核助手", "slotCode": "B", "slotText": "B · 11:30-12:00 合約比對", "slotTitle": "B 合約比對", "slotTime": "11:30-12:00", "slotSummary": "2 題", "slotOrder": 2, "agendaOrder": 14, "agendaGroup": "#15", "department": "光能事業部", "owner": "陳琇琳", "time": "5小時", "frequency": "不一定", "people": "5", "input": "1.合約交期、履約特殊要求提醒(如TAF、熱處理…等)\n2.藍圖版次比對", "output": "1.預交日前1週~1個月警示提醒(依合約執行要求而定)\n2.依採購項次提醒須含製程，以及需求時間\n3.確認已承製過以及目前是否有在製；以及零配件屬性與要求", "logic": "1.依照合約內容建立schedule\n2.依schedule提醒各製程進度\n3.搭配schedule篩選在製與否產品之藍圖版次。", "data": "依現行客戶資安要求，合約需嚴格保密，無法上拋，僅能以人工建立資料", "markdown": "# 15. 合約審核助手\n\n## 顧問日時段\nB · 11:30-12:00 合約比對\n\n## (輸入)希望 AI 處理的問題\n1.合約交期、履約特殊要求提醒(如TAF、熱處理…等)\n2.藍圖版次比對\n\n## (輸出)預期輸出成果\n1.預交日前1週~1個月警示提醒(依合約執行要求而定)\n2.依採購項次提醒須含製程，以及需求時間\n3.確認已承製過以及目前是否有在製；以及零配件屬性與要求\n\n## 任務步驟或處理邏輯\n1.依照合約內容建立schedule\n2.依schedule提醒各製程進度\n3.搭配schedule篩選在製與否產品之藍圖版次。\n\n## 資料\n依現行客戶資安要求，合約需嚴格保密，無法上拋，僅能以人工建立資料\n\n## 其他資訊\n- 部門：光能事業部\n- 人員：陳琇琳\n- 每次執行耗費時間：5小時\n- 每月執行頻率：不一定\n- 有需求的人數：5"}, {"id": 38, "title": "AI圖面差異比對+庫存/在途確認", "slotCode": "D", "slotText": "D · 13:00-14:00 圖面辨識", "slotTitle": "D 圖面辨識", "slotTime": "13:00-14:00", "slotSummary": "8 題", "slotOrder": 3, "agendaOrder": 34, "agendaGroup": "#38", "department": "業務部", "owner": "詹翊佳", "time": "10分鐘", "frequency": "客戶 / 通知", "people": "11人", "input": "將客戶圖面上傳，自動疊合兩張圖檔比對差異", "output": "自動產出差異報告，AI生成差異清單和標註圖；\n確認廠內是否有在途與庫存", "logic": "將客戶圖面上傳，自動疊合兩張圖檔(如PDF、CAD或照片)，標示出新舊版本的差異。\nAI自動查詢庫存和在途，供業務判斷是否需要同時進版", "data": "1. 客戶圖面\n2. 翔名品號資訊(品號、品名、規格)\n3. 即時各倉庫存量\n4. SFT", "markdown": "# 38. AI圖面差異比對+庫存/在途確認\n\n## 顧問日時段\nD · 13:00-14:00 圖面辨識\n\n## (輸入)希望 AI 處理的問題\n將客戶圖面上傳，自動疊合兩張圖檔比對差異\n\n## (輸出)預期輸出成果\n自動產出差異報告，AI生成差異清單和標註圖；\n確認廠內是否有在途與庫存\n\n## 任務步驟或處理邏輯\n將客戶圖面上傳，自動疊合兩張圖檔(如PDF、CAD或照片)，標示出新舊版本的差異。\nAI自動查詢庫存和在途，供業務判斷是否需要同時進版\n\n## 資料\n1. 客戶圖面\n2. 翔名品號資訊(品號、品名、規格)\n3. 即時各倉庫存量\n4. SFT\n\n## 其他資訊\n- 部門：業務部\n- 人員：詹翊佳\n- 每次執行耗費時間：10分鐘\n- 每月執行頻率：客戶 / 通知\n- 有需求的人數：11人"}, {"id": 52, "title": "通知進版MAIL小助手", "slotCode": "D", "slotText": "D · 13:00-14:00 圖面辨識", "slotTitle": "D 圖面辨識", "slotTime": "13:00-14:00", "slotSummary": "8 題", "slotOrder": 3, "agendaOrder": 48, "agendaGroup": "#52", "department": "機構設計課", "owner": "葉于萱", "time": "3分鐘", "frequency": "30次/人", "people": "10", "input": "自動抓產品小圖\n自動截圖最新版次履歷\n自動生成通知進版MAIL", "output": "匯入圖面>生成通知進版MAIL", "logic": "1.匯入圖面(PDF檔)\n2.截圖小圖、截圖該料號最新版次履歷\n3.生成通知進版MAIL", "data": "1.通知進版MAIL格式", "markdown": "# 52. 通知進版MAIL小助手\n\n## 顧問日時段\nD · 13:00-14:00 圖面辨識\n\n## (輸入)希望 AI 處理的問題\n自動抓產品小圖\n自動截圖最新版次履歷\n自動生成通知進版MAIL\n\n## (輸出)預期輸出成果\n匯入圖面>生成通知進版MAIL\n\n## 任務步驟或處理邏輯\n1.匯入圖面(PDF檔)\n2.截圖小圖、截圖該料號最新版次履歷\n3.生成通知進版MAIL\n\n## 資料\n1.通知進版MAIL格式\n\n## 其他資訊\n- 部門：機構設計課\n- 人員：葉于萱\n- 每次執行耗費時間：3分鐘\n- 每月執行頻率：30次/人\n- 有需求的人數：10"}, {"id": 61, "title": "圖面 Critical Dimension -> 轉廠內 MIP/QC Execl + 尺寸量測 Methods 判斷", "slotCode": "D", "slotText": "D · 13:00-14:00 圖面辨識", "slotTitle": "D 圖面辨識", "slotTime": "13:00-14:00", "slotSummary": "8 題", "slotOrder": 3, "agendaOrder": 57, "agendaGroup": "#61", "department": "技術開發部", "owner": "陳威志", "time": "15 min", "frequency": "50次/人", "people": "8", "input": "1. Excel 讀寫、語意及內容判定\n2. GD&T、單位判定\n3. 自動化 Pipeline", "output": "input 表格 or 截圖，得到已完成編輯的廠內 MIP/QC Excel", "logic": "如附件", "data": "Agent (harness) 已建置完成，專案庫:\nhttps://github.com/zhichen-v/GDT-Extraction-FB", "markdown": "# 61. 圖面 Critical Dimension -> 轉廠內 MIP/QC Execl + 尺寸量測 Methods 判斷\n\n## 顧問日時段\nD · 13:00-14:00 圖面辨識\n\n## (輸入)希望 AI 處理的問題\n1. Excel 讀寫、語意及內容判定\n2. GD&T、單位判定\n3. 自動化 Pipeline\n\n## (輸出)預期輸出成果\ninput 表格 or 截圖，得到已完成編輯的廠內 MIP/QC Excel\n\n## 任務步驟或處理邏輯\n如附件\n\n## 資料\nAgent (harness) 已建置完成，專案庫:\nhttps://github.com/zhichen-v/GDT-Extraction-FB\n\n## 其他資訊\n- 部門：技術開發部\n- 人員：陳威志\n- 每次執行耗費時間：15 min\n- 每月執行頻率：50次/人\n- 有需求的人數：8"}, {"id": 62, "title": "原廠 2D drawing / 3D step file -> 轉廠內 Template 2D drawing", "slotCode": "D", "slotText": "D · 13:00-14:00 圖面辨識", "slotTitle": "D 圖面辨識", "slotTime": "13:00-14:00", "slotSummary": "8 題", "slotOrder": 3, "agendaOrder": 58, "agendaGroup": "#62", "department": "技術開發部", "owner": "陳威志", "time": "4~8 hr", "frequency": "逆向", "people": "14", "input": "1. 2D Drawing 識別\n2. 識別 2D 圖面尺寸、過濾雜訊\n3. 依廠內 template 生成(繪)圖", "output": "廠內工程圖", "logic": "1. Agent 仿人工依固定格式繪圖。\n2. 圖像生成工程圖再處理成pdf 向量檔案。", "data": "1. Agent 透過 MCP 操作 CAD 軟體。(已嘗試 FreeCAD，MCP 編寫複雜)\n2. 以圖像生成方法再轉繪成pdf。(理想)", "markdown": "# 62. 原廠 2D drawing / 3D step file -> 轉廠內 Template 2D drawing\n\n## 顧問日時段\nD · 13:00-14:00 圖面辨識\n\n## (輸入)希望 AI 處理的問題\n1. 2D Drawing 識別\n2. 識別 2D 圖面尺寸、過濾雜訊\n3. 依廠內 template 生成(繪)圖\n\n## (輸出)預期輸出成果\n廠內工程圖\n\n## 任務步驟或處理邏輯\n1. Agent 仿人工依固定格式繪圖。\n2. 圖像生成工程圖再處理成pdf 向量檔案。\n\n## 資料\n1. Agent 透過 MCP 操作 CAD 軟體。(已嘗試 FreeCAD，MCP 編寫複雜)\n2. 以圖像生成方法再轉繪成pdf。(理想)\n\n## 其他資訊\n- 部門：技術開發部\n- 人員：陳威志\n- 每次執行耗費時間：4~8 hr\n- 每月執行頻率：逆向\n- 有需求的人數：14"}, {"id": 63, "title": "工程圖的圖面辨識 ( 檢驗尺寸分類 )", "slotCode": "D", "slotText": "D · 13:00-14:00 圖面辨識", "slotTitle": "D 圖面辨識", "slotTime": "13:00-14:00", "slotSummary": "8 題", "slotOrder": 3, "agendaOrder": 59, "agendaGroup": "#63", "department": "品保部", "owner": "劉倫均", "time": "未提供", "frequency": "未提供", "people": "品保檢驗人員", "input": "辨識幾何圖形圖示、機械製圖的專有名詞(英文簡稱或符號)\n辨識圖區位置,該尺寸的公差(已有標註的為主,沒標註的皆為一般公差)\n辨識同尺寸的數量,需檢驗的量測設備或工具", "output": "14126-MALE000-20260519.pdf", "logic": "人工辨識,一筆一筆辨識", "data": "\\\\192.168.10.211\\共用\\LLC\\翔名 AI Agent 任務盤點表(倫均)\\2.工程圖的圖面辨識-檢驗尺寸分類", "markdown": "# 63. 工程圖的圖面辨識 ( 檢驗尺寸分類 )\n\n## 顧問日時段\nD · 13:00-14:00 圖面辨識\n\n## (輸入)希望 AI 處理的問題\n辨識幾何圖形圖示、 挖)。\n2. 尺寸標註的指示線是位於哪裡到哪裡?\n3. 分析尺寸公差極小處(±0.02以下)。\n•難度加成，增加加工成本工時。\n4. 辨識幾何圖形圖示及幾何公差要求(平面度、平行度、正位度、粗糙度…)。\n•預防變形(增加粗、中、細加工)。\n5. 特殊形狀特徵(O-ring溝槽、壁薄、簍空、太長太短、太大太小…)、特徵數量(牙孔數、牙套種類)。\n•增加特殊製程(磨床、夾持治具、側銑頭加工、焊接)、增加的刀具成本、治具成本、五金零件成本。\n6. 關聯性尺寸(基準面對應的圖標位置)\n•基準面位於哪一頁的哪一格?剖面圖是位於哪個剖面線?細節放大的位置?\n\n## (輸出)預期輸出成果\n翔名加工能力:可製作\n機台種類:三軸/五軸/銑/車/線割/磨床\n加工工時:20小時\n刀具成本:$4000\n治具成本:$10000\n材料尺寸:450*450*50mm\n後處理工時:2小時\nNG失敗率:50%\n\n## 任務步驟或處理邏輯\n分析客戶工程圖 / 口頭知會工程人員\n\n## 資料\n\\\\192.168.10.211\\共用\\LLC\\翔名 AI Agent 任務盤點表(倫均)\\1.工程圖的圖面辨識-新品報價加工工時成本\n\n## 其他資訊\n- 部門：產品開發部\n- 人員：劉倫均\n- 每次執行耗費時間：0.5小時~4小時\n- 每月執行頻率：8~12次\n- 有需求的人數：3"}, {"id": 70, "title": "產品分類", "slotCode": "F", "slotText": "F · 15:00-15:30 商機研究", "slotTitle": "F 商機研究", "slotTime": "15:00-15:30", "slotSummary": "5 題", "slotOrder": 5, "agendaOrder": 66, "agendaGroup": "#70", "department": "業務部", "owner": "林珠英", "time": "1小時", "frequency": "不 一定", "people": "5", "input": "比對現有產品跟新產品分類", "output": "協助分類:\n1. 材料\n2. 尺寸\n3. 工藝難易度", "logic": "未提供", "data": "4022.713.87811-IN LENS PRE-AMP HOLDER_V1.pdf", "markdown": "# 70. 產品分類\n\n## 顧問日時段\nF · 15:00-15:30 商機研究\n\n## (輸入)希望 AI 處理的問題\n比對現有產品跟新產品分類\n\n## (輸出)預期輸出成果\n協助分類:\n1. 材料\n2. 尺寸\n3. 工藝難易度\n\n## 任務步驟或處理邏輯\n未提供\n\n## 資料\n4022.713.87811-IN LENS PRE-AMP HOLDER_V1.pdf\n\n## 其他資訊\n- 部門：業務部\n- 人員：林珠英\n- 每次執行耗費時間：1小時\n- 每月執行頻率：不 一定\n- 有需求的人數：5"}, {"id": 71, "title": "產品競爭力", "slotCode": "F", "slotText": "F · 15:00-15:30 商機研究", "slotTitle": "F 商機研究", "slotTime": "15:00-15:30", "slotSummary": "5 題", "slotOrder": 5, "agendaOrder": 67, "agendaGroup": "#71", "department": "業務部", "owner": "林珠英", "time": "1小時", "frequency": "不 一定", "people": "5", "input": "同類型產品對比手上報價單以及競爭對手有可能提出的價格或市場價格比較", "output": "協助提供:\n1. 相似產品市場上可以查詢到的價格\n2. 競爭對手目前所以產品的價格範圍\n3. 與競品的產品對比", "logic": "未提供", "data": "https://www.gongin.com.tw/", "markdown": "# 71. 產品競爭力\n\n## 顧問日時段\nF · 15:00-15:30 商機研究\n\n## (輸入)希望 AI 處理的問題\n同類型產品對比手上報價單以及競爭對手有可能提出的價格或市場價格比較\n\n## (輸出)預期輸出成果\n協助提供:\n1. 相似產品市場上可以查詢到的價格\n2. 競爭對手目前所以產品的價格 的技術規劃)\n\n## 資料\n未提供\n\n## 其他資訊\n- 部門：總管理處\n- 人員：吳予彤\n- 每次執行耗費時間：30分鐘\n- 每月執行頻率：不 一定\n- 有需求的人數：20(RD,業務,主管)"}, {"id": 18, "title": "相似客訴／8D案例搜尋", "slotCode": "G", "slotText": "G · 15:30-16:00 其他+收斂", "slotTitle": "G 其他+收斂", "slotTime": "15:30-16:00", "slotSummary": "13 題", "slotOrder": 6, "agendaOrder": 15, "agendaGroup": "#18_19", "department": "QA", "owner": "許婉琳", "time": "約 30 分鐘 / ~ 4 小時 / 每件客訴", "frequency": "不一定", "people": "3", "input": "工程師遇到客訴時：\n1. 不知道以前有沒有發生過\n2. 找不到歷史8D\n3. 不知道以前怎麼改善\n4.同問題重複發生", "output": "1.相似8D\n2. 相似QN\n3. 相似不良照片\n4.歷史Root Cause\n5. 歷史改善對策\n6.相似度%", "logic": "1. 輸入客訴描述\n2. LLM語意分析\n3. Embedding向量化\n4. 搜尋向量資料庫\n5. 比對歷史8D\n6. 輸出最相似案例", "data": "1. 歷史8D\n2. QN資料\n3. FA Report\n4. 客訴Email\n5. Defect照片\n6. CAPA資料\n7. Root Cause資料庫", "markdown": "# 18. 相似客訴／8D案例搜尋\n\n## 顧問日時段\nG · 15:30-16:00 其他+收斂\n\n## (輸入)希望 AI 處理的問題\n工程師遇到客訴時：\n1. 不知道以前有沒有發生過\n2. 找不到歷史8D\n3. 不知道以前怎麼改善\n4.同問題重複發生\n\n## (輸出)預期輸出成果\n1.相似8D\n2. 相似QN\n3. 相似不良照片\n4.歷史Root Cause\n5. 歷史改善對策\n6.相似度%\n\n## 任務步驟或處理邏輯\n1. 輸入客訴描述\n2. LLM語意分析\n3. Embedding向量化\n4. 搜尋向量資料庫\n5. 比對歷史8D\n6. 輸出最相似案例\n\n## 資料\n1. 歷史8D\n2. QN資料\n3. FA Report\n4. 客訴Email\n5. Defect照片\n6. CAPA資料\n7. Root Cause資料庫\n\n## 其他資訊\n- 部門：QA\n- 人員：許婉琳\n- 每次執行耗費時間：約 30 分鐘 / ~ 4 小時 / 每件客訴\n- 每月執行頻率：不一定\n- 有需求的人數：3"}, {"id": 19, "title": "8D 報告草稿自動生成", "slotCode": "G", "slotText": "G · 15:30-16:00 其他+收斂", "slotTitle": "G 其他+收斂", "slotTime": "15:30-16:00", "slotSummary": "13 題", "slotOrder": 6, "agendaOrder": 15, "agendaGroup": "#18_19", "department": "QA", "owner": "許婉琳", "time": "約 2小時 / ~ 3日 / 每份8D / (複雜案甚至更久）", "frequency": "不一定", "people": "3", "input": "工程師已查到客訴原因、Root Cause、改善對策後，仍需要花很多時間整理成 8D 格式，且容易出現英文不一致、內容不完整、D2/D4/D5/D6邏輯不連貫的問題。", "output": "AI 自動產出 8D 報告草稿\n包含 D1~D8、問題描述、圍堵措施、Root Cause、改善對策、驗證結果、預防再發措施，以及中英文內容。", "logic": "1. 匯入客訴資料\n2. LLM整理資訊\n3. 套用8D模板\n4. 生成D1~D8草稿\n5.工程師確認修改", "data": "1. 8D Template\n2. 歷史8D\n3. 客戶格式\n4. 佐證資料\n5. 檢驗紀錄\n6. Lot資料\n7. SOP/WI", "markdown": "# 19. 8D 報告草稿自動生成\n\n## 顧問日時段\nG · 15:30-16:00 其他+收斂\n\n## (輸入)希望 AI 處理的問題\n工程師已查到客訴原因、Root Cause、改善對策後，仍需要花很多時間整理成 8D 格式，且容易出現英文不一致、內容不完整、D2/D4/D5/D6邏輯不連貫的問題。\n\n## (輸出)預期輸出成果\nAI 自動產出 8D 報告草稿\n包含 D1~D8、問題描述、圍堵措施、Root Cause、改善對策、驗證結果、預防再發措施，以及中英文內容。\n\n## 任務步驟或處理邏輯\n1. 匯入客訴資料\n2. LLM整理資訊\n3. 套用8D模板\n4. 生成D1~D8草稿\n5.工程師確認修改\n\n## 資料\n1. 8D Template\n2. 歷史8D\n3. 客戶格式\n4. 佐證資料\n5. 檢驗紀錄\n6. Lot資料\n7. SOP/WI\n\n## 其他資訊\n- 部門：QA\n- 人員：許婉琳\n- 每次執行耗費時間：約 2小時 / ~ 3日 / 每份8D / (複雜案甚至更久）\n- 每月執行頻率：不一定\n- 有需求的人數：3"}, {"id": 20, "title": "ESG 碳盤查與永續資料蒐集整合助手", "slotCode": "G", "slotText": "G · 15:30-16:00 其他+收斂", "slotTitle": "G 其他+收斂", "slotTime": "15:30-16:00", "slotSummary": "13 題", "slotOrder": 6, "agendaOrder": 16, "agendaGroup": "#20", "department": "廠務部", "owner": "詹錢翔", "time": "4小時", "frequency": "4次", "people": "5-7人", "input": "1.廠區內分散於各處的能源數據（台電電費單PDF、公務車油耗 Excel、水費單PDF等） 。\n2.外部供應商格式不一的碳盤查資料、產品碳足跡（PCF）宣告與清運廠商的廢棄物聯單 。\n3.人工輸入單位的錯誤攔截（例如：將公升誤填為加侖，或抄表數字多打一個零），導致碳排計算暴增或暴跌。", "output": "1.符合國際標準（ISO 14064-1 / 14067）的企業碳盤查 Excel 整合總表 。\n2.管理階層 ESG 營運決策戰情週報（Mail 草稿與數據摘要） 。\n3.企業永續報告書（ESG Report）合規文本環境績效章節草稿 。", "logic": "1.自主數據擷取： AI Agent 定期自動讀取指定的 Excel、Google Sheets，並利用文字識別（OCR）功能讀取跨廠區的水電瓦斯帳單 PDF 與外部廠商回傳的碳排表單 。\n2.異常值攔截： 自動比對該廠區的歷史能耗基期，若發現某月份數據異常飆高，自動標記為潛在異常，並主動草發信給負責窗口進行二次確認。\n3.動態係數匹配： 自動連接並檢索政府主管機關或國際最新公布的碳排係數資料庫，將異質數據精準轉換為二氧化碳當量（CO2e）。\n4.主動式催收： 比對應繳清單，若發現特定供應商漏填範疇三數據，自動撰寫並發送客製化的催繳與確認郵件 。", "data": "1.歷年台電電費單 PDF 範本\n2.公務車油耗統計 Excel 表\n3.環境部碳排放係數清冊網址\n4.供應商碳足跡回報單", "markdown": "# 20. ESG 碳盤查與永續資料蒐集整合助手\n\n## 顧問日時段\nG · 15:30-16:00 其他+收斂\n\n## (輸入)希望 AI 處理的問題\n1.廠區內分散於各處的能源數據（台電電費單PDF、公務車油耗 Excel、水費單PDF等） 。\n2.外部供應商格式不一的碳盤查資料、產品碳足跡（PCF）宣告與清運廠商的廢棄物聯單 。\n3.人工輸入單位的錯誤攔截（例如：將公升誤填為加侖，或抄表數字多打一個零），導致碳排計算暴增或暴跌。\n\n## (輸出)預期輸出成果\n1.符合國際標準（ISO 14064-1 / 14067）的企業碳盤查 Excel 整合總表 。\n2.管理階層 ESG 營運決策戰情週報（Mail 草稿與數據摘要） 。\n3.企業永續報告書（ESG Report）合規文本環境績效章節草稿 。\n\n## 任務步驟或處理邏輯\n1.自主數據擷取： AI Agent 定期自動讀取指定的 Excel、Google Sheets，並利用文字識別（OCR）功能讀取跨廠區的水電瓦斯帳單 PDF 與外部廠商回傳的碳排表單 。\n2.異常值攔截： 自動比對該廠區的歷史能耗基期，若發現某月份數據異常飆高，自動標記為潛在異常，並主動草發信給負責窗口進行二次確認。\n3.動態係數匹配： 自動連接並檢索政府主管機關或國際最新公布的碳排係數資料庫，將異質數據精準轉換為二氧化碳當量（CO2e）。\n4.主動式催收： 比對應繳清單，若發現特定供應商漏填範疇三數據，自動撰寫並發送客製化的催繳與確認郵件 。\n\n## 資料\n1.歷年台電電費單 PDF 範本\n2.公務車油耗統計 Excel 表\n3.環境部碳排放係數清冊網址\n4.供應商碳足跡回報單\n\n## 其他資訊\n- 部門：廠務部\n- 人員：詹錢翔\n- 每次執行耗費時間：4小時\n- 每月執行頻率：4次\n- 有需求的人數：5-7人"}, {"id": 27, "title": "翔名AI客服, 新人教育", "slotCode": "G", "slotText": "G · 15:30-16:00 其他+收斂", "slotTitle": "G 其他+收斂", "slotTime": "15:30-16:00", "slotSummary": "13 題", "slotOrder": 6, "agendaOrder": 23, "agendaGroup": "#27", "department": "業務部", "owner": "王思敏", "time": "3分鐘", "frequency": "看狀況", "people": "11人", "input": "翔名網頁可以有一個AI客服，協助回覆基本資訊。\n例如: 哪種產品詢價要聯絡哪位業務、公司販售產品...等資訊。", "output": "針對特定關鍵字(詢價、銷售項目..) AI自動判讀並回覆資訊。", "logic": "先建立一個專門的小程式，並建立特定的搜尋關鍵字，AI自動判讀並回覆。", "data": "開發程式", "markdown": "# 27. 翔名AI客服, 新人教育\n\n## 顧問日時段\nG · 15:30-16:00 其他+收斂\n\n## (輸入)希望 AI 處理的問題\n翔名網頁可以有一個AI客服，協助回覆基本資訊。\n例如: 哪種產品詢價要聯絡哪位業務、公司販售產品...等資訊。\n\n## (輸出)預期輸出成果\n針對特定關鍵字(詢價、銷售項目..) AI自動判讀並回覆資訊。\n\n## 任務步驟或處理邏輯\n先建立一個專門的小程式，並建立特定的搜尋關鍵字，AI自動判讀並回覆。\n\n## 資料\n開發程式\n\n## 其他資訊\n- 部門：業務部\n- 人員：王思敏\n- 每次執行耗費時間：3分鐘\n- 每月執行頻率：看狀況\n- 有需求的人數：11人"}, {"id": 28, "title": "同仁詢問問題", "slotCode": "G", "slotText": "G · 15:30-16:00 其他+收斂", "slotTitle": "G 其他+收斂", "slotTime": "15:30-16:00", "slotSummary": "13 題", "slotOrder": 6, "agendaOrder": 24, "agendaGroup": "#28", "department": "行政服務部", "owner": "王湘渝", "time": "5分鐘", "frequency": "每天", "people": "5", "input": "員工能自行搜尋", "output": "1.即時處理重複性問題，承辦可專注於高價值事務\n2.同仁即時得到答案無需等待協助，或不知道尋求哪位承辦協助。", "logic": "至AI文字客服系統輸入關鍵字，文字客服提供相關答案。", "data": "公司規章辦法、SOP、問答集", "markdown": "# 28. 同仁詢問問題\n\n## 顧問日時段\nG · 15:30-16:00 其他+收斂\n\n## (輸入)希望 AI 處理的問題\n員工能自行搜尋\n\n## (輸出)預期輸出成果\n1.即時處理重複性問題，承辦可專注於高價值事務\n2.同仁即時得到答案無需等待協助，或不知道尋求哪位承辦協助。\n\n## 任務步驟或處理邏輯\n至AI文字客服系統輸入關鍵字，文字客服提供相關答案。\n\n## 資料\n公司規章辦法、SOP、問答集\n\n## 其他資訊\n- 部門：行政服務部\n- 人員：王湘渝\n- 每次執行耗費時間：5分鐘\n- 每月執行頻率：每天\n- 有需求的人數：5"}, {"id": 31, "title": "採購單價格核對助手", "slotCode": "G", "slotText": "G · 15:30-16:00 其他+收斂", "slotTitle": "G 其他+收斂", " · 15:30-16:00 其他+收斂", "slotTitle": "G 其他+收斂", "slotTime": "15:30-16:00", "slotSummary": "13 題", "slotOrder": 6, "agendaOrder": 49, "agendaGroup": "#53", "department": "機構設計課", "owner": "葉于萱", "time": "3分鐘", "frequency": "200次", "people": "10", "input": "輸入料號即自動檢查檔案是否製作歸檔(MIP,PMP,PDF,PDF過時保留)", "output": "輸入料號>檢查>列表Y/N>列N的品項一鍵發信提醒", "logic": "1.輸入料號\n2.*如只輸入product code*超過一個的品號，提供下拉式選項\n3.反查所有上下階半品\n4.檢查是否有歸檔MIP,PMP,PDF(檔案限1個，需完全符合名字)\n5.檢查MIP原廠料號版次是否與系統一致\n6.檢查檔案位置是否正確\n7.檢查是否有將所有舊檔案(含舊料號)過時保留\n8.列表Y/N\n9.列N的品項-發信鈕提醒繪圖人員", "data": "1.product code的邏輯(PLM)\n2.反查上下階半品/原廠料號版次的邏輯(PLM)\n3.檔案位置檢查的邏輯(共用槽)\n4.過時保留檢查的邏輯(共用槽)\n5.新舊料號對照表\n6.列表Y/N的格式\n7.發信格式", "markdown": "# 53. 歸檔檢查小助手\n\n## 顧問日時段\nG · 15:30-16:00 其他+收斂\n\n## (輸入)希望 AI 處理的問題\n輸入料號即自動檢查檔案是否製作歸檔(MIP,PMP,PDF,PDF過時保留)\n\n## (輸出)預期輸出成果\n輸入料號>檢查>列表Y/N>列N的品項一鍵發信提醒\n\n## 任務步驟或處理邏輯\n1.輸入料號\n2.*如只輸入product code*超過一個的品號，提供下拉式選項\n3.反查所有上下階半品\n4.檢查是否有歸檔MIP,PMP,PDF(檔案限1個，需完全符合名字)\n5.檢查MIP原廠料號版次是否與系統一致\n6.檢查檔案位置是否正確\n7.檢查是否有將所有舊檔案(含舊料號)過時保留\n8.列表Y/N\n9.列N的品項-發信鈕提醒繪圖人員\n\n## 資料\n1.product code的邏輯(PLM)\n2.反查上下階半品/原廠料號版次的邏輯(PLM)\n3.檔案位置檢查的邏輯(共用槽)\n4.過時保留檢查的邏輯(共用槽)\n5.新舊料號對照表\n6.列表Y/N的格式\n7.發信格式\n\n## 其他資訊\n- 部門：機構設計課\n- 人員：葉于萱\n- 每次執行耗費時間：3分鐘\n- 每月執行頻率：200次\n- 有需求的人數：10"}, {"id": 54, "title": "接單報表", "slotCode": "G", "slotText": "G · 15:30-16:00 其他+收斂", "slotTitle": "G 其他+收斂", "slotTime": "15:30-16:00", "slotSummary": "13 題", "slotOrder": 6, "agendaOrder": 50, "agendaGroup": "#54", "department": "芝和業務部", "owner": "呂亞珊", "time": "30", "frequency": "2~100", "people": "2~30 / 如成功也可套用於各分公司", "input": "1.整理資料\n2.製作圖表\n3.以網頁版呈現且自動更新", "output": "將接單的趨勢做成可視報表網頁，且可以在ERP有新資料時自動更新", "logic": "未提供", "data": "\"S:\\13共用匣\\珊\\接單報表自動化-最終版-2.bas\"", "markdown": "# 54. 接單報表\n\n## 顧問日時段\nG · 15:30-16:00 其他+收斂\n\n## (輸入)希望 AI 處理的問題\n1.整理資料\n2.製作圖表\n3.以網頁版呈現且自動更新\n\n## (輸出)預期輸出成果\n將接單的趨勢做成可視報表網頁，且可以在ERP有新資料時自動更新\n\n## 任務步驟或處理邏輯\n未提供\n\n## 資料\n\"S:\\13共用匣\\珊\\接單報表自動化-最終版-2.bas\"\n\n## 其他資訊\n- 部門：芝和業務部\n- 人員：呂亞珊\n- 每次執行耗費時間：30\n- 每月執行頻率：2~100\n- 有需求的人數：2~30 / 如成功也可套用於各分公司"}, {"id": 56, "title": "材料 BOM 關聯與採購件影響分析", "slotCode": "G", "slotText": "G · 15:30-16:00 其他+收斂", "slotTitle": "G 其他+收斂", "slotTime": "15:30-16:00", "slotSummary": "13 題", "slotOrder": 6, "agendaOrder": 52, "agendaGroup": "#56", "department": "資訊部門", "owner": "羅銘輝", "time": "6小時", "frequency": "30次", "people": "10人", "input": "- 輸入材料料號後，需人工查詢被哪些成品使用\n- 再由成品 BOM 往下展開採購件\n- 容易漏掉替代料或共用料\n- 缺料影響範圍難快速判斷", "output": "- 輸入材料料號即可自動往上展第一階成品\n- 自動往下展該成品所有採購件\n- 顯示每項品號最新平均成本\n- 顯示材料用量與成本占比\n- 缺料影響成品分析\n- 可輸出 Excel BOM 關聯報表", "logic": "1. 使用者輸入材料料號\n2. 系統查詢 Where-Used BOM（往上展）\n3. 找出第一階成品料號\n4. 由成品 BOM 往下展開採購件，並帶出用量資訊\n5. 彙整材料對成品的佔比\n6. 輸出分析報表", "data": "- ERP BOM 資料表\n- 材料主檔\n- 採購件料號資料\n-品號最新平均成本資料", "markdown": "# 56. 材料 BOM 關聯與採購件影響分析\n\n## 顧問日時段\nG · 15:30-16:00 其他+收斂\n\n## (輸入)希望 AI 處理的問題\n- 輸入材料料號後，需人工查詢被哪些成品使用\n- 再由成品 BOM 往下展開採購件\n- 容易漏掉替代料或共用料\n- 缺料影響範圍難快速判斷\n\n## (輸出)預期輸出成果\n- 輸入材料料號即可自動往上展第一階成品\n- 自動往下展該成品所有採購件\n- 顯示每項品號最新平均成本\n- 顯示材料用量與成本占比\n- 缺料影響成品分析\n- 可輸出 Excel BOM 關聯報表\n\n## 任務步驟或處理邏輯\n1. 使用者輸入材料料號\n2. 系統查詢 Where-Used BOM（往上展）\n3. 找出第一階成品料號\n4. 由成品 BOM 往下展開採購件，並帶出用量資訊\n5. 彙整材料對成品的佔比\n6. 輸出分析報表\n\n## 資料\n- ERP BOM 資料表\n- 材料主檔\n- 採購件料號資料\n-品號最新平均成本資料\n\n## 其他資訊\n- 部門：資訊部門\n- 人員：羅銘輝\n- 每次執行耗費時間：6小時\n- 每月執行頻率：30次\n- 有需求的人數：10人"}, {"id": 57, "title": "新進人員資料建檔與相關資料進行其他作業及維護", "slotCode": "G", "slotText": "G · 15:30-16:00 其他+收斂", "slotTitle": "G 其他+收斂", "slotTime": "15:30-16:00", "slotSummary": "13 題", "slotOrder": 6, "agendaOrder": 53, "agendaGroup": "#57", "department": "行政服務部", "owner": "王湘渝", "time": "2HR", "frequency": "4", "people": "2", "input": "建置網頁版人事基本資料表，並確保資料傳輸安全，AI協助整理學歷、工作經歷與個人資料，減少重複人工輸入作業。", "output": "自動整理新進人員學歷、工作經歷與個人基本資料，提供HRM建檔、核薪與考核表填寫參考，減少重複輸入時間。", "logic": "1.求職者於網站上直接填寫人事基本資料表\n2.AI辨識並整理學歷、工作經歷與個人資料並依欄位分類產出建檔資料\n3.提供HR進行HRM系統建檔、核薪與考核表填寫參考(直接導出模板)", "data": "人事基本資料表、HRM導入模板", "markdown": "# 57. 新進人員資料建檔與相關資料進行其他作業及維護\n\n## 顧問日時段\nG · 15:30-16:00 其他+收斂\n\n## (輸入)希望 AI 處理的問題\n建置網頁版人事基本資料表，並確保資料傳輸安全，AI協助整理學歷、工作經歷與個人資料，減少重複 \n- 每月執行頻率：才剛成立,執行頻率不明\n- 有需求的人數：1"}, {"id": 24, "title": "建立AI辨識規則", "slotCode": "X", "slotText": "X · 建議延後", "slotTitle": "X 建議延後", "slotTime": "建議延後", "slotSummary": "15 題", "slotOrder": 7, "agendaOrder": 20, "agendaGroup": "#24", "department": "製造處", "owner": "劉倫均", "time": "尚未建立成功", "frequency": "尚未建立成功", "people": "1", "input": "人眼能夠依據前後的文字(圖片)關係鏈，\n自然辨識出此是哪種(資訊、刀具、製程)類型，應該怎麼分類。\n若使用Excel VBA去搜尋，辨識規則建立不易。\nAI辨識文字，缺乏專業領域知識(業界無統一標準)，無法有效辨識文字的意義。", "output": "藉由投餵大量資料，先讓AI初步辨識出能正確辨識的資訊 ( 建立記憶 )，\n產生矛盾或不知其意的資訊，統整反問人類，\n人類再給予規則教導與如何分辨 ( 建立規則 )。\n並建立 ( 規則或提示詞 )，讓AI永久記得，\n讓每次的辨識失敗教訓，都記得去尋找以前的紀錄。 ( 記憶失敗經驗 )", "logic": "來源的困難處:\n一․刀具品名的命名 : 功能、用途、課別、被加工材、刀具材質…皆混在一起命名\n二․刀具規格的命名 : 一樣的意思,卻有不同的命名方式\n三․各課的製程單，格式不一、命名方式不一。 同樣產品品號的製程單，分類太多種:\n製程別 (A面、B面)、 一對多 (4A面、6B面)、機種版 (銑床版、I800搖籃版、自動化版)、 材質版 (圓料、方料)\n四․SQL資料庫，每一個資料表與屬性代碼的值，為翔名自訂的專屬格位，若非特定人員，不知其數值，代表的是甚麼意思?\n辨識的困難處:\n一․如:鎢鋼端銑刀鍍矽鈦金屬-鎢、鉬 / 金屬加工,鎢鋼端銑刀(鈦金屬用刀/立銑刀)\n金屬加工,鎢鋼端銑刀 / 石墨加工,鎢鋼面銑刀片 / 鎢鋼鑽頭(銑刀柄)無鍍層金屬-鋁 / 鎢鋼成型銑刀無鍍層金屬\n二․如:0.3mm*9*3*2T*45L*120°(ADRL-0030) /TKF12R150-T-16DRPR1725 / DR1.0鑽頭 / DR1.0鑽頭 / D10-R1圓鼻刀\n如:同樣刀具直徑的表示方式: 10.0mm (mm代表) / D10(D開頭代表) / θ10(希臘文Big5十六進位) / Ø10(Unicode十六進位)\n三․不同人手動建立的製程單: 檔名沒規則性(EXCEL檔)，打錯字,多了空格,奇怪的符號，格式不一,俗稱命名，帶有圖片(圖片上有註解文字)\n四․專門的文書人員，會使用ERP查詢,但不知其數值是SQL的哪個資料表的哪個屬性代碼，亦不知怎麼跨關聯性查詢。\n即使是MIS人員，雖知其邏輯原理，但不知其數值代表何意義(非專業領域)。\n範例:本月刀具費爆增，欲查詢原因。\n1.至SQL撈取刀具領用紀錄,找出刀具品號關聯性。\n2.查詢該刀具品號的購入價格，確認是否因原物料漲價而單價增漲?\n3.查詢刀具是使用在哪個產品品號，是否因接了大單而使用量爆增?\n4.查詢領取單位或人員，是否因過度領取造成浪費?\n5.查詢此產品的往年紀錄，所使用的刀具數量或價格，是否僅此次爆增而異常?\n6.將所查詢到的數據，整理統整，併依序排列成報表，讓主管一目了然。", "data": "\\\\192.168.10.211\\共用\\LLC\\翔名 AI Agent 任務盤點表(倫均)\\6.建立AI辨識規則", "markdown": "# 24. 建立AI辨識規則\n\n## 顧問日時段\nX · 建議延後\n\n## (輸入)希望 AI 處理的問題\n人眼能夠依據前後的文字(圖片)關係鏈，\n自然辨識出此是哪種(資訊、刀具、製程)類型，應該怎麼分類。\n若使用Excel VBA去搜尋，辨識規則建立不易。\nAI辨識文字，缺乏專業領域知識(業界無統一標準)，無法有效辨識文字的意義。\n\n## (輸出)預期輸出成果\n藉由投餵大量資料，先讓AI初步辨識出能正確辨識的資訊 ( 建立記憶 )，\n產生矛盾或不知其意的資訊，統整反問人類，\n人類再給予規則教導與如何分辨 ( 建立規則 )。\n並建立 ( 規則或提示詞 )，讓AI永久記得，\n讓每次的辨識失敗教訓，都記得去尋找以前的紀錄。 ( 記憶失敗經驗 )\n\n## 任務步驟或處理邏輯\n來源的困難處:\n一․刀具品名的命名 : 功能、用途、課別、被加工材、刀具材質…皆混在一起命名\n二․刀具規格的命名 : 一樣的意思,卻有不同的命名方式\n三․各課的製程單，格式不一、命名方式不一。 同樣產品品號的製程單，分類太多種:\n製程別 (A面、B面)、 一對多 (4A面、6B面)、機種版 (銑床版、I800搖籃版、自動化版)、 材質版 (圓料、方料)\n四․SQL資料庫，每一個資料表與屬性代碼的值，為翔名自訂的專屬格位，若非特定人員，不知其數值，代表的是甚麼意思?\n辨識的困難處:\n一․如:鎢鋼端銑刀鍍矽鈦金屬-鎢、鉬 / 金屬加工,鎢鋼端銑刀(鈦金屬用刀/立銑刀)\n金屬加工,鎢鋼端銑刀 / 石墨加工,鎢鋼面銑刀片 / 鎢鋼鑽頭(銑刀柄)無鍍層金屬-鋁 / 鎢鋼成型銑刀無鍍層金屬\n二․如:0.3mm*9*3*2T*45L*120°(ADRL-0030) /TKF12R150-T-16DRPR1725 / DR1.0鑽頭 / DR1.0鑽頭 / D10-R1圓鼻刀\n如:同樣刀具直徑的表示方式: 10.0mm (mm代表) / D10(D開頭代表) / θ10(希臘文Big5十六進位) / Ø10(Unicode十六進位)\n三․不同人手動建立的製程單: 檔名沒規則性(EXCEL檔)，打錯字,多了空格,奇怪的符號，格式不一,俗稱命名，帶有圖片(圖片上有註解文字)\n四․專門的文書人員，會使用ERP查詢,但不知其數值是SQL的哪個資料表的哪個屬性代碼，亦不知怎麼跨關聯性查詢。\n即使是MIS人員，雖知其邏輯原理，但不知其數值代表何意義(非專業領域)。\n範例:本月刀具費爆增，欲查詢原因。\n1.至SQL撈取刀具領用紀錄,找出刀具品號關聯性。\n2.查詢該刀具品號的購入價格，確認是否因原物料漲價而單價增漲?\n3.查詢刀具是使用在哪個產品品號，是否因接了大單而使用量爆增?\n4.查詢領取單位或人員，是否因過度領取造成浪費?\n5.查詢此產品的往年紀錄，所使用的刀具數量或價格，是否僅此次爆增而異常?\n6.將所查詢到的數據，整理統整，併依序排列成報表，讓主管一目了然。\n\n## 資料\n\\\\192.168.10.211\\共用\\LLC\\翔名 AI Agent 任務盤點表(倫均)\\6.建立AI辨識規則\n\n## 其他資訊\n- 部門：製造處\n- 人員：劉倫均\n- 每次執行耗費時間：尚未建立成功\n- 每月執行頻率：尚未建立成功\n- 有需求的人數：1"}, {"id": 26, "title": "新品追蹤PM", "slotCode": "X", "slotText": "X · 建議延後", "slotTitle": "X 建議延後", "slotTime": "建議延後", "slotSummary": "15 題", "slotOrder": 7, "agendaOrder": 22, "agendaGroup": "#26", "department": "總管理處", "owner": "吳予彤", "time": "10分鐘", "frequency": "60次", "people": "20", "input": "減少人員溝通時間\n一鍵查詢新品流程跑到哪裡\n確認流程關卡已經耗費時間及自動發信提醒\n新品流程解析展開，通知需要參與的人員\n預估新品流程所需時間及預計完成日\n接到新品後自動展開新品會議所需資料", "output": "Q: 目前15-300092-00流程到哪了?\nA: 15-300092-00尚未查到有廠內料號，查詢系統簽核流程已到xxx，在xxx簽核站點已經3天，請問需要發信提醒xxx嗎?", "logic": "去ERP搜尋原廠料號15-300092-00對應廠內品號，如果搜尋的到廠內品號，查詢途程/BOM是否已建立，如果查無資訊，回覆xxx", "data": "ERP新品號建立\n新品會議表格\n新品會議紀錄", "markdown": "# 26. 新品追蹤PM\n\n## 顧問日時段\nX · 建議延後\n\n## (輸入)希望 AI 處理的問題\n減少人員溝通時間\n一鍵查詢新品流程跑到哪裡\n確認流程關卡已經耗費時間及自動發信提醒\n新品流程解析展開，通知需要參與的人員\n預估新品流程所需時間及預計完成日\n接到新品後自動展開新品會議所需資料\n\n## (輸出)預期輸出成果\nQ: 目前15-300092-00流程到哪了?\nA: 15-300092-00尚未查到有廠內料號，查詢系統簽核流程已到xxx，在xxx簽核站點已經3天，請問需要發信提醒xxx嗎?\n\n## 任務步驟或處理邏輯\n去ERP搜尋原廠料號15-300092-00對應廠內品號，如果搜尋的到廠內品號，查詢途程/BOM是否已建立，如果查無資訊，回覆xxx\n\n## 資料\nERP新品號建立\n新品會議表格\n新品會議紀錄\n\n## 其他資訊\n- 部門：總管理處\n- 人員：吳予彤\n- 每次執行耗費時間：10分鐘\n- 每月執行頻率：60次\n- 有需求的人數：20"}, {"id": 45, "title": "委外回貨SFT進出站", "slotCode": "X", "slotText": "X · 建議延後", "slotTitle": "X 建議延後", "slotTime": "建議延後", "slotSummary": "15 題", "slotOrder": 7, "agendaOrder": 41, "agendaGroup": "#45", "department": "生/物管部", "owner": "鄭佳儀", "time": "1.5分鐘/筆", "frequency": "工作天至少執行2~3次", "people": "5", "input": "在網頁已登入SFT的狀態下，依照提供的檔案格式，自動執行SFT進出站並提供完成後對應的移轉單號。", "output": "減少逐筆過站的工作時間", "logic": "1.開啟「委外報表」→尋找該委外回貨的製令、品號、數量\n2.登入SFT，選擇委外回貨的製程工作站\n3.功能列製令追蹤→進站/外包簽收→尋找該回貨製令→檢視→維護數量→外包簽收\n4.功能列製令追蹤→出站/外包完成→尋找該回貨製令→檢視→維護數量→維護人時0→外包完成→產生移轉單號\n5.將產生的移轉單維護回「委外報表」", "data": "1.SFT網頁:http://192.168.10.39:8100/SFT/main/centerPage/centerPage.jsp?locale=zh_TW\n2.委外報表\n3.預計提供給AI，供其辨識的整理報表「SFT-AI進出站報表格式_資料提供」", "markdown": "# 45. 委外回貨SFT進出站\n\n## 顧問日時段\nX · 建議延後\n\n## (輸入)希望 AI 處理的問題\n在網頁已登入SFT的狀態下，依照提供的檔案格式，自動執行SFT進出站並提供完成後對應的移轉單號。\n\n## (輸出)預期輸出成果\n減少逐筆過站的工作時間\n\n## 任務步驟或處理邏輯\n1.開啟「委外報表」→尋找該委外回貨的製令、品號、數量\n2.登入SFT，選擇委外回貨的製程工作站\n3.功能列製令追蹤→進站/外包簽收→尋找該回貨製令→檢視→維護數量→外包簽收\n4.功能列製令追蹤→出站/外包完成→尋找該回貨製令→檢視→維護數量→維護人時0→外包完成→產生移轉單號\n5.將產生的移轉單維護回「委外報表」\n\n## 資料\n1.SFT網頁:http://192.168.10.39:8100/SFT/main/centerPage/centerPage.jsp?locale=zh_TW\n2.委外報表\n3.預計提供給AI，供其辨識的整理報表「SFT-AI進出站報表格式_資料提供」\n\n## 其他資訊\n- 部門：生/物管部\n- 人員：鄭佳儀\n- 每次執行耗費時間：1.5分鐘/筆\n- 每月執行頻率：工作天至少執行2~3次\n- 有需求的人數：5"}, {"id": 55, "title": "●主機資料夾權限自動建立 / ●ERP 權限自動開通與異動", "slotCode": "X", "slotText": "X · 建議延後", "slotTitle": "X 建議延後", "slotTime": "建議延後", "slotSummary": "15 題", "slotOrder": 7, "agendaOrder": 51, "agendaGroup": "#55", "department": "資訊部門", "owner": "羅銘輝", "time": "30分鐘", "frequency": "20次", "people": "22", "input": "- 新進人員需建立共用資料夾權限\n- 部門異動需調整存取權限\n- 權限申請流程人工處理耗時\n- ERP 帳號建立流程繁瑣\n- 容易發生權限錯誤或遺漏\n- 離職未即時停權有資安風險", "output": "- 自動建立 AD / NAS / 共用資料夾權限\n- 依部門與職務自動套用權限模板\n- 保留權限異動紀錄供稽核查詢\n- 自動建立 ERP 帳號\n- 依職務自動套用角色權限\n- 權限異動自動化\n- 自動停用離職帳號\n- 自動寄送權限開通通知", "logic": "1. 使用者填寫權限申請表單\n2. AI 判斷部門/職務對應權限群組\n3     const slots = [{"code": "A", "title": "A 財務部", "time": "09:00-10:00", "label": "A · 09:00-10:00 財務部", "summary": "9 題"}, {"code": "C", "title": "C 業務+生物管", "time": "10:10-11:30", "label": "C · 10:10-11:30 業務+生物管", "summary": "15 題"}, {"code": "B", "title": "B 合約比對", "time": "11:30-12:00", "label": "B · 11:30-12:00 合約比對", "summary": "2 題"}, {"code": "D", "title": "D 圖面辨識", "time": "13:00-14:00", "label": "D · 13:00-14:00 圖面辨識", "summary": "8 題"}, {"code": "E", "title": "E 生產製造", "time": "14:00-14:45", "label": "E · 14:00-14:45 生產製造", "summary": "4 題"}, {"code": "F", "title": "F 商機研究", "time": "15:00-15:30", "label": "F · 15:00-15:30 商機研究", "summary": "5 題"}, {"code": "G", "title": "G 其他+收斂", "time": "15:30-16:00", "label": "G · 15:30-16:00 其他+收斂", "summary": "13 題"}, {"code": "X", "title": "X 建議延後", "time": "建議延後", "label": "X · 建議延後", "summary": "15 題"}, {"code": "UNSCHEDULED", "title": "未排程", "time": "待確認", "label": "未排程 · 待確認", "summary": "1 題"}];
    const departments = ["QA", "光能事業部", "品保部", "廠務部", "技術開發部", "採購部", "採購部、生物管、品保、工程", "業務部", "機構設計課", "生/物管部", "產品設計課", "產品開發部", "矽加工製造課", "稽核室", "總管理處", "芝和業務部", "行政服務部", "製造", "製造處", "財務部", "資訊部門", "進出口"];
    const listEl = document.getElementById("requirementList");
    const detailEl = document.getElementById("detail");
    const searchInput = document.getElementById("searchInput");
    const departmentFilter = document.getElementById("departmentFilter");
    const slotFilter = document.getElementById("slotFilter");
    const resultCount = document.getElementById("resultCount");
    const activeHint = document.getElementById("activeHint");
    const copyButton = document.getElementById("copyButton");
    const copyAllButton = document.getElementById("copyAllButton");
    const toast = document.getElementById("toast");

    let activeId = requirements[0]?.id ?? null;
    let filtered = [...requirements];
    let toastTimer = null;

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalize(value) {
      return String(value).toLowerCase();
    }

    function setDepartments() {
      departmentFilter.innerHTML = [
        '<option value="">全部部門</option>',
        ...departments.map((department) => `<option value="${escapeHtml(department)}">${escapeHtml(department)}</option>`)
      ].join("");
    }

    function setSlots() {
      slotFilter.innerHTML = [
        '<option value="">全部時段</option>',
        ...slots.map((slot) => `<option value="${escapeHtml(slot.code)}">${escapeHtml(slot.label)}（${escapeHtml(slot.summary)}）</option>`)
      ].join("");
    }

    function getSearchText(item) {
      return [
        item.title,
        item.slotText,
        item.agendaGroup,
        item.department,
        item.owner,
        item.input,
        item.output,
        item.logic,
        item.data
      ].join("\n");
    }

    function applyFilters() {
      const query = normalize(searchInput.value.trim());
      const department = departmentFilter.value;
      const slotCode = slotFilter.value;

      filtered = requirements.filter((item) => {
        const matchesDepartment = !department || item.department === department;
        const matchesSlot = !slotCode || item.slotCode === slotCode;
        const matchesQuery = !query || normalize(getSearchText(item)).includes(query);
        return matchesDepartment && matchesSlot && matchesQuery;
      });

      if (!filtered.some((item) => item.id === activeId)) {
        activeId = filtered[0]?.id ?? null;
      }

      renderList();
      renderDetail();
    }

    function renderList() {
      resultCount.textContent = `顯示 ${filtered.length} 筆`;
      activeHint.textContent = activeId ? `目前 #${activeId}` : "";

      if (!filtered.length) {
        listEl.innerHTML = '<div class="empty">沒有符合條件的需求</div>';
        return;
      }

      listEl.innerHTML = slots.map((slot) => {
        const items = filtered.filter((item) => item.slotCode === slot.code);
        if (!items.length) return "";
        return `
          <section class="slot-group">
            <div class="slot-heading">
              <span>${escapeHtml(slot.label)}</span>
              <span class="slot-count">${items.length} 筆 / 原規劃 ${escapeHtml(slot.summary)}</span>
            </div>
            ${items.map((item) => `
              <button class="item ${item.id === activeId ? "active" : ""}" type="button" data-id="${item.id}">
                <span class="item-title">${item.id}. ${escapeHtml(item.title)}</span>
                <span class="item-meta">
                  ${item.agendaGroup === `#${item.id}` ? "" : `<span class="agenda-tag">${escapeHtml(item.agendaGroup)}</span>`}
                  <span>${escapeHtml(item.department)}</span>
                  <span>${escapeHtml(item.owner)}</span>
                </span>
              </button>
            `).join("")}
          </section>
        `;
      }).join("");
    }

    function renderDetail() {
      const item = requirements.find((entry) => entry.id === activeId);
      copyButton.disabled = !item;

      if (!item) {
        detailEl.innerHTML = '<div class="empty">請重新調整搜尋或篩選條件</div>';
        return;
      }

      detailEl.innerHTML = `
        <section class="detail-head">
          <div class="detail-title-row">
            <h2 class="detail-title">${item.id}. ${escapeHtml(item.title)}</h2>
          </div>
          <div class="meta-grid">
            ${metaItem("顧問日時段", item.slotText)}
            ${metaItem("題組", item.agendaGroup)}
            ${metaItem("部門", item.department)}
            ${metaItem("人員", item.owner)}
            ${metaItem("每次耗時", item.time)}
            ${metaItem("每月頻率", item.frequency)}
            ${metaItem("需求人數", item.people)}
          </div>
        </section>

        <div class="sections">
          ${sectionItem("(輸入)希望 AI 處理的問題", item.input)}
          ${sectionItem("(輸出)預期輸出成果", item.output)}
          ${sectionItem("任務步驟或處理邏輯", item.logic)}
          ${sectionItem("資料", item.data)}
        </div>
      `;
    }

    function metaItem(label, value) {
      return `
        <div class="meta">
          <div class="meta-label">${escapeHtml(label)}</div>
          <div class="meta-value">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function sectionItem(title, value) {
      return `
        <section class="section">
          <h3>${escapeHtml(title)}</h3>
          <pre>${escapeHtml(value)}</pre>
        </section>
      `;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }
      showToast();
    }

    function showToast() {
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    listEl.addEventListener("click", (event) => {
      const button = event.target.closest("[data-id]");
      if (!button) return;
      activeId = Number(button.dataset.id);
      renderList();
      renderDetail();
    });

    searchInput.addEventListener("input", applyFilters);
    departmentFilter.addEventListener("change", applyFilters);
    slotFilter.addEventListener("change", applyFilters);

    copyButton.addEventListener("click", () => {
      const item = requirements.find((entry) => entry.id === activeId);
      if (item) copyText(item.markdown);
    });

    copyAllButton.addEventListener("click", () => {
      copyText(requirements.map((item) => item.markdown).join("\n\n---\n\n"));
    });

    setDepartments();
    setSlots();
    applyFilters();
  </script>
