標(經測試確認)\n\n不涵蓋:\n- 人為損壞、誤用\n- 未依規格使用導致的損壞\n- 開箱後超過 30 天才回報的外觀瑕疵\n\n================================================================\n二、訂單與出貨\n================================================================\n\n## Q4. 一般訂單的處理時程?\nA: 標準訂單流程:\n- 下單後 1-2 工作日:訂單確認與付款排程\n- 確認後 2-4 週:依產品類別生產與出貨\n- 出貨後 3-5 工作日(海運 25-35 天):送達\n\n## Q5. 是否可以加急?\nA: 可以,加急訂單需另行協商加急費用,通常為訂單金額的 5-10%,可縮短交期 30-50%。\n\n## Q6. 最小起訂量(MOQ)?\nA: 依產品而異:\n- 變壓器、主機板:100 pcs\n- LED、感測器:500-1000 pcs\n- 客製品:依專案而定\n\n================================================================\n三、認證\n================================================================\n\n## Q7. 公司有哪些認證?\nA: 公司管理系統認證:\n- ISO 9001 品質管理(2010)\n- ISO 14001 環境管理(2015)\n- IATF 16949 車用品管(2018)\n- ISO 27001 資安管理(2022)\n\n產品認證能力:UL、CE、FCC、AEC-Q100/Q200、IEC 60601。\n\n## Q8. 可以提供哪些認證文件?\nA: 可提供:\n- COC(符合性聲明)\n- 認證證書副本\n- PPAP 完整文件(車用)\n- 8D 報告(品質異常)\n- SDS(化學品)\n\n================================================================\n四、付款條件\n================================================================\n\n## Q9. 標準付款條件?\nA: 標準:月結 60 天,銀行匯款。\n- 大型專案:30% 訂金、40% 出貨前、30% 驗收後\n- 新客戶首三筆訂單:採貨到付款(COD)\n- VIP 客戶:可協商月結 90 天\n\n## Q10. 接受哪些付款方式?\nA: 接受方式:\n- 電匯(T/T)\n- 信用狀(L/C)\n- 信用卡(限小額,5 萬以內)\n\n================================================================\n五、退換貨\n================================================================\n\n## Q11. 收貨後發現品質問題怎麼辦?\nA: 請於收貨後 7 個工作天內提出書面異議。流程:\n1. 拍照或錄影紀錄不良情形\n2. 填寫客訴單(可向業務窗口索取)\n3. 我司 24 小時內登錄客訴並啟動 8D 流程\n4. 48 小時內提出暫時對策\n\n## Q12. 退換貨的運費誰負擔?\nA: 因品質問題退換貨,運費由我司負擔。其他原因(例如客戶下錯訂單)由客戶負擔。\n\n================================================================\n六、樣品\n================================================================\n\n## Q13. 是否提供樣品?\nA: 可。\n- 標準樣品:5-10 pcs,2 週內提供,免費\n- 客製樣品:依複雜度約 4-6 週,費用視產品而定(於正式訂單中扣抵)\n\n================================================================\n七、客服窗口\n================================================================\n\n## Q14. 客服聯絡方式?\nA:\n- 業務:business@company.com\n- 品保:qa@company.com\n- 客服專線:+886-3-XXX-XXXX(週一至週五 9:00-18:00)\n- LINE 客服:@companycare(24 小時可留訊)\n\n【本文件版本:2026-04 / 教學示範用 FAQ】\n"}, "binary_files": [], "deploy_text": "# B2B 智慧客服 — 正式上線指南\n\n本文件協助您把 Prompt Designer 產出的 Agent 從「概念驗證」推向「正式上線」。\n建議由種子團隊以一週為單位推進：第一週 KB 準備、第二週 Agent 建置與驗測、第三週試營運、第四週正式上線。\n\n---\n\n## 一、部署前置作業\n\n### 1. 知識庫準備\n\n1. **向量 KB**:由業務與客服共同整理 FAQ 文件,涵蓋產品、保固、出貨、付款、認證、退換貨等常見問題。\n2. **表格 KB**:從 ERP/CRM 匯出訂單資料,**客戶名稱用代碼或匿名化**(例如 C-001 / 客戶 A),避免洩露真實客戶資料。\n3. 編碼 UTF-8 BOM。\n\n### 2. 確認權限與工作室\n\n- 在 EgentHub 後台建立或選擇對應的工作室（例如：人資、品保、業務 BU）。\n- 確認您的角色為「工作室管理員」或「開發者」，才能建立 Agent 與上傳 KB。\n- 確認工作室點數額度足夠（建議至少預留一個月用量緩衝）。\n\n---\n\n## 二、在 EgentHub 建立 Agent\n\n### Step 1：建立 Agent 並選擇模型\n登入 EgentHub 後台 → 選擇工作室 → 「建立 Agent」 →\n- Agent 名稱：B2B 智慧客服\n- 預設模型：建議 Claude Sonnet 或 Gemini Pro\n- 描述：（複製需求盤點檔案中第一段「角色定位」）\n\n### Step 2：貼入 Prompt Designer 產出的提示詞\n將 Prompt Designer 產出的提示詞完整複製貼上，注意保留「問答指引」段落不要修改。\n\n### Step 3：上傳知識庫\n1. 進入 Agent 編輯頁。\n2. 上傳向量 KB:「向量知識庫」 → 上傳 公司產品與服務FAQ.txt。\n3. 上傳表格 KB:「表格查詢知識庫」 → 上傳 訂單表.csv。\n4. 兩種 KB 都需上傳成功並各別測試。\n5. 整合測試:輸入「ORD-2026-00125 到哪了?」確認 Agent 從訂單表查詢。\n6. 整合測試:輸入「保固期多久?」確認 Agent 從 FAQ 查詢。\n\n### Step 4：設定使用者與群組可見性\n- 開發階段：限定種子團隊試用。\n- 試營運階段：擴大到部門 5-10 位種子使用者。\n- 正式上線：開放給目標部門全員。\n\n---\n\n## 三、提示詞調校建議\n\n- 若 Agent 偏向只用一種 KB,請在「執行流程」加上:「先判斷問題類型(產品/訂單/客訴),再使用對應 KB」。\n- 若 Agent 過於冰冷,請在「溝通風格指引」加上:「親切但專業,使用『您』而非『你』」。\n- 若 Agent 在客訴情境直接給方案缺乏同理心,加上:「客訴情境必須先表達同理心(『非常抱歉造成您的不便』),再提供方案」。\n- 若 Agent 嘗試處理改訂單、退款等請求,加上:「超出權限範圍,禮貌說明無法處理並提供正確窗口」。\n- 若 Agent 洩露其他客戶資料,加上:「僅查詢當前對話客戶的訂單,不洩露其他客戶資訊」。\n\n---\n\n## 四、驗測情境（建議至少跑過以下案例）\n\n1. **正向案例 - 產品諮詢**: 輸入「保固期多久?」\n   - 預期：從 FAQ 引用 Q1 答覆,標準保固 1 年\n2. **正向案例 - 訂單查詢**: 輸入「ORD-2026-00125 到哪了?」\n   - 預期：從訂單表查到客戶 B、200 pcs、已出貨、物流號 SF-2026-005\n3. **正向案例 - 組合問題**: 輸入「ORD-2026-00120 是什麼產品?保固多久?」\n   - 預期：從訂單表 + FAQ 整合答覆\n4. **邊界案例 - 客訴處理**: 輸入「上週收到 5 個不良,你們是怎麼搞的!」\n   - 預期：先表達同理心,再說明客訴流程,提供品保窗口\n5. **邊界案例 - 超出權限**: 輸入「幫我把訂單改成 1000 個」\n   - 預期：禮貌說明無法處理,提供業務窗口\n6. **邊界案例 - 跨客戶查詢**: 輸入「ORD-2026-00121 是不是客戶 X 訂的?」\n   - 預期：禮貌拒絕,不洩露其他客戶資訊\n\n---\n\n## 五、上線檢核清單\n\n- [ ] FAQ 已由業務 / 客服主管核可\n- [ ] 訂單表已脫敏(客戶名稱代碼化)\n- [ ] 提示詞已設計問題分類路由\n- [ ] 提示詞已加上「不洩露其他客戶資訊」保護\n- [ ] 提示詞已加上「客訴先同理心」與「異常升級給人工」\n- [ ] 至少 5 位種子使用者試用 1 週\n- [ ] 已建立人工升級的標準流程\n\n---\n\n## 六、上線後維運建議\n\n- 蒐集 Agent 升級給人工的案例,分析升級原因,擴充 FAQ。\n- 進階版:整合 LINE 官方帳號 / 網頁 Widget,提供 24 小時客服。\n- 進階版:整合 CRM,自動建立客訴單與追蹤。\n- 與「庫存管理助手」整合,客戶詢問交期時可直接查到庫存與在途狀態。\n\n---\n\n## 七、常見問題\n\n**Q1: Agent 回答不準確？**\n先檢查 KB 內容是否完整、條文是否清晰；其次調整提示詞中的「執行流程」與「輸出格式」。\n\n**Q2: 同事抱怨 Agent 太囉嗦？**\n在提示詞「輸出格式」中明確要求字數限制或結構（例如：條列三點以內、不超過 200 字）。\n\n**Q3: 找不到對應內容時應如何處理？**\n在提示詞中加上：「若知識庫中無法找到答案，請明確回覆『此問題未在現有資料中，建議您聯繫 [窗口] 進一步確認』，切勿自行推測。」\n\n---\n\n如有導入問題請聯繫精誠資訊 EgentHub 顧問團隊。\n"}, {"dir": "08_混合_向量加表格_行銷助理", "agent_name": "行銷助理", "kb_label": "混合知識庫 (向量+表格)", "track": "main", "order": 8, "requirement_text": "# 需求盤點:智造行銷助理\n\n> 學員操作說明:請將以下「需求描述」段落整段複製,貼入 EgentHub Prompt Designer 的「需求描述」欄位,讓系統引導您完成提示詞建構。\n>\n> 本題對應 TEEMA 工作坊「行銷助理 AI Agent」單元,展示「混合 KB + Few-shot 範例模仿」進階應用。\n>\n> 預計操作時間:60 分鐘以上。\n\n---\n\n## 一、Agent 基本資料\n- **Agent 名稱**:智造行銷助理\n- **所屬工作室**:行銷 / 業務\n- **使用對象**:行銷企劃、業務 PM\n- **預設模型建議**:Claude Sonnet 或 GPT-4o\n\n---\n\n## 二、需求描述(請整段複製到 Prompt Designer)\n\n### 1. 應用場景\n電子製造業 B2B 行銷有三大痛點:產品規格複雜文案耗時(一封 EDM 可能花 2-3 小時)、客群分散訊息難客製、市場變動快策略跟不上。希望 AI 助理協助快速產出高品質的行銷文案、EDM、展會文宣、社群貼文與客群分析。\n\n### 2. 希望 AI 處理的問題\n- 寫一封 EDM 要花 2-3 小時,規格細節要逐項對齊\n- 不同客群(OEM 大廠 / 通路商 / 中小製造商 / 海外客戶)語氣要客製\n- 展會文宣中英對照很花時間\n- LinkedIn 與 FB 字數限制不同要重寫\n- 業務想知道新產品該攻哪些客戶\n\n### 3. 預期輸出內容\n- **產品文案**:標題、副標、內文 + CTA\n- **EDM**:主旨行 x 3 + 前言 + 主體 + CTA + PS\n- **展會文宣**:中英標語、三產品亮點、攤位邀約文\n- **社群貼文**:LinkedIn 200-300 字 / FB 100-200 字\n- **客群分析**:配適度評分、優先順序、渠道建議\n\n### 4. 任務步驟 & 邏輯\n1. 接收使用者需求(任務類型 + 產品 + 目標客群)。\n2. 從向量 KB 找市場洞察與品牌風格指南。\n3. 從表格 KB 找客戶名單與屬性。\n4. 依目標客群代碼匹配語氣(A 專業嚴謹 / B 務實直接 / C 親切白話 / D 專業國際化)。\n5. 模仿提示詞中的 Few-shot 範例,產出符合品牌風格的內容。\n6. 涉及報價、議價、合約條款、客戶機密、品牌策略重大決策 → 拒答,引導至業務窗口。\n\n### 5. 知識庫/資料庫\n**混合知識庫 + Few-shot 範例**:\n1. **向量知識庫**:市場研究報告 / 產業分析 TXT 或 PDF\n2. **表格查詢知識庫**:客戶名單 CSV(客戶代碼、客群類別 A/B/C/D、產業、規模、地區)\n3. **向量知識庫**:品牌風格指南 + 過往轉換率高的成功文案\n4. **Few-shot 範例**:在提示詞中內嵌 2-3 個完美範例(EDM、社群貼文),讓 AI 模仿風格\n", "prompt_input": "# 需求盤點:智造行銷助理\n\n> 學員操作說明:請將以下「需求描述」段落整段複製,貼入 EgentHub Prompt Designer 的「需求描述」欄位,讓系統引導您完成提示詞建構。\n>\n> 本題對應 TEEMA 工作坊「行銷助理 AI Agent」單元,展示「混合 KB + Few-shot 範例模仿」進階應用。\n>\n> 預計操作時間:60 分鐘以上。\n\n---\n\n## 一、Agent 基本資料\n- **Agent 名稱**:智造行銷助理\n- **所屬工作室**:行銷 / 業務\n- **使用對象**:行銷企劃、業務 PM\n- **預設模型建議**:Claude Sonnet 或 GPT-4o\n\n---\n\n## 二、需求描述(請整段複製到 Prompt Designer)\n\n### 1. 應用場景\n電子製造業 B2B 行銷有三大痛點:產品規格複雜文案耗時(一封 EDM 可能花 2-3 小時)、客群分散訊息難客製、市場變動快策略跟不上。希望 AI 助理協助快速產出高品質的行銷文案、EDM、展會文宣、社群貼文與客群分析。\n\n### 2. 希望 AI 處理的問題\n- 寫一封 EDM 要花 2-3 小時,規格細節要逐項對齊\n- 不同客群(OEM 大廠 / 通路商 / 中小製造商 / 海外客戶)語氣要客製\n- 展會文宣中英對照很花時間\n- LinkedIn 與 FB 字數限制不同要重寫\n- 業務想知道新產品該攻哪些客戶\n\n### 3. 預期輸出內容\n- **產品文案**:標題、副標、內文 + CTA\n- **EDM**:主旨行 x 3 + 前言 + 主體 + CTA + PS\n- **展會文宣**:中英標語、三產品亮點、攤位邀約文\n- **社群貼文**:LinkedIn 200-300 字 / FB 100-200 字\n- **客群分析**:配適度評分、優先順序、渠道建議\n\n### 4. 任務步驟 & 邏輯\n1. 接收使用者需求(任務類型 + 產品 + 目標客群)。\n2. 從向量 KB 找市場洞察與品牌風格指南。\n3. 從表格 KB 找客戶名單與屬性。\n4. 依目標客群代碼匹配語氣(A 專業嚴謹 / B 務實直接 / C 親切白話 / D 專業國際化)。\n5. 模仿提示詞中的 Few-shot 範例,產出符合品牌風格的內容。\n6. 涉及報價、議價、合約條款、客戶機密、品牌策略重大決策 → 拒答,引導至業務窗口。\n\n### 5. 知識庫/資料庫\n**混合知識庫 + Few-shot 範例**:\n1. **向量知識庫**:市場研究報告 / 產業分析 TXT 或 PDF\n2. **表格查詢知識庫**:客戶名單 CSV(客戶代碼、客群類別 A/B/C/D、產業、規模、地區)\n3. **向量知識庫**:品牌風格指南 + 過往轉換率高的成功文案\n4. **Few-shot 範例**:在提示詞中內嵌 2-3 個完美範例(EDM、社群貼文),讓 AI 模仿風格", "kb_text_files": {"知識庫_市場研究報告.txt": "# 電子零件市場研究報告(向量知識庫範本)\n\n> 本文件為教學示範摘要,實際請以最新研究機構報告為準。\n\n================================================================\n2026 全球電子零件市場概況\n================================================================\n\n【市場規模】\n- 2026 年全球被動元件市場約 350 億美元,YoY 成長 5.2%。\n- LED 模組市場約 280 億美元,受惠車用、工業照明需求。\n- 工業電腦市場約 150 億美元,AI 邊緣計算驅動。\n\n【主要驅動力】\n1. **電動車普及**:車用變壓器、電源、感測器需求增加。\n2. **AI 邊緣計算**:工業電腦、IoT 模組市場快速擴大。\n3. **綠能轉型**:儲能系統、太陽能模組驅動電力電子需求。\n4. **5G/6G 通訊**:高頻通訊模組需求高漲。\n\n================================================================\n分客群市場洞察\n================================================================\n\n【OEM 大廠(歐美日)】\n- 採購重點:品質認證(IATF / AEC-Q)、供貨穩定、長期合作。\n- 決策週期:6-18 個月。\n- 採購規模:單筆通常 50K pcs 以上。\n- 行銷重點:技術白皮書、認證背書、案例分享。\n- 偏好渠道:LinkedIn 技術社群、產業研討會、直接拜訪。\n\n【通路商】\n- 採購重點:價格競爭力、備貨量、退換貨彈性。\n- 決策週期:1-2 個月。\n- 採購規模:中小批量,但頻率高。\n- 行銷重點:價格優惠、庫存清單、促銷活動。\n- 偏好渠道:EDM、展會、通路 B2B 平台。\n\n【中小製造商】\n- 採購重點:彈性交期、技術支援、低 MOQ。\n- 決策週期:1-4 週。\n- 採購規模:小量多樣。\n- 行銷重點:技術支援承諾、客製化能力、案例。\n- 偏好渠道:Email、電話、產業社群。\n\n【海外客戶(東南亞 / 中東 / 拉美)】\n- 採購重點:國際認證(CE / FCC / RoHS)、合規性、英文技術文件。\n- 決策週期:2-6 個月。\n- 採購規模:中型批量。\n- 行銷重點:認證背書、英文技術文件、現地服務承諾。\n- 偏好渠道:LinkedIn、英文電子報、線上展會。\n\n================================================================\n產品線趨勢\n================================================================\n\n【變壓器 / 電源】\n- 高效率(>95%)、小型化、寬溫範圍。\n- 車用市場成長最快,需 AEC-Q 認證。\n\n【LED 模組】\n- 車用、植物照明、Mini-LED 顯示為三大成長動能。\n- 對色溫穩定性、抗 EMI 要求提升。\n\n【工業電腦】\n- 邊緣 AI 推動高效能、低功耗需求。\n- 長生命週期(5-10 年)是 ODM 的核心價值。\n\n【通訊模組】\n- Wi-Fi 6E / 7 取代舊有 Wi-Fi 6。\n- 5G FWA 市場進入規模化階段。\n\n【感測器】\n- 車用、IoT、醫療為三大應用。\n- 整合化(感測 + 邊緣 AI)是趨勢。\n\n================================================================\n2026 行銷重點建議\n================================================================\n\n1. **強化技術內容**:白皮書、案例研究、技術部落格。\n2. **聚焦垂直應用**:車用、工業 AI、綠能,各自有專屬渠道與訊息。\n3. **善用 LinkedIn**:B2B 決策者最活躍的平台。\n4. **展會雙軌**:大型實體展(COMPUTEX、Electronica)+ 線上展會。\n5. **品牌一致性**:不論在哪個渠道,品牌語氣與視覺要一致。\n\n【本文件版本:2026-04 / 教學示範摘要】\n", "知識庫_Few-shot文案範例.txt": "# Few-shot 文案範例(內嵌至提示詞用)\n\n> 本文件提供 3 個「轉換率高 / 客戶反應好」的真實風格範例,涵蓋 EDM、LinkedIn 貼文、展會邀約。\n> **使用方式**:把這些範例**內嵌到 Agent 提示詞的「執行流程」末尾**,作為 Few-shot 教學素材,讓 AI 模仿這些範例的語氣、結構、結尾方式。\n> 這就是 Few-shot Learning 的精神 —— 「給 AI 看『好的答案』長什麼樣子」。\n\n================================================================\n範例 1:EDM(新品發表,目標客群 A — OEM 大廠)\n================================================================\n\n**情境**:寄給長期合作的車用 Tier 1 客戶,介紹新一代車用變壓器\n**產品**:PROD-A-001 高效率變壓器 12V/5A(新版本)\n**客群**:A(OEM 大廠)\n**語氣**:專業嚴謹、技術導向\n\n---\n\n**主旨行 (3 版本)**:\n1. PROD-A-001 v2 — AEC-Q200 升級版,效率達 96%\n2. Reliability Reinforced: Next-Gen 12V/5A Transformer\n3. 為您的下一代電源平台,我們重新打磨了這顆變壓器\n\n**前言**:\nDear Mr. [Name],\n\nI hope this message finds you well. Following our discussion at the last technical review in Q1, we are pleased to share the next-generation update of PROD-A-001.\n\n**主體**:\nThe new revision delivers three concrete improvements aligned with your platform roadmap:\n\n- **Peak efficiency raised from 92% to 96%** — validated across full load range, contributing to ECU thermal budget reduction\n- **AEC-Q200 Grade 1 qualification refreshed** — full PPAP package available, including DPPM history of the last 12 batches\n- **Dimensional compatibility preserved** — drop-in replacement, no PCB layout change required\n\nProduction samples are ready, and we are prepared to support your DV/PV cycle in parallel with our internal validation.\n\n**CTA**:\nCould we schedule a 30-minute technical briefing with your platform team in the coming two weeks? Please let me know a time that works.\n\n**PS**:\nPPAP documentation and the latest DPPM trend chart are attached for your reference. Mandarin version available upon request.\n\nBest regards,\n[Your Name]\n\n================================================================\n範例 2:LinkedIn 貼文(技術分享,目標客群 D — 海外客戶)\n================================================================\n\n**情境**:LinkedIn 公司頁面發布技術洞察文,吸引海外 Tier 2 / 整合商\n**主題**:溫度感測器在低溫應用的設計挑戰\n**字數**:240 字\n**語氣**:專業國際化、教育性質\n\n---\n\n🌡️ **Why Most Temperature Sensors Fail Below -30°C — And How We Engineered Around It**\n\nIn the past 12 months, we've worked with three OEM teams designing for cold-chain logistics, EV battery management, and aerospace test rigs. They share one common challenge:\n\n📉 **Temperature drift at the low end (-40°C to -20°C)** — even when datasheets claim ±1°C accuracy, real-world deviations often exceed ±2.5°C.\n\nThe root cause? Calibration equipment itself drifts at extreme temperatures. Most factories validate sensors at room temperature and trust the linearity curve.\n\n🔬 **Our approach with PROD-E-001:**\n1. **Three-point validation** — every batch validated at -40°C, 25°C, and 125°C\n2. **Monthly calibration equipment recertification** — not annually\n3. **Per-batch deviation report** delivered with shipment\n\nThe result: customers can confidently design for cold-chain applications without adding redundant compensation circuits.\n\nLooking to validate this for your next platform? Drop us a message — we'd be glad to share the full validation methodology.\n\n#TemperatureSensor #AECQ100 #ColdChain #EVBattery #PrecisionEngineering #B2BManufacturing\n\n================================================================\n範例 3:展會邀約(中英對照,目標客群 B — 通路商)\n================================================================\n\n**情境**:COMPUTEX 2026 攤位邀約,寄給亞洲區通路商\n**展覽**:COMPUTEX 2026(2026/06/03-06,台北南港展覽館)\n**客群**:B(通路商)\n**語氣**:務實直接、實用價值導向\n\n---\n\n**中英標語**:\nVisit Us @ COMPUTEX 2026 — 全新通路專屬方案,等您現場談\nSmarter Partnership, Faster Inventory.\n\n**三大產品亮點**:\n1. **3 款主力 LED 模組新版本上架** — 通路 MOQ 從 1,000 pcs 下調至 500 pcs\n2. **48 小時急單方案** — 庫存 30 款主力料件,可現場下單預訂\n3. **2026 H2 通路促銷預告** — 現場展位簽約客戶享 Q3 額外 3% rebate\n\n**攤位邀約文**:\n\n親愛的合作夥伴,您好!\n\n每年 COMPUTEX 都是我們與通路夥伴最直接的會面機會,2026 年的我們做了三件「您一定會喜歡」的事:\n\n✅ **降低主力料件 MOQ** — 讓您能用更少資金備齊更多品項\n✅ **48 小時急單方案** — 您接到客戶急單時,我們有現貨等您\n✅ **Q3 額外 rebate** — 現場簽約獨享\n\n📅 **時間**:2026/06/03(三)~ 06/06(六)\n📍 **地點**:台北南港展覽館 1 館 4 樓,**M0817 攤位**\n🎁 **限量好禮**:現場登記諮詢即贈 PROD-A-001 工程樣品組(限量 50 組)\n\n掃描下方 QR Code 預約您的拜訪時段,我們將安排專人提供 1 對 1 諮詢:\n[QR Code Placeholder]\n\n期待現場與您面對面交流!\n\n[Your Name]\n通路業務部 | 智造製造\n\n================================================================\n教學重點:Few-shot 為什麼有效?\n================================================================\n\n對比兩種提示詞:\n\n❌ **沒有 Few-shot 的提示詞**:\n\"請為 PROD-A-001 寫一封 EDM,目標客群是 OEM 大廠。\"\n→ AI 可能寫得太冷、太行銷化、太多形容詞、結尾不明確。\n\n✅ **有 Few-shot 的提示詞**:\n\"請為 PROD-A-001 寫一封 EDM,目標客群是 OEM 大廠。\n請參考以下範例的結構、語氣、CTA 寫法:\n[範例 1 的完整內容]\"\n→ AI 會模仿範例的「先給三個具體改進、用數據支持、CTA 提議 30 分鐘技術會議、PS 提供文件」這套結構。\n\n**重點**:Few-shot 不是給「題目」,而是給「答案的模樣」。\n\n【本文件版本:2026-04 / 教學示範用】\n", "知識庫_客戶名單.csv": "客戶代碼,客戶名稱,客群類別,產業,規模,地區,主要採購類別,上次接觸日,合作年數,潛在價值\nC-001,客戶 A,A,汽車電子,大型,德國,變壓器/感測器,2026-04-10,8,高\nC-002,客戶 B,A,工業自動化,大型,美國,主機板/電源,2026-04-08,5,高\nC-003,客戶 C,B,3C 通路,大型,台灣,LED 模組,2026-03-25,3,中\nC-004,客戶 D,B,電子零件通路,中型,中國,通訊模組,2026-04-15,2,中\nC-005,客戶 E,C,影音設備製造,中型,台灣,LED 模組/變壓器,2026-04-02,4,中\nC-006,客戶 F,C,中小型 IoT,小型,台灣,感測器/通訊模組,2026-04-12,1,低\nC-007,客戶 G,C,工業設備,中型,日本,工業電源,2026-04-18,2,中\nC-008,客戶 H,D,家電製造,大型,印尼,變壓器/電源,2026-03-15,1,高(待開發)\nC-009,客戶 I,D,智慧家庭,中型,越南,通訊模組/感測器,2026-04-05,1,中\nC-010,客戶 J,D,醫療器材,中型,德國,感測器/電源,2026-04-20,3,高\nC-011,客戶 K,A,航太,大型,美國,高功率變壓器,2026-02-28,6,高\nC-012,客戶 L,A,儲能系統,大型,英國,電池模組/變壓器,2026-04-22,4,高\nC-013,客戶 M,B,工控通路,中型,台灣,主機板/工業電腦,2026-04-01,3,中\nC-014,客戶 N,C,新創 IoT,小型,台灣,感測器/Wi-Fi 模組,2026-04-25,1,中(待培養)\nC-015,客戶 O,D,智慧城市,大型,沙烏地阿拉伯,LED/通訊模組,2026-03-10,2,高(待開發)\n", "知識庫_品牌風格指南.txt": "# 品牌風格指南(教學示範範本)\n\n> 本文件為教學示範用,實際請依貴公司品牌準則為準。\n> 上傳到向量知識庫後,可作為 AI 撰寫文案時的「語氣與用詞參照」。\n\n================================================================\n一、品牌核心定位\n================================================================\n\n【品牌精神】\n- 專業可靠(Reliability)\n- 技術扎實(Technical Excellence)\n- 客戶共榮(Partnership for Growth)\n\n【一句話品牌承諾】\n\"Empowering Innovation Through Reliable Components.\"\n\n【中文品牌口號】\n「為您的創新,提供值得信賴的零件夥伴。」\n\n================================================================\n二、目標客群分類與語氣指引\n================================================================\n\n| 客群 | 代碼 | 溝通重點 | 語氣風格 | 用詞傾向 |\n|---|---|---|---|---|\n| OEM 大廠 | A | 品質認證、供貨穩定、長期合作 | 專業嚴謹 | 多用認證縮寫(IATF, AEC-Q)、技術數據 |\n| 通路商 | B | 價格競爭力、備貨量、退換貨彈性 | 務實直接 | 多用「實惠」「彈性」「快速」 |\n| 中小製造商 | C | 彈性交期、技術支援、低 MOQ | 親切白話 | 避免術語,多用「協助」「陪伴」「客製」 |\n| 海外客戶 | D | 國際認證、合規性、英文技術文件 | 專業國際化 | 中英並列,強調 ISO/CE/RoHS |\n\n================================================================\n三、語氣規範\n================================================================\n\n【一律使用】\n- 「您」而非「你」(對外文案)\n- 「敝公司 / 我司」(自稱)\n- 「合作夥伴」「客戶」(對方稱呼)\n- 主動句優先,被動句少用\n\n【一律避免】\n- 過度口語化的「啦」「囉」「喔」\n- 行業術語不解釋(尤其對 C / D 客群)\n- 誇大用語(「業界最強」「市場唯一」)\n- 與政治、宗教、競品比較等敏感議題\n\n【emoji 使用原則】\n- B2B 正式文案(EDM、白皮書):禁用\n- 社群貼文(LinkedIn 中性、FB 友善):可用,每則不超過 2 個\n\n================================================================\n四、視覺與排版規範\n================================================================\n\n【主色】\n- 品牌主色:科技藍 #0066CC\n- 輔助色:沉穩灰 #595959、亮點橙 #FF7A00\n\n【字型】\n- 中文:思源黑體 / 微軟正黑體\n- 英文:Inter / Helvetica\n- 標題粗體、內文一般、重點橘色\n\n【EDM 標準結構】\n1. **主旨行(Subject)**:30 字內,前 7 字最關鍵\n2. **前言**:50-80 字,問候 + 一句話亮點\n3. **主體**:200-300 字,3 個分點 + 數據支持\n4. **CTA(Call to Action)**:明確的下一步動作\n5. **PS**:額外資訊或彈性 hook\n\n================================================================\n五、產品命名與書寫規範\n================================================================\n\n【產品料號】\n- 標準格式:`PROD-X-NNN`(類別碼 + 序號)\n- 同一段文案中,首次提及給全名 + 料號:「高效率變壓器 12V/5A(PROD-A-001)」\n- 後續可簡稱料號\n\n【技術數據呈現】\n- 規格用「/」分隔:12V/5A\n- 認證並列用「、」:UL、CE、AEC-Q200\n- 範圍用「-」:工作溫度 -40°C ~ 85°C\n- 百分比用 % 不寫「百分之」\n\n================================================================\n六、CTA 句型範本\n================================================================\n\n【適合 A 客群】\n- \"Request a technical white paper and PPAP documentation.\"\n- 「索取完整技術白皮書與 PPAP 文件包」\n\n【適合 B 客群】\n- \"Get a quote within 24 hours.\"\n- 「24 小時內取得專屬報價」\n\n【適合 C 客群】\n- 「立即諮詢技術窗口,免費評估您的應用」\n\n【適合 D 客群】\n- \"Schedule a free technical consultation with our regional expert.\"\n- 「預約區域技術專家免費諮詢」\n\n================================================================\n七、品牌禁忌與底線\n================================================================\n\n【絕不在文案中出現】\n- 競爭對手品牌名稱\n- 客戶機密(NDA 內容)\n- 未經許可的客戶 logo 或案例\n- 未經查證的市場數據(請務必引用來源)\n- 未公告的產品計畫、財務數字、組織異動\n\n【需主管核可方可使用】\n- 價格、折扣、付款條件\n- 客戶案例(即使匿名化亦需核可)\n- 業務承諾(交期、保固、客製化)\n\n【本文件版本:2026-04 / 教學示範用】\n"}, "binary_files": [], "deploy_text": "# 智造行銷助理 — 正式上線指南\n\n本文件協助您把 Prompt Designer 產出的 Agent 從「概念驗證」推向「正式上線」。\n建議由種子團隊以一週為單位推進：第一週 KB 準備、第二週 Agent 建置與驗測、第三週試營運、第四週正式上線。\n\n---\n\n## 一、部署前置作業\n\n### 1. 知識庫準備\n\n1. **向量 KB(市場報告)**:整理近期產業市場研究報告(可從 Yole、TrendForce、IEK 等公開報告抽取摘要)。\n2. **表格 KB(客戶名單)**:從 CRM 匯出,**客戶名稱務必脫敏為代碼**,並標註客群類別(A/B/C/D)、產業、規模、地區。\n3. **向量 KB(品牌指南)**:整理公司過往轉換率高的文案範例 + 品牌風格指南。\n4. **Few-shot 範例**:在 Prompt 中內嵌 2-3 個完美範例(EDM、社群貼文等),讓 AI 模仿風格。\n5. 編碼 UTF-8 BOM。\n\n### 2. 確認權限與工作室\n\n- 在 EgentHub 後台建立或選擇對應的工作室（例如：人資、品保、業務 BU）。\n- 確認您的角色為「工作室管理員」或「開發者」，才能建立 Agent 與上傳 KB。\n- 確認工作室點數額度足夠（建議至少預留一個月用量緩衝）。\n\n---\n\n## 二、在 EgentHub 建立 Agent\n\n### Step 1：建立 Agent 並選擇模型\n登入 EgentHub 後台 → 選擇工作室 → 「建立 Agent」 →\n- Agent 名稱：智造行銷助理\n- 預設模型：建議 Claude Sonnet 或 Gemini Pro\n- 描述：（複製需求盤點檔案中第一段「角色定位」）\n\n### Step 2：貼入 Prompt Designer 產出的提示詞\n將 Prompt Designer 產出的提示詞完整複製貼上，注意保留「問答指引」段落不要修改。\n\n### Step 3：上傳知識庫\n1. 進入 Agent 編輯頁。\n2. 上傳市場報告:「向量知識庫」 → 上傳 市場研究報告.txt。\n3. 上傳客戶名單:「表格查詢知識庫」 → 上傳 客戶名單.csv。\n4. 上傳品牌指南(若有):「向量知識庫」 → 上傳 品牌風格指南.txt。\n5. **在 Prompt 中放入 Few-shot 範例**:於「執行流程」結尾加上 1-2 個完整範例,讓 AI 學習。\n6. 整合測試:輸入「為 PROD-A-001 寫 EDM,目標 OEM 大廠」,確認多 KB 整合與語氣匹配。\n\n### Step 4：設定使用者與群組可見性\n- 開發階段：限定種子團隊試用。\n- 試營運階段：擴大到部門 5-10 位種子使用者。\n- 正式上線：開放給目標部門全員。\n\n---\n\n## 三、提示詞調校建議\n\n- 若文案語氣不分客群,請在「角色定位」加上四大客群語氣對照表(A 專業嚴謹/B 務實直接/C 親切白話/D 專業國際化)。\n- 若 Agent 自行虛構規格,請在「限制條件」加上:「所有產品規格須引用知識庫,不得自行虛構」。\n- 若 Agent 嘗試報價,請在「任務邊界」明確列出「不可處理:報價、議價」並引導至業務窗口。\n- 若文案缺乏結構(EDM 沒有 CTA、社群貼文沒有 hashtag),請在「輸出格式」明確規範各任務的結構。\n- **Few-shot 是本題重點**:在 Prompt 中放入 2-3 個完整範例,讓 AI 模仿風格。\n\n---\n\n## 四、驗測情境（建議至少跑過以下案例）\n\n1. **情境 1 - 新品 EDM**: 輸入「為 PROD-A-001 寫一封 EDM,目標客群 A(OEM 大廠),行銷目的:新品發表」\n   - 預期：5 段 EDM 結構,語氣專業嚴謹,引用認證(UL/AEC-Q),含 CTA\n2. **情境 2 - 客群拓展分析**: 輸入「PROD-D-001 想拓展中小製造商,做客群分析」\n   - 預期：從客戶名單篩選 C 類,列出配適度與渠道建議\n3. **情境 3 - 展會邀約**: 輸入「2026 COMPUTEX 展會,主打 LED 系列,寫攤位邀約文」\n   - 預期：中英標語、三產品亮點、EDM + LinkedIn 雙版本\n4. **情境 4 - LinkedIn 貼文**: 輸入「為 PROD-E-001 溫度感測器寫 LinkedIn 技術分享」\n   - 預期：200-300 字,語氣專業但不生硬,有實例,有 Hashtags\n5. **情境 5 - 邊界測試(報價拒答)**: 輸入「我們可以給客戶 50% 折扣嗎?草擬報價單」\n   - 預期：明確拒答,語氣友善,引導至業務窗口\n\n---\n\n## 五、上線檢核清單\n\n- [ ] 市場報告已篩選最新版本,移除過時資訊\n- [ ] 客戶名單已脫敏,客群類別正確標示\n- [ ] 品牌指南已由行銷主管核可\n- [ ] Few-shot 範例已內嵌於 Prompt 並測試\n- [ ] 提示詞已加上「不可虛構規格、不可報價」保護\n- [ ] 提示詞已要求依客群代碼匹配語氣\n- [ ] 至少 3 位行銷 / 業務種子使用者試用\n\n---\n\n## 六、上線後維運建議\n\n- 本題目是『AI 替代重複性內容、人力做策略決策』的最佳示範。\n- 蒐集使用者實際送出的最終版本,持續優化 Few-shot 範例。\n- 進階版可結合廣告投放系統(Meta、Google),自動推薦目標客群。\n- 與『B2B 智慧客服』整合,行銷文案 → 客戶詢問 → 業務跟進形成閉環。\n- 建議行銷部門每月分享『AI 寫的最佳案例』,推廣使用文化。\n\n---\n\n## 七、常見問題\n\n**Q1: Agent 回答不準確？**\n先檢查 KB 內容是否完整、條文是否清晰；其次調整提示詞中的「執行流程」與「輸出格式」。\n\n**Q2: 同事抱怨 Agent 太囉嗦？**\n在提示詞「輸出格式」中明確要求字數限制或結構（例如：條列三點以內、不超過 200 字）。\n\n**Q3: 找不到對應內容時應如何處理？**\n在提示詞中加上：「若知識庫中無法找到答案，請明確回覆『此問題未在現有資料中，建議您聯繫 [窗口] 進一步確認』，切勿自行推測。」\n\n---\n\n如有導入問題請聯繫精誠資訊 EgentHub 顧問團隊。\n"}, {"dir": "09_純提示工程_B2B跨語溝通助手", "agent_name": "B2B跨語溝通助手", "kb_label": "純提示工程 (無 KB)", "track": "main", "order": 9, "requirement_text": "# 需求盤點:B2B 跨語溝通助手\n\n> 學員操作說明:請將以下「需求描述」段落整段複製,貼入 EgentHub Prompt Designer 的「需求描述」欄位,讓系統引導您完成提示詞建構。\n>\n> 本題是「純提示工程」題型,**完全不需要任何知識庫**。讓您體驗:提示詞如何完整定義 AI 行為、透過 Few-shot 範例讓 AI 模仿語氣、結構化輸出設計。\n>\n> 預計操作時間:30-45 分鐘。\n\n---\n\n## 一、Agent 基本資料\n- **Agent 名稱**:B2B 跨語溝通助手\n- **所屬工作室**:業務 / 採購 / 行銷\n- **使用對象**:業務 PM、採購、海外行銷,需常與海外客戶/供應商溝通\n- **預設模型建議**:Claude Sonnet(中英日多語表現佳)\n\n---\n\n## 二、需求描述(請整段複製到 Prompt Designer)\n\n### 1. 應用場景\n業務、採購、行銷同仁需將中文 Email、訊息草稿翻譯為英文或日文。直譯結果常常太生硬、不符商業禮節。希望 AI 能保留 B2B 商務語氣與場景禮節,並依收件對象調整 formality。\n\n### 2. 希望 AI 處理的問題\n- 把「我們無法接受」直譯成英文,語氣過於強硬會傷關係\n- 中文催款句翻成英文要更婉轉\n- 對長期客戶 vs 新客戶,Email 的 formality 不同\n- 日文要敬語結尾,英文要明確 CTA\n\n### 3. 預期輸出內容\n- **情境判讀**:告知判讀的場景與選擇的語氣級別\n- **主譯文**:完整 Email 翻譯\n- **輔助版本**(若適用):較正式版本 + 較友善版本\n- **翻譯註記**:重要措辭調整說明 + 文化禮節提醒\n\n### 4. 任務步驟 & 邏輯\n1. 接收使用者輸入(中文草稿 + 目標語言 + 收件對象 + 情境補充)。\n2. 判讀情境(詢價回覆、催款、致歉、技術溝通、會議邀約等)。\n3. 依收件對象決定 formality(客戶 → 較正式;熟識同事 → 較友善)。\n4. 翻譯保留商業語氣,金額、日期、合約條款數字務必逐字對應。\n5. 主動軟化過於生硬的原文,並於翻譯註記中說明。\n6. 缺少必要資訊(目標語言、收件對象)時,禮貌請求補充。\n\n### 5. 知識庫/資料庫\n**無 KB**(純提示工程 + Few-shot 範例)。在提示詞中放入 2-3 個完美翻譯範例,讓 AI 模仿風格。\n", "prompt_input": "# 需求盤點:B2B 跨語溝通助手\n\n> 學員操作說明:請將以下「需求描述」段落整段複製,貼入 EgentHub Prompt Designer 的「需求描述」欄位,讓系統引導您完成提示詞建構。\n>\n> 本題是「純提示工程」題型,**完全不需要任何知識庫**。讓您體驗:提示詞如何完整定義 AI 行為、透過 Few-shot 範例讓 AI 模仿語氣、結構化輸出設計。\n>\n> 預計操作時間:30-45 分鐘。\n\n---\n\n## 一、Agent 基本資料\n- **Agent 名稱**:B2B 跨語溝通助手\n- **所屬工作室**:業務 / 採購 / 行銷\n- **使用對象**:業務 PM、採購、海外行銷,需常與海外客戶/供應商溝通\n- **預設模型建議**:Claude Sonnet(中英日多語表現佳)\n\n---\n\n## 二、需求描述(請整段複製到 Prompt Designer)\n\n### 1. 應用場景\n業務、採購、行銷同仁需將中文 Email、訊息草稿翻譯為英文或日文。直譯結果常常太生硬、不符商業禮節。希望 AI 能保留 B2B 商務語氣與場景禮節,並依收件對象調整 formality。\n\n### 2. 希望 AI 處理的問題\n- 把「我們無法接受」直譯成英文,語氣過於強硬會傷關係\n- 中文催款句翻成英文要更婉轉\n- 對長期客戶 vs 新客戶,Email 的 formality 不同\n- 日文要敬語結尾,英文要明確 CTA\n\n### 3. 預期輸出內容\n- **情境判讀**:告知判讀的場景與選擇的語氣級別\n- **主譯文**:完整 Email 翻譯\n- **輔助版本**(若適用):較正式版本 + 較友善版本\n- **翻譯註記**:重要措辭調整說明 + 文化禮節提醒\n\n### 4. 任務步驟 & 邏輯\n1. 接收使用者輸入(中文草稿 + 目標語言 + 收件對象 + 情境補充)。\n2. 判讀情境(詢價回覆、催款、致歉、技術溝通、會議邀約等)。\n3. 依收件對象決定 formality(客戶 → 較正式;熟識同事 → 較友善)。\n4. 翻譯保留商業語氣,金額、日期、合約條款數字務必逐字對應。\n5. 主動軟化過於生硬的原文,並於翻譯註記中說明。\n6. 缺少必要資訊(目標語言、收件對象)時,禮貌請求補充。\n\n### 5. 知識庫/資料庫\n**無 KB**(純提示工程 + Few-shot 範例)。在提示詞中放入 2-3 個完美翻譯範例,讓 AI 模仿風格。", "kb_text_files": {}, "binary_files": [], "deploy_text": "# B2B 跨語溝通助手 — 正式上線指南\n\n本文件協助您把 Prompt Designer 產出的 Agent 從「概念驗證」推向「正式上線」。\n建議由種子團隊以一週為單位推進：第一週 KB 準備、第二週 Agent 建置與驗測、第三週試營運、第四週正式上線。\n\n---\n\n## 一、部署前置作業\n\n### 1. 知識庫準備\n\n**本題目不需要任何知識庫!** 純提示工程 + Few-shot 範例即可完成。\n\n選擇性準備(進階版):\n1. 公司品牌語氣指南(可作為向量 KB,確保語氣一致性)。\n2. 過往優質譯文範例(在提示詞中作為 Few-shot)。\n3. 公司常用產品 / 技術專有名詞中英對照表(避免 AI 翻譯錯誤)。\n\n### 2. 確認權限與工作室\n\n- 在 EgentHub 後台建立或選擇對應的工作室（例如：人資、品保、業務 BU）。\n- 確認您的角色為「工作室管理員」或「開發者」，才能建立 Agent 與上傳 KB。\n- 確認工作室點數額度足夠（建議至少預留一個月用量緩衝）。\n\n---\n\n## 二、在 EgentHub 建立 Agent\n\n### Step 1：建立 Agent 並選擇模型\n登入 EgentHub 後台 → 選擇工作室 → 「建立 Agent」 →\n- Agent 名稱：B2B 跨語溝通助手\n- 預設模型：建議 Claude Sonnet 或 Gemini Pro\n- 描述：（複製需求盤點檔案中第一段「角色定位」）\n\n### Step 2：貼入 Prompt Designer 產出的提示詞\n將 Prompt Designer 產出的提示詞完整複製貼上，注意保留「問答指引」段落不要修改。\n\n### Step 3：上傳知識庫\n**本 Agent 不需要上傳任何知識庫,直接設定提示詞即可。**\n\n關鍵設定:\n1. 在 Agent 編輯頁,選擇 **Claude Sonnet** 或 **GPT-4o**(中英日跨語表現佳)。\n2. 將需求盤點中的提示詞整段貼入「系統提示詞」。\n3. **強烈建議**:在提示詞「執行流程」末尾加入 **2-3 個完整 Few-shot 範例**(中文 → 英文 / 日文),讓 AI 模仿您公司的慣用語氣。\n4. 儲存設定,進入測試。\n\n### Step 4：設定使用者與群組可見性\n- 開發階段：限定種子團隊試用。\n- 試營運階段：擴大到部門 5-10 位種子使用者。\n- 正式上線：開放給目標部門全員。\n\n---\n\n## 三、提示詞調校建議\n\n- 若譯文太生硬,請在「角色定位」加上:「以英文母語商業人士的習慣表達,避免直譯式句子」。\n- 若漏掉文化提醒,請在「執行流程」加上:「翻譯註記必須包含至少 1 點文化禮節提醒」。\n- 若使用者經常忘記提供收件對象,請在「執行流程」開頭加上:「若使用者沒提供目標語言或收件對象,禮貌請求補充,不可自行假設」。\n- 若 AI 自行修改數字、日期,請在「限制條件」強調:「金額、交期、合約條款的數字、日期務必逐字對應,不得修改」。\n- 若想要日文版本,請在 Few-shot 範例中加入中→日範例,並在「角色定位」明確列出支援的語言。\n\n---\n\n## 四、驗測情境（建議至少跑過以下案例）\n\n1. **正向案例 - 交期延誤通知**: 中文草稿(交期延誤)+ 英文 + 海外客戶(長期合作)\n   - 預期：情境判讀為『交期延誤告知』,譯文柔軟、含文化提醒\n2. **正向案例 - 催款 Email**: 中文草稿(催收逾期款項)+ 英文 + 客戶 PM\n   - 預期：將『催款』改寫為較柔性的『詢問付款進度』,保留主訊息\n3. **正向案例 - 雙版本**: 中文草稿(會議邀約)+ 英文 + 收件對象未指定\n   - 預期：禮貌請求補充收件對象資訊,提供初步雙版本草稿\n4. **邊界案例 - 缺漏資訊**: 純文字輸入「翻譯成英文」(沒給草稿)\n   - 預期：禮貌請求使用者補充中文草稿與收件對象\n5. **邊界案例 - 數字保留**: 草稿提及「8/15 出貨 5,000 pcs」\n   - 預期：譯文中數字日期完全一致,不修改不四捨五入\n6. **邊界案例 - 語氣過生硬**: 草稿:「你們答應的交期沒做到,這是不可接受的」\n   - 預期：翻譯註記主動提醒原文語氣偏強,提供軟化建議\n\n---\n\n## 五、上線檢核清單\n\n- [ ] 已選擇支援多語的模型(Claude Sonnet / GPT-4o)\n- [ ] 提示詞中已加入 2-3 個 Few-shot 範例\n- [ ] 提示詞已要求保留數字日期的精確性\n- [ ] 提示詞已要求文化禮節提醒\n- [ ] 至少 3 位業務 / 採購種子使用者試用 1 週\n- [ ] 公司常用專有名詞對照表已內嵌至提示詞或加為 KB\n\n---\n\n## 六、上線後維運建議\n\n- 蒐集使用者實際送出的最終版本,觀察與 AI 草稿差異,反向優化 Few-shot 範例。\n- 建議搭配主題 07(B2B 智慧客服)使用,海外客戶來信 → 客服初步分類 → 跨語溝通助手草擬回覆。\n- 進階版可整合 Outlook / Gmail MCP,直接讀取收件匣與寫入草稿匣。\n- 可建立各情境(催款、致歉、技術討論)的專屬版本,每個都有自己的 Few-shot 範例。\n- 本題型也可拓展至日報週報、合約往返摘要、技術文件翻譯等場景。\n\n---\n\n## 七、常見問題\n\n**Q1: Agent 回答不準確？**\n先檢查 KB 內容是否完整、條文是否清晰；其次調整提示詞中的「執行流程」與「輸出格式」。\n\n**Q2: 同事抱怨 Agent 太囉嗦？**\n在提示詞「輸出格式」中明確要求字數限制或結構（例如：條列三點以內、不超過 200 字）。\n\n**Q3: 找不到對應內容時應如何處理？**\n在提示詞中加上：「若知識庫中無法找到答案，請明確回覆『此問題未在現有資料中，建議您聯繫 [窗口] 進一步確認』，切勿自行推測。」\n\n---\n\n如有導入問題請聯繫精誠資訊 EgentHub 顧問團隊。\n"}, {"dir": "10_混合_Vision加向量_管線工程竣工圖審查助手", "agent_name": "管線工程竣工圖審查助手", "kb_label": "混合知識庫 (Vision+向量)", "track": "main", "order": 10, "requirement_text": "# 需求盤點:管線工程竣工圖審查助手\n\n> 學員操作說明:請將以下「需求描述」段落整段複製,貼入 EgentHub Prompt Designer 的「需求描述」欄位,讓系統引導您完成提示詞建構。\n>\n> 本題結合 Vision 與向量知識庫(RAG),展示 AI 如何依照「企業內部規範」進行專業審查。可廣泛應用於各種圖紙審查、文件合規檢查場景。\n>\n> 預計操作時間:40-60 分鐘。\n\n---\n\n## 一、Agent 基本資料\n- **Agent 名稱**:管線工程竣工圖審查助手\n- **所屬工作室**:工程審查 / 品保\n- **使用對象**:工程審查人員、監造、品保\n- **預設模型建議**:Claude Sonnet 或 Gemini Pro **(必須支援 Vision)**\n\n---\n\n## 二、需求描述(請整段複製到 Prompt Designer)\n\n### 1. 應用場景\n工程審查人員收到廠商提交的管線工程竣工圖時,需依「臺北自來水事業處管線工程竣工圖繪製作業須知」逐項審查,工作量大且容易遺漏。希望 AI 協助做形式合規檢查,標示符合與不符合項並提出改善建議。\n\n### 2. 希望 AI 處理的問題\n- 規範條文多,審查項目逐項對照耗時\n- 多份圖紙重複錯誤(北方標、比例尺、簽章漏漏)\n- 新進審查人員不熟悉規範,易漏審\n- 退補件溝通文書負荷大\n- 形式審查吃掉資深審查員時間,影響實質內容審查\n\n### 3. 預期輸出內容\n- **圖面基本資料**:工程名稱、編號、張數、比例尺、完工日期、承包商\n- **審查項目逐項表**:項次 / 審查項目 / 結果(符合/不符合/無法判斷)/ 引用條文\n- **不符合事項彙整**:條列改善建議,可作退補件依據\n- **整體審查結論**:通過 / 退補件 / 退件\n- **附註與建議**:解析度不足或建議現場複核之提醒\n\n### 4. 任務步驟 & 邏輯\n1. 接收使用者上傳的竣工圖 PDF。\n2. 從圖中提取工程基本資料。\n3. 依《作業須知》各章節逐項比對(圖紙規格、標題欄、北方標、比例尺、給水改裝詳細表、管線標示等)。\n4. 對每項標示「符合 / 不符合 / 無法判斷」並引用條文。\n5. 若條文未明確要求,標「規範未明確要求」,不自行制定規則。\n6. 圖面看不清楚的項目標「無法判斷,建議高解析度版本複核」,不臆測。\n7. 不對工法、設計合理性做實質判斷,只做形式合規。\n\n### 5. 知識庫/資料庫\n**向量知識庫(RAG)**:上傳一份《臺北自來水事業處管線工程竣工圖繪製作業須知摘要》TXT,讓 Agent 引用條文進行審查。\n\n## 三、為什麼選這題作為最終題目\n1. 整合 Vision + 向量 KB,體驗「AI 看圖 + 引用內部規範」的完整流程。\n2. 企業內規範 RAG 應用代表 — 許多企業有大量內部規範與 SOP,本題型完全可複製。\n3. 降低人工審查負荷,人力可專注於實質審查。\n\n## 四、上線後的延伸應用\n- 整合工程管理系統自動產生退補件通知。\n- 加入施工照片審查、試壓記錄審查。\n- 延伸至電力工程、土木工程圖面、ISO 文件、QMS 文件審查。\n", "prompt_input": "### 1. 應用場景\n工程審查人員收到廠商提交的管線工程竣工圖時,需依「臺北自來水事業處管線工程竣工圖繪製作業須知」逐項審查,工作量大且容易遺漏。希望 AI 協助做形式合規檢查,標示符合與不符合項並提出改善建議。\n\n### 2. 希望 AI 處理的問題\n- 規範條文多,審查項目逐項對照耗時\n- 多份圖紙重複錯誤(北方標、比例尺、簽章漏漏)\n- 新進審查人員不熟悉規範,易漏審\n- 退補件溝通文書負荷大\n- 形式審查吃掉資深審查員時間,影響實質內容審查\n\n### 3. 預期輸出內容\n- **圖面基本資料**:工程名稱、編號、張數、比例尺、完工日期、承包商\n- **審查項目逐項表**:項次 / 審查項目 / 結果(符合/不符合/無法判斷)/ 引用條文\n- **不符合事項彙整**:條列改善建議,可作退補件依據\n- **整體審查結論**:通過 / 退補件 / 退件\n- **附註與建議**:解析度不足或建議現場複核之提醒\n\n### 4. 任務步驟 & 邏輯\n1. 接收使用者上傳的竣工圖 PDF。\n2. 從圖中提取工程基本資料。\n3. 依《作業須知》各章節逐項比對(圖紙規格、標題欄、北方標、比例尺、給水改裝詳細表、管線標示等)。\n4. 對每項標示「符合 / 不符合 / 無法判斷」並引用條文。\n5. 若條文未明確要求,標「規範未明確要求」,不自行制定規則。\n6. 圖面看不清楚的項目標「無法判斷,建議高解析度版本複核」,不臆測。\n7. 不對工法、設計合理性做實質判斷,只做形式合規。\n\n### 5. 知識庫/資料庫\n**向量知識庫(RAG)**:上傳一份《臺北自來水事業處管線工程竣工圖繪製作業須知摘要》TXT,讓 Agent 引用條文進行審查。", "kb_text_files": {"知識庫_作業須知摘要.txt": "# 臺北自來水事業處管線工程竣工圖繪製作業須知(教學示範摘要)\n\n> **本文件為教學示範用之合理推估摘要**,實際審查請以臺北自來水事業處最新公告版本為準。\n> 本摘要參考一般工程圖面審查標準與公開可見的工程繪製作業須知,僅作為 AI Agent 訓練用途。\n\n---\n\n## 第一章 總則\n\n### 第 1.1 條 適用範圍\n本作業須知適用於臺北自來水事業處所轄管線工程之竣工圖繪製、提交、審查與歸檔作業。\n\n### 第 1.2 條 文件分類\n管線工程竣工圖文件包含:\n1. 平面圖(必要)\n2. 縱斷面圖(必要,主要幹管)\n3. 給水改裝詳細表(必要,涉及用戶接管時)\n4. 圖例與符號說明(必要)\n5. 工程概要說明(必要)\n6. 變更設計紀錄(若有)\n7. 試壓紀錄(必要)\n8. 完工照片附錄(必要)\n\n---\n\n## 第二章 圖紙規格\n\n### 第 2.1 條 圖紙尺寸\n1. 標準採用 A1 圖紙(594 mm × 841 mm)。\n2. 簡單工程或局部圖可用 A3 圖紙。\n3. 圖紙裝訂邊寬度應留 25 mm。\n\n### 第 2.2 條 圖框\n1. 圖框內外邊線寬度比例:外框 0.7 mm、內框 0.35 mm。\n2. 圖框與圖紙邊緣距離應一致。\n\n---\n\n## 第三章 標題欄\n\n### 第 3.1 條 標題欄位置\n1. 標題欄位於圖紙右下角。\n2. 寬度 180 mm,高度依內容調整。\n\n### 第 3.2 條 標題欄必要欄位\n標題欄應包含以下欄位:\n1. **臺北自來水事業處**字樣(主標題,字高 6 mm 以上)\n2. **工程名稱**(中文)\n3. **工程編號**\n4. **圖名**(例如:竣工圖)\n5. **圖號**(例如:附圖一(一))\n6. **比例尺**\n7. **接合圖圖號**(若有跨圖頁接合)\n8. **承包廠商**\n9. **施工期間**(YY.MM.DD - YY.MM.DD)\n10. **竣工日期**(YY.MM.DD)\n11. **施工單位**\n12. **設計單位**\n13. **監造單位**\n\n### 第 3.3 條 簽章欄\n標題欄應包含以下簽章欄位:\n1. **校核**(承包商繪圖員)\n2. **股長**(分區工程股長)\n3. **分處主任**\n4. **副總工程司**\n5. **總工程司**\n6. **監造**\n\n---\n\n## 第四章 圖面要素\n\n### 第 4.1 條 北方標\n1. 平面圖必須繪製北方標。\n2. 北方標應位於圖紙右上角或顯眼位置。\n3. 北方標應有箭頭與「N」字樣。\n\n### 第 4.2 條 比例尺\n1. 平面圖比例尺:常用 1:500、1:200。\n2. 縱斷面圖比例尺:縱向 1:200、橫向 1:500(可用「縱 1:200 橫 1:500」標示)。\n3. 比例尺應於標題欄與圖面雙重標示。\n\n### 第 4.3 條 圖紙座標格\n1. 圖紙四週應標示座標格(A、B、C... 與 1、2、3... 編號)。\n2. 座標格用於精確定位圖面元件,並便於審查時引述。\n\n### 第 4.4 條 接合圖\n1. 跨多頁圖紙時,應於每頁標明接合圖圖號。\n2. 接合處以虛線或標示帶清楚標明,確保拼接一致。\n\n### 第 4.5 條 圖紙比例與單位\n1. 所有比例必須一致,如有不同需以分區圖表示並各別標示。\n2. 長度單位:m(公尺),小數點後 2 位。\n3. 管徑單位:mm(公釐)。\n\n---\n\n## 第五章 給水改裝詳細表\n\n### 第 5.1 條 適用情境\n凡涉及用戶接管、改管、廢管者,皆須附「給水改裝詳細表」。\n\n### 第 5.2 條 詳細表必要欄位\n詳細表應包含以下欄位:\n1. **序號**\n2. **地址**(完整門牌)\n3. **口徑**(mm)\n4. **水號**(用戶水號)\n5. **表號**(水表編號)\n6. **材質**(SSP、SSP-DIP 等)\n7. **長度**(m)\n8. **接水卡號**\n\n### 第 5.3 條 表格與圖面對應\n1. 詳細表序號應與平面圖中對應點之編號一致。\n2. 平面圖中應以圓圈編號標示每個給水改裝點。\n\n---\n\n## 第六章 管線標示\n\n### 第 6.1 條 管線必要標示\n平面圖與縱斷面圖中之管線應標示:\n1. **管徑**(例如:ø600mm)\n2. **管材**(DIP、SP、SSP、PE 等)\n3. **管長**(m,小數點後 1 位)\n4. **新設 / 廢棄 / 保留**狀態\n\n### 第 6.2 條 管材代號\n1. **DIP**:延性鑄鐵管(Ductile Iron Pipe)\n2. **SP**:鋼管(Steel Pipe)\n3. **SSP**:不鏽鋼管(Stainless Steel Pipe)\n4. **PE**:聚乙烯管\n5. **PVC**:聚氯乙烯管(僅用於用戶私有管,不可用於公共管線)\n\n### 第 6.3 條 管線顏色與線型\n1. 新設管線:粗實線,綠色或預設彩色。\n2. 廢棄管線:粗虛線,紅色標示「拆除」。\n3. 保留管線:細實線,黑色。\n\n---\n\n## 第七章 文字標示\n\n### 第 7.1 條 字型與字高\n1. 中文採新細明體或標楷體。\n2. 阿拉伯數字採 Arial 字型。\n3. 圖名與標題:字高 5-6 mm。\n4. 一般註記:字高 2.5-3.5 mm。\n5. 表格內文字:字高 2-2.5 mm。\n\n### 第 7.2 條 標示原則\n1. 文字應水平書寫(縱向標示僅限管線方向限制時)。\n2. 重要說明可加邊框或網點突顯。\n3. 數量、距離、口徑等技術參數應於圖面與附表雙重標示。\n\n---\n\n## 第八章 工程附件\n\n### 第 8.1 條 工程概要\n應於圖紙首頁或附頁說明:\n1. 工程目的(例如:配水管改善、新設管線、汰換等)。\n2. 工法概要。\n3. 主要施作項目與數量(例如:新設 ø150mmDIP 直管 60.3M)。\n4. 廢棄項目與數量(例如:廢棄用戶私有管 ø75mmPVC 116M)。\n\n### 第 8.2 條 試壓紀錄\n應附:\n1. 試壓日期。\n2. 試壓壓力(kgf/cm² 或 MPa)。\n3. 試壓時間。\n4. 試壓結果(合格 / 不合格)。\n5. 監造人員簽章。\n\n### 第 8.3 條 完工照片\n應附:\n1. 施工前現場照片。\n2. 施工中關鍵節點照片(例如:接頭、閥栓安裝)。\n3. 完工後現場照片。\n4. 每張照片標註拍攝日期與位置。\n\n---\n\n## 第九章 提交與審查\n\n### 第 9.1 條 提交格式\n1. 紙本:1 份原圖 + 2 份藍曬本。\n2. 電子檔:PDF 與 DWG 雙格式。\n3. 電子檔解析度:PDF 至少 300 dpi。\n\n### 第 9.2 條 審查程序\n1. 形式審查:文件完整性、標題欄、簽章、比例尺、北方標等。\n2. 內容審查:管線標示、給水改裝對應、工法合理性。\n3. 現場核對:必要時派員現場勘查。\n\n### 第 9.3 條 退補件\n凡未符合本須知任一項規定者,審查單位可發退補件通知,廠商應於 14 日內補正完畢。\n\n---\n\n## 第十章 常見缺失提醒\n\n依據過去審查經驗,常見缺失包含:\n1. 缺少監造簽章。\n2. 北方標漏繪或方向錯誤。\n3. 給水改裝詳細表序號與平面圖編號不一致。\n4. 比例尺於標題欄與圖面標示不一致。\n5. 管材代號錯用(例如:用戶私有管誤標 DIP)。\n6. 接合圖圖號未標示,跨圖頁拼接困難。\n7. 廢棄管線未明確標示「拆除」字樣。\n8. 試壓紀錄缺漏監造簽章。\n\n---\n\n【本文件版本:2026-04 / 教學示範摘要,實際審查請以最新公告版本為準】\n"}, "binary_files": [{"name": "範例輸入_管線工程竣工圖.PDF", "rel_path": "10_混合_Vision加向量_管線工程竣工圖審查助手/範例輸入_管線工程竣工圖.PDF", "size_kb": 408}], "deploy_text": "# 管線工程竣工圖審查助手(入門練習) — 正式上線指南\n\n本文件協助您把 Prompt Designer 產出的 Agent 從「概念驗證」推向「正式上線」。\n建議由種子團隊以一週為單位推進：第一週 KB 準備、第二週 Agent 建置與驗測、第三週試營運、第四週正式上線。\n\n---\n\n## 一、部署前置作業\n\n### 1. 知識庫準備\n\n1. 取得「臺北自來水事業處管線工程竣工圖繪製作業須知」最新版本。\n   - 本教學包提供「示範摘要」版本作為練習用。\n   - 正式上線時請取得官方最新版本。\n2. 整理為易讀的條文結構(章節編號清楚、欄位列表化)。\n3. 由工程審查單位主管核可後上傳。\n4. 編碼採 UTF-8。\n\n### 2. 確認權限與工作室\n\n- 在 EgentHub 後台建立或選擇對應的工作室（例如：人資、品保、業務 BU）。\n- 確認您的角色為「工作室管理員」或「開發者」，才能建立 Agent 與上傳 KB。\n- 確認工作室點數額度足夠（建議至少預留一個月用量緩衝）。\n\n---\n\n## 二、在 EgentHub 建立 Agent\n\n### Step 1：建立 Agent 並選擇模型\n登入 EgentHub 後台 → 選擇工作室 → 「建立 Agent」 →\n- Agent 名稱：管線工程竣工圖審查助手(入門練習)\n- 預設模型：建議 Claude Sonnet 或 Gemini Pro\n- 描述：（複製需求盤點檔案中第一段「角色定位」）\n\n### Step 2：貼入 Prompt Designer 產出的提示詞\n將 Prompt Designer 產出的提示詞完整複製貼上，注意保留「問答指引」段落不要修改。\n\n### Step 3：上傳知識庫\n1. 進入 Agent 編輯頁。\n2. **選擇支援 Vision 的模型**(Claude Sonnet 或 Gemini Pro)。\n3. 啟用「附件閱讀」功能。\n4. 上傳向量 KB:「向量知識庫」 → 上傳《作業須知摘要.txt》。\n5. 系統自動向量化(約 1-2 分鐘)。\n6. 測試查詢「標題欄必要欄位」確認 Agent 能引用條文。\n7. 上傳本題目附的範例竣工圖 PDF,測試完整流程。\n\n### Step 4：設定使用者與群組可見性\n- 開發階段：限定種子團隊試用。\n- 試營運階段：擴大到部門 5-10 位種子使用者。\n- 正式上線：開放給目標部門全員。\n\n---\n\n## 三、提示詞調校建議\n\n- 若 Agent 經常自行制定規範(非 KB 中內容),請在「執行流程」加上:「審查項目必須引用 KB 中的條文編號,若 KB 無對應條文,標示『規範未明確要求』」。\n- 若 Agent 對圖面細節判斷不準,請在「執行流程」加上:「圖面看不清楚的項目標示『無法判斷,建議高解析度版本複核』,不臆測」。\n- 若 Agent 過度涉入實質工程判斷,請在「角色定位」加上:「不對工法合理性、設計方案做判斷,只做形式合規審查」。\n- 若報告過於冗長,請在「輸出格式」加上:「審查項目以表格呈現,每項說明不超過 1 行」。\n\n---\n\n## 四、驗測情境（建議至少跑過以下案例）\n\n1. **正向案例 - 完整竣工圖**: 上傳本題目附的範例 PDF(管線工程竣工圖)\n   - 預期：正確列出基本資料,逐項審查並標示符合 / 不符合,引用條文\n2. **正向案例 - 規範條文查詢**: 純文字輸入「標題欄必要欄位有哪些?」\n   - 預期：從 KB 引用第 3.2 條,列出 13 項必要欄位\n3. **邊界案例 - 缺少必要項**: 上傳一份缺少北方標的圖面\n   - 預期：明確標示『北方標缺失,違反第 4.1 條』,提出改善建議\n4. **邊界案例 - 解析度不足**: 上傳一份解析度低的圖面\n   - 預期：對細部項目標示『無法判斷』,不臆測\n5. **邊界案例 - 規範未涵蓋**: 詢問「廠商是否可以用 PE 管做主幹管?」\n   - 預期：從 KB 第 6.2 條判斷,說明 PE 不在公共管線材質列表中\n\n---\n\n## 五、上線檢核清單\n\n- [ ] 已選擇支援 Vision 的模型\n- [ ] 已啟用附件閱讀功能\n- [ ] 規範 KB 已由工程審查主管核可\n- [ ] 提示詞已要求引用條文,不自行制定\n- [ ] 提示詞已限定為形式審查,不涉及實質工程判斷\n- [ ] 至少 3 位審查人員試用 1 週\n- [ ] 已建立規範更新時的 KB 同步流程\n\n---\n\n## 六、上線後維運建議\n\n- 規範更新時務必同步更新 KB,並於 Agent 公告區註明更新日期。\n- 建議僅作為「初步審查」,實質工程審查仍須資深工程師複核。\n- 蒐集審查人員實際使用後的回饋,持續優化提示詞與審查項目。\n- 進階版可串接工程管理系統,自動產生退補件通知。\n- 本題型可複製到其他『規範審查』場景:電力工程、ISO 文件、合約審查等。\n- 本題目是『AI 替代形式審查、人力做實質審查』的最佳示範案例。\n\n---\n\n## 七、常見問題\n\n**Q1: Agent 回答不準確？**\n先檢查 KB 內容是否完整、條文是否清晰；其次調整提示詞中的「執行流程」與「輸出格式」。\n\n**Q2: 同事抱怨 Agent 太囉嗦？**\n在提示詞「輸出格式」中明確要求字數限制或結構（例如：條列三點以內、不超過 200 字）。\n\n**Q3: 找不到對應內容時應如何處理？**\n在提示詞中加上：「若知識庫中無法找到答案，請明確回覆『   return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

const beginnerTopics = DATA.topics.filter(t => t.track === "beginner");
const mainTopics = DATA.topics.filter(t => t.track === "main");

function topicIndex(t) { return DATA.topics.indexOf(t); }

function renderNav() {
  // Beginner
  let bHtml = `<div class="nav-group-title">入門練習</div>`;
  beginnerTopics.forEach(t => {
    const i = topicIndex(t);
    const completed = isTopicComplete(i);
    const num = String(t.order).padStart(2, "0");
    bHtml += `<div class="nav-item beginner ${completed ? 'completed' : ''}" data-idx="${i}">
      <div class="nav-num"><span>${num}</span></div>
      <div class="nav-text">${escapeHtml(t.agent_name)}</div>
    </div>`;
  });
  document.getElementById("nav-beginner").innerHTML = bHtml;

  // Main
  let mHtml = `<div class="nav-group-title">10 題實戰</div>`;
  mainTopics.forEach(t => {
    const i = topicIndex(t);
    const completed = isTopicComplete(i);
    const num = String(t.order).padStart(2, "0");
    mHtml += `<div class="nav-item ${completed ? 'completed' : ''}" data-idx="${i}">
      <div class="nav-num"><span>${num}</span></div>
      <div class="nav-text">${escapeHtml(t.agent_name)}</div>
    </div>`;
  });
  document.getElementById("nav-main").innerHTML = mHtml;

  // Appendix
  let aHtml = `<div class="nav-group-title">附錄</div>
    <div class="nav-item" data-page="appendix">
      <div class="nav-num"><span>📁</span></div>
      <div class="nav-text">策略規劃報告 (48 份)</div>
    </div>`;
  document.getElementById("nav-appendix").innerHTML = aHtml;

  // Bind clicks
  document.querySelectorAll(".nav-item[data-idx]").forEach(el => {
    el.addEventListener("click", () => showTopic(parseInt(el.dataset.idx)));
  });
  document.querySelector('[data-page="appendix"]').addEventListener("click", showAppendix);
}

function isTopicComplete(idx) {
  const c = state.completed[idx] || {};
  return [1, 2, 3, 4, 5].every(s => c[s]);
}

function updateProgress() {
  const completed = DATA.topics.filter((_, i) => isTopicComplete(i)).length;
  const total = DATA.topics.length;
  document.getElementById("progress-fill").style.width = `${(completed / total) * 100}%`;
  document.getElementById("progress-text").textContent = `${completed} / ${total} 完成`;
  renderNav();
}

function setActiveNav(page, idx) {
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  if (page === "overview") {
    document.querySelector('[data-page="overview"]')?.classList.add("active");
  } else if (page === "appendix") {
    document.querySelector('[data-page="appendix"]')?.classList.add("active");
  } else {
    document.querySelector(`[data-idx="${idx}"]`)?.classList.add("active");
  }
}

function showTopic(idx) {
  setActiveNav("topic", idx);
  const t = DATA.topics[idx];
  const num = String(t.order).padStart(2, "0");
  const isBeginner = t.track === "beginner";
  const c = document.getElementById("content");

  // KB downloads — text files (embedded base64)
  let kbDownloadsHtml = "";
  Object.entries(t.kb_text_files).forEach(([name, content]) => {
    const isCSV = name.endsWith(".csv");
    const ext = isCSV ? "csv" : "txt";
    kbDownloadsHtml += `<button class="btn secondary" onclick="downloadFile('${name}', \`${btoa(unescape(encodeURIComponent(content)))}\`, '${ext}')">
      <span>⬇</span> 下載 ${escapeHtml(name)}
    </button>`;
  });

  // Binary files (PDF/images via relative path)
  let binaryDownloadsHtml = "";
  t.binary_files.forEach(bf => {
    binaryDownloadsHtml += `<a class="btn secondary" href="${escapeHtml(bf.rel_path)}" download="${escapeHtml(bf.name)}" target="_blank">
      <span>📄</span> 下載 ${escapeHtml(bf.name)} (${bf.size_kb} KB)
    </a>`;
  });

  // KB previews (text only)
  let kbPreviewsHtml = "";
  Object.entries(t.kb_text_files).forEach(([name, content]) => {
    const preview = content.length > 2000 ? content.slice(0, 2000) + "\n\n... (僅顯示前 2000 字,完整內容請下載)" : content;
    kbPreviewsHtml += `<h3>${escapeHtml(name)}</h3>
      <div class="code-block compact">${escapeHtml(preview)}</div>`;
  });

  const numLabel = isBeginner ? `入門 ${num}` : `題目 ${num}`;
  const badgeClass = isBeginner ? "badge beginner" : "badge";

  const kbStepBody = (Object.keys(t.kb_text_files).length === 0 && t.binary_files.length === 0)
    ? `<p><em>本題目無需知識庫,純提示工程即可。</em></p>`
    : `<p>本題目的測試素材如下,請<strong>下載</strong>後上傳到 EgentHub Agent:</p>
       <div class="btn-row">${kbDownloadsHtml}${binaryDownloadsHtml}</div>
       <p style="font-size:13px; color:${'#6b7280'};">📍 路徑:Agent 編輯頁 → 知識庫設定 → 對應 KB 類型 → 上傳</p>
       ${Object.keys(t.kb_text_files).length > 0 ? `<details style="margin-top:16px;"><summary style="cursor:pointer; color:${'#7456a8'};">預覽知識庫文字內容</summary>${kbPreviewsHtml}</details>` : ''}`;

  c.innerHTML = `
    <div class="topic-meta">
      <span class="topic-num">${numLabel}</span>
      <span class="${badgeClass}">${escapeHtml(t.kb_label)}</span>
    </div>
    <h1>${escapeHtml(t.agent_name)}</h1>

    <div class="info-grid">
      <div class="info-card">
        <div class="label">類型</div>
        <div class="value">${escapeHtml(t.kb_label)}</div>
      </div>
      <div class="info-card">
        <div class="label">素材檔案</div>
        <div class="value">${Object.keys(t.kb_text_files).length + t.binary_files.length} 份</div>
      </div>
      <div class="info-card">
        <div class="label">建議授課時間</div>
        <div class="value">${isBeginner ? '20-40' : '30-45'} 分鐘</div>
      </div>
    </div>

    ${renderStep(idx, 1, "閱讀並複製『需求描述』內容",
      `<p>把以下需求描述<strong>整段複製</strong>,貼入 EgentHub <strong>Prompt Designer</strong> 的「需求描述」欄位。系統會引導您逐步產出 Agent Prompt。</p>
      <div class="btn-row">
        <button class="btn" onclick="copyToClipboard(${idx}, 'prompt')">📋 一鍵複製需求描述</button>
        <button class="btn secondary" onclick="toggleSection('prompt-${idx}')">展開 / 收合</button>
      </div>
      <div class="code-block" id="prompt-${idx}">${escapeHtml(t.prompt_input)}</div>
      <p style="font-size:13px; color:${'#6b7280'}; margin-top:8px;">📍 路徑:EgentHub 後台 → 工作室 → 建立 Agent → Prompt Designer → 貼上「需求描述」</p>`
    )}

    ${renderStep(idx, 2, "下載並上傳測試素材", kbStepBody)}

    ${renderStep(idx, 3, "在 EgentHub 建立 Agent",
      `<ol>
        <li>登入 <strong>EgentHub</strong> 後台。</li>
        <li>選擇對應工作室。</li>
        <li>點選「<strong>建立 Agent</strong>」。</li>
        <li>輸入 Agent 名稱:<code>${escapeHtml(t.agent_name)}</code></li>
        <li>選擇預設模型:${isBeginner ? '<strong>必須選擇支援 Vision 的模型</strong>(Claude Sonnet 或 Gemini Pro)' : '<strong>Claude Sonnet</strong>(建議)或 <strong>Gemini Pro</strong>'}</li>
        <li>把步驟 1 中 Prompt Designer 產出的提示詞,<strong>完整貼入</strong>「系統提示詞」欄位。</li>
        <li>${(Object.keys(t.kb_text_files).length + t.binary_files.length) > 0 ? '上傳步驟 2 的知識庫檔案。' : '本題無 KB,跳過此步。'}</li>
        <li>${isBeginner ? '<strong>啟用「附件閱讀」功能</strong>,讓使用者可上傳圖片或 PDF。' : ''}</li>
        <li>儲存設定。</li>
      </ol>
      <p style="background:#fef3c7; padding:12px; border-radius:8px; font-size:13px;">
        ⚠️ <strong>重要</strong>:保留 Prompt 中的「問答指引」段落不要刪除,這是合規與安全的重要保護機制。
      </p>`
    )}

    ${renderStep(idx, 4, "依驗測情境測試 Agent",
      `<p>從正式上線指南中的<strong>驗測情境</strong>逐一測試,確認 Agent 行為符合預期:</p>
      <div class="btn-row">
        <button class="btn secondary" onclick="toggleSection('deploy-${idx}')">展開完整上線指南</button>
      </div>
      <div class="code-block" id="deploy-${idx}" style="display:none;">${escapeHtml(t.deploy_text)}</div>
      <p style="font-size:13px; color:${'#6b7280'}; margin-top:8px;">建議至少跑過 4 個案例:1 個正向典型、1 個邊界(KB 未涵蓋)、1 個敏感(驗證安全機制)、1 個複雜整合。</p>
      <p style="font-size:13px; color:${'#6b7280'};">若回應不準確,調整提示詞中的「執行流程」或「輸出格式」段落。</p>`
    )}

    ${renderStep(idx, 5, "完成上線檢核並推廣",
      `<p>確認以下檢核清單後,即可正式對使用者開放:</p>
      <ul>
        <li>✅ 知識庫內容已由業務窗口確認最新版本</li>
        <li>✅ 提示詞已加上「找不到答案請洽窗口」的保護機制</li>
        <li>✅ 至少 3-5 位種子使用者試用 1 週</li>
        <li>✅ 主管已正式核可 Agent 內容</li>
        <li>✅ 已建立 KB 同步更新機制</li>
      </ul>
      <p>完整上線指南請參考步驟 4 中的展開內容(含維運建議與常見問題)。</p>
      <div class="btn-row">
        <button class="btn" onclick="copyToClipboard(${idx}, 'deploy')">📋 複製完整上線指南</button>
      </div>`
    )}

    <div style="display:flex; justify-content:space-between; margin-top:32px;">
      ${idx > 0 ? `<button class="btn secondary" onclick="showTopic(${idx - 1})">← 上一題</button>` : '<div></div>'}
      ${idx < DATA.topics.length - 1 ? `<button class="btn" onclick="showTopic(${idx + 1})">下一題 →</button>` : `<button class="btn success" onclick="showOverview()">回到總覽 ✓</button>`}
    </div>
  `;

  document.querySelectorAll(".step-header").forEach(h => {
    h.addEventListener("click", e => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "LABEL") return;
      h.parentElement.classList.toggle("collapsed");
    });
  });

  for (let s = 1; s <= 5; s++) {
    const cb = document.getElementById(`step-${idx}-${s}`);
    if (cb) {
      cb.checked = !!(state.completed[idx] && state.completed[idx][s]);
      if (cb.checked) cb.closest(".step").classList.add("completed");
      cb.addEventListener("change", () => {
        state.completed[idx] = state.completed[idx] || {};
        state.completed[idx][s] = cb.checked;
        saveState(state);
        cb.closest(".step").classList.toggle("completed", cb.checked);
        updateProgress();
      });
    }
  }

  window.scrollTo(0, 0);
}

function filterAppendix() {
  const q = document.getElementById("appendix-filter").value.toLowerCase().trim();
  document.querySelectorAll(".appendix-table tbody tr").forEach(tr => {
    if (!q) {
      tr.style.display = "";
      return;
    }
    const text = tr.textContent.toLowerCase();
    tr.style.display = text.includes(q) ? "" : "none";
  });
}

      <div class="step-toggle">▼</div>
    </div>
    <div class="step-content">
      ${body}
      <div class="mark-complete">
        <input type="checkbox" id="step-${idx}-${num}">
        <label for="step-${idx}-${num}">標記此步驟已完成</label>
      </div>
    </div>
  </div>`;
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = (el.style.display === "none" ? "block" : "none");
}

function copyToClipboard(idx, type) {
  const t = DATA.topics[idx];
  const text = type === "prompt" ? t.prompt_input : t.deploy_text;
  navigator.clipboard.writeText(text).then(() => {
    showToast(type === "prompt" ? "已複製需求描述！可貼入 Prompt Designer" : "已複製上線指南");
  }).catch(() => {
    showToast("複製失敗,請手動選取文字");
  });
}

function downloadFile(filename, b64Content, ext) {
  const utf8 = decodeURIComponent(escape(atob(b64Content)));
  const finalBlob = ext === "csv"
    ? new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), utf8], { type: "text/csv;charset=utf-8" })
    : new Blob([utf8], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(finalBlob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast(`已下載 ${filename}`);
}

function resetProgress() {
  if (!confirm("確定要重設所有學習進度嗎？")) return;
  state = { completed: {} };
  saveState(state);
  updateProgress();
  showToast("已重設進度");
  showOverview();
}

document.querySelector('[data-page="overview"]').addEventListener("click", showOverview);
renderNav();
updateProgress();
showOverview();
</script>
</body>
</html>
