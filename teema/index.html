線,M-003,WO-2604023,PROD-A-003,8,6.6,1.4,待料,800,680,670,10,98.5%\n2026-04-27,B 線,M-004,WO-2604024,PROD-B-001,8,5.3,2.7,異常待修,2000,1410,1340,70,95.0%\n2026-04-27,B 線,M-005,WO-2604025,PROD-B-002,8,7.2,0.8,模具更換,1500,1370,1355,15,98.9%\n2026-04-28,A 線,M-001,WO-2604026,PROD-A-001,8,7.3,0.7,機台保養,1000,915,907,8,99.1%\n2026-04-28,A 線,M-002,WO-2604027,PROD-A-002,8,7.6,0.4,換料,1200,1180,1170,10,99.2%\n2026-04-28,A 線,M-003,WO-2604028,PROD-A-003,8,7.4,0.6,待料,800,750,742,8,98.9%\n2026-04-28,B 線,M-004,WO-2604029,PROD-B-001,8,5.0,3.0,異常待修,2000,1350,1280,70,94.8%\n2026-04-28,B 線,M-005,WO-2604030,PROD-B-002,8,7.4,0.6,模具更換,1500,1430,1415,15,98.9%\n"}, "binary_files": [], "deploy_text": "# MES 數據分析助手 — 正式上線指南\n\n本文件協助您把 Prompt Designer 產出的 Agent 從「概念驗證」推向「正式上線」。\n建議由種子團隊以一週為單位推進：第一週 KB 準備、第二週 Agent 建置與驗測、第三週試營運、第四週正式上線。\n\n---\n\n## 一、部署前置作業\n\n### 1. 知識庫準備\n\n1. 從 MES 匯出近 30 天的生產日報資料。\n2. **資料清洗**:\n   - 第一列為單一標題列\n   - 統一日期 YYYY-MM-DD\n   - 數值欄位純數字\n   - 機台、工單代號標準化(避免特殊符號)\n3. 與生管確認資料區間與欄位完整性。\n4. 編碼 UTF-8 BOM。\n\n### 2. 確認權限與工作室\n\n- 在 EgentHub 後台建立或選擇對應的工作室（例如：人資、品保、業務 BU）。\n- 確認您的角色為「工作室管理員」或「開發者」，才能建立 Agent 與上傳 KB。\n- 確認工作室點數額度足夠（建議至少預留一個月用量緩衝）。\n\n---\n\n## 二、在 EgentHub 建立 Agent\n\n### Step 1：建立 Agent 並選擇模型\n登入 EgentHub 後台 → 選擇工作室 → 「建立 Agent」 →\n- Agent 名稱：MES 數據分析助手\n- 預設模型：建議 Claude Sonnet 或 Gemini Pro\n- 描述：（複製需求盤點檔案中第一段「角色定位」）\n\n### Step 2：貼入 Prompt Designer 產出的提示詞\n將 Prompt Designer 產出的提示詞完整複製貼上，注意保留「問答指引」段落不要修改。\n\n### Step 3：上傳知識庫\n1. 進入 Agent 編輯頁 → 「**表格查詢知識庫**」 → 「上傳 CSV」。\n2. 上傳 MES_生產數據.csv。\n3. 測試查詢「上週機台稼動率」確認 Agent 能正確聚合。\n\n### Step 4：設定使用者與群組可見性\n- 開發階段：限定種子團隊試用。\n- 試營運階段：擴大到部門 5-10 位種子使用者。\n- 正式上線：開放給目標部門全員。\n\n---\n\n## 三、提示詞調校建議\n\n- 若 Agent 把日期或機台混淆,加上:「先確認使用者問的時間區間與機台範圍,再檢索」。\n- 若 Agent 推測根因,加上:「不主動推測根因,只列『建議調查方向』」。\n- 若 Pareto 分析錯誤,加上:「Pareto 須依次數或時間總和排序,並標註占比」。\n\n---\n\n## 四、驗測情境（建議至少跑過以下案例）\n\n1. **正向案例 - 稼動率**: 輸入「上週各機台稼動率排名」\n   - 預期：正確計算 5 台機器稼動率並排序,M-002 第 1、M-004 最低\n2. **正向案例 - 良率**: 輸入「最近 7 天良率最差的工單」\n   - 預期：列出 B 線 WO-2604019(93.2%)等異常工單\n3. **正向案例 - Pareto**: 輸入「本週停機原因 Pareto」\n   - 預期：列出『異常待修』、『機台保養』、『換料』等占比\n4. **邊界案例 - 跨機台比較**: 輸入「A 線與 B 線本週產量比較」\n   - 預期：依產線分別加總實際產量\n\n---\n\n## 五、上線檢核清單\n\n- [ ] MES 資料每日匯出機制建立\n- [ ] 提示詞已加上「不推測根因」保護\n- [ ] 已與廠長 / 生管主管確認 Agent 用途與限制\n- [ ] 至少 3 位生管 / 品保試用 1 週\n\n---\n\n## 六、上線後維運建議\n\n- 每日由生管助理更新 CSV(建議 7:30 前完成),配合晨會。\n- 進階版可串接 MES MCP 即時查詢。\n- 後續可加入「異常自動偵測」:連續良率下滑、稼動率連跌等,主動推送提醒。\n\n---\n\n## 七、常見問題\n\n**Q1: Agent 回答不準確？**\n先檢查 KB 內容是否完整、條文是否清晰；其次調整提示詞中的「執行流程」與「輸出格式」。\n\n**Q2: 同事抱怨 Agent 太囉嗦？**\n在提示詞「輸出格式」中明確要求字數限制或結構（例如：條列三點以內、不超過 200 字）。\n\n**Q3: 找不到對應內容時應如何處理？**\n在提示詞中加上：「若知識庫中無法找到答案，請明確回覆『此問題未在現有資料中，建議您聯繫 [窗口] 進一步確認』，切勿自行推測。」\n\n---\n\n如有導入問題請聯繫精誠資訊 EgentHub 顧問團隊。\n"}, {"dir": "06_全文檢索_認證法規查詢助手", "agent_name": "認證法規查詢助手", "kb_label": "全文檢索知識庫", "track": "main", "order": 6, "requirement_text": "# 需求盤點:認證法規查詢助手\n\n> 學員操作說明:請將以下「需求描述」段落整段複製,貼入 EgentHub Prompt Designer 的「需求描述」欄位。\n\n---\n\n## 一、Agent 基本資料\n\n- **Agent 名稱**:認證法規查詢助手\n- **所屬工作室**:研發 / 品保 / 法務\n- **使用對象**:研發、品保、法務、業務\n- **預設模型建議**:Claude Sonnet\n\n---\n\n## 二、需求描述(請整段複製到 Prompt Designer)\n\n我希望建立一個「認證法規查詢助手」,協助研發、品保與法務同仁快速查詢 RoHS、REACH、UL、CE 等認證與法規條文。\n\n**角色定位**:你是一位嚴謹、熟悉國際電子產業法規的法遵助理,能夠根據使用者問題,從法規原文中找出相關條文並用白話說明,協助同仁判斷產品是否合規。\n\n**任務目標**:當研發、品保、法務同仁有法規疑問時(例如「RoHS 限制了哪些重金屬?」、「REACH SVHC 最新清單?」、「醫療器材 IEC 60601 的接地要求?」),你能根據法規原文,提供條文摘要、引用條號、適用範圍與注意事項。\n\n**知識庫類型**:全文檢索知識庫(TXT/PDF)。我會上傳幾份法規條文(例如 RoHS 2.0、REACH 主要條款、UL 60950 摘要),作為查詢來源。\n\n**使用者輸入範例**:\n1. RoHS 2.0 限制了哪些重金屬?容許值多少?\n2. REACH 第 33 條告知義務是什麼?\n3. 我做車用 LED 模組,需要哪些認證?\n4. SVHC 物質清單最新更新時間?\n5. RoHS 豁免條款有哪些?\n\n**預期輸出**:\n1. 引用法規條文編號與標題(例如:依據 RoHS 2.0 (2011/65/EU) 第 4 條)。\n2. 用白話說明條文核心要求(2-3 句)。\n3. 列出適用範圍與不適用範圍。\n4. 重要注意事項或常見誤區(粗體標示)。\n5. 若涉及多份法規,主動補充交叉引用。\n\n**風格與限制**:\n- 回覆以繁體中文為主,語氣專業、嚴謹。\n- 法規條文必須與知識庫一致,不得自行解讀或推估。\n- 標註法規版本與發布日期。法規可能更新,提醒「請以官方最新公告為準」。\n- 若涉及具體產品的合規判斷,提醒「正式合規評估請洽法務或外部合規顧問」。\n- 不提供法律建議。\n\n**範例對話**:\n\n【使用者】RoHS 2.0 限制了哪些重金屬?容許值多少?\n\n【助手期望回答】\n依據 RoHS 2.0 (Directive 2011/65/EU) 第 4 條與附錄 II,限用物質與容許值如下:\n\n| 限用物質 | 容許值 (重量比) |\n|---|---|\n| 鉛 (Pb) | 0.1% (1000 ppm) |\n| 鎘 (Cd) | 0.01% (100 ppm) |\n| 汞 (Hg) | 0.1% (1000 ppm) |\n| 六價鉻 (Cr⁶⁺) | 0.1% (1000 ppm) |\n| 多溴聯苯 (PBB) | 0.1% (1000 ppm) |\n| 多溴聯苯醚 (PBDE) | 0.1% (1000 ppm) |\n| 鄰苯二甲酸二(2-乙基己基)酯 (DEHP) | 0.1% (1000 ppm) |\n| 鄰苯二甲酸丁基苄基酯 (BBP) | 0.1% (1000 ppm) |\n| 鄰苯二甲酸二丁酯 (DBP) | 0.1% (1000 ppm) |\n| 鄰苯二甲酸二異丁酯 (DIBP) | 0.1% (1000 ppm) |\n\n**重要注意事項**:\n- 後 4 項鄰苯二甲酸鹽自 2019/07/22 起適用 (醫療器材另有過渡期)。\n- 容許值以「均質材料」為計算基準,非以整件產品為準。\n- 部分豁免條款適用於特定應用 (見 RoHS 附錄 III)。\n\n法規版本:Directive 2011/65/EU,最新修訂 (EU) 2015/863。請以歐盟官方公告為準。\n正式合規判斷請洽法務或外部合規顧問。\n\n---\n\n## 三、上線後的延伸應用\n\n- 後續可擴充:UL、CE、IEC、AEC-Q 等更多法規條文。\n", "prompt_input": "我希望建立一個「認證法規查詢助手」,協助研發、品保與法務同仁快速查詢 RoHS、REACH、UL、CE 等認證與法規條文。\n\n**角色定位**:你是一位嚴謹、熟悉國際電子產業法規的法遵助理,能夠根據使用者問題,從法規原文中找出相關條文並用白話說明,協助同仁判斷產品是否合規。\n\n**任務目標**:當研發、品保、法務同仁有法規疑問時(例如「RoHS 限制了哪些重金屬?」、「REACH SVHC 最新清單?」、「醫療器材 IEC 60601 的接地要求?」),你能根據法規原文,提供條文摘要、引用條號、適用範圍與注意事項。\n\n**知識庫類型**:全文檢索知識庫(TXT/PDF)。我會上傳幾份法規條文(例如 RoHS 2.0、REACH 主要條款、UL 60950 摘要),作為查詢來源。\n\n**使用者輸入範例**:\n1. RoHS 2.0 限制了哪些重金屬?容許值多少?\n2. REACH 第 33 條告知義務是什麼?\n3. 我做車用 LED 模組,需要哪些認證?\n4. SVHC 物質清單最新更新時間?\n5. RoHS 豁免條款有哪些?\n\n**預期輸出**:\n1. 引用法規條文編號與標題(例如:依據 RoHS 2.0 (2011/65/EU) 第 4 條)。\n2. 用白話說明條文核心要求(2-3 句)。\n3. 列出適用範圍與不適用範圍。\n4. 重要注意事項或常見誤區(粗體標示)。\n5. 若涉及多份法規,主動補充交叉引用。\n\n**風格與限制**:\n- 回覆以繁體中文為主,語氣專業、嚴謹。\n- 法規條文必須與知識庫一致,不得自行解讀或推估。\n- 標註法規版本與發布日期。法規可能更新,提醒「請以官方最新公告為準」。\n- 若涉及具體產品的合規判斷,提醒「正式合規評估請洽法務或外部合規顧問」。\n- 不提供法律建議。\n\n**範例對話**:\n\n【使用者】RoHS 2.0 限制了哪些重金屬?容許值多少?\n\n【助手期望回答】\n依據 RoHS 2.0 (Directive 2011/65/EU) 第 4 條與附錄 II,限用物質與容許值如下:\n\n| 限用物質 | 容許值 (重量比) |\n|---|---|\n| 鉛 (Pb) | 0.1% (1000 ppm) |\n| 鎘 (Cd) | 0.01% (100 ppm) |\n| 汞 (Hg) | 0.1% (1000 ppm) |\n| 六價鉻 (Cr⁶⁺) | 0.1% (1000 ppm) |\n| 多溴聯苯 (PBB) | 0.1% (1000 ppm) |\n| 多溴聯苯醚 (PBDE) | 0.1% (1000 ppm) |\n| 鄰苯二甲酸二(2-乙基己基)酯 (DEHP) | 0.1% (1000 ppm) |\n| 鄰苯二甲酸丁基苄基酯 (BBP) | 0.1% (1000 ppm) |\n| 鄰苯二甲酸二丁酯 (DBP) | 0.1% (1000 ppm) |\n| 鄰苯二甲酸二異丁酯 (DIBP) | 0.1% (1000 ppm) |\n\n**重要注意事項**:\n- 後 4 項鄰苯二甲酸鹽自 2019/07/22 起適用 (醫療器材另有過渡期)。\n- 容許值以「均質材料」為計算基準,非以整件產品為準。\n- 部分豁免條款適用於特定應用 (見 RoHS 附錄 III)。\n\n法規版本:Directive 2011/65/EU,最新修訂 (EU) 2015/863。請以歐盟官方公告為準。\n正式合規判斷請洽法務或外部合規顧問。\n\n---", "kb_text_files": {"知識庫_RoHS與REACH法規.txt": "# 國際法規條文摘要(教學用範本)\n\n> 本文件為教學示範用節選,實際合規應以官方原文為準。\n\n================================================================\nRoHS 2.0 (Directive 2011/65/EU)\n================================================================\n\n【法規名稱】Restriction of Hazardous Substances Directive 2.0\n【生效日期】2013-01-03 (修訂為 (EU) 2015/863, 2019-07-22 起新增 4 項鄰苯二甲酸鹽)\n【適用範圍】歐盟銷售之電機電子設備 (EEE)\n\n---\n\n## 第 4 條 限用物質與容許值\n\n下列物質在電機電子設備之均質材料中容許值如下:\n\n1. 鉛 (Pb): 0.1% (1000 ppm) 重量比\n2. 鎘 (Cd): 0.01% (100 ppm) 重量比\n3. 汞 (Hg): 0.1% (1000 ppm) 重量比\n4. 六價鉻 (Cr⁶⁺): 0.1% (1000 ppm) 重量比\n5. 多溴聯苯 (PBB): 0.1% (1000 ppm) 重量比\n6. 多溴聯苯醚 (PBDE): 0.1% (1000 ppm) 重量比\n\n依 (EU) 2015/863 修訂,自 2019-07-22 起新增:\n7. 鄰苯二甲酸二(2-乙基己基)酯 (DEHP): 0.1% 重量比\n8. 鄰苯二甲酸丁基苄基酯 (BBP): 0.1% 重量比\n9. 鄰苯二甲酸二丁酯 (DBP): 0.1% 重量比\n10. 鄰苯二甲酸二異丁酯 (DIBP): 0.1% 重量比\n\n【重要】\n- 容許值以「均質材料」(homogeneous material) 為計算基準,非以整件產品為準。\n- 醫療器材與監視儀器有過渡期,自 2021-07-22 起適用後 4 項鄰苯二甲酸鹽。\n\n---\n\n## 第 5 條 豁免條款\n\n附錄 III 列出之應用豁免於第 4 條限制,常見豁免包括:\n\n1. 燈具中之水銀(高低壓鈉燈、複金屬燈,各有上限)。\n2. CRT 顯示器螢光粉中之鉛。\n3. 焊料中之鉛(部分軍用、太空、特殊應用)。\n4. 鋼合金中之鉛(0.35% 以下)。\n5. 銅合金中之鉛(4% 以下)。\n\n豁免有期限,需定期申請延展。最新豁免清單請查詢歐盟官網。\n\n---\n\n## 第 7 條 製造商義務\n\n製造商應:\n1. 確保產品符合本指令,並準備技術文件 (Technical File)。\n2. 進行符合性評估 (依附錄 V 內部生產控制程序)。\n3. 起草符合性聲明 (DoC)。\n4. 在產品上加註 CE 標誌。\n5. 保存技術文件 10 年備查。\n\n================================================================\nREACH (EC) No 1907/2006\n================================================================\n\n【法規名稱】Registration, Evaluation, Authorisation and Restriction of Chemicals\n【生效日期】2007-06-01\n【適用範圍】歐盟註冊、上市或使用之化學物質\n\n---\n\n## 第 7 條 物品中之物質註冊與通報\n\n1. 物品中之物質,若年產量或進口量超過 1 噸且預期將釋出,須註冊。\n2. 物品中含有 SVHC (高度關注物質) 超過 0.1% 重量比且年產量/進口量超過 1 噸者,須通報 ECHA (歐洲化學品管理局)。\n\n---\n\n## 第 33 條 告知義務\n\n供應商於提供物品時,若物品中含有 SVHC 物質且濃度超過 0.1% 重量比:\n\n1. 應主動告知接收者該物質名稱與安全使用資訊。\n2. 應於消費者要求後 45 天內提供。\n3. 自 2021-01-05 起,應透過 SCIP 資料庫提交。\n\n---\n\n## 第 57-59 條 SVHC 識別與納入候選清單\n\nSVHC (Substance of Very High Concern) 包括:\n1. 致癌、致突變、生殖毒性 (CMR) 物質\n2. 持久性、生物累積性、毒性 (PBT) 物質\n3. 極持久性、極生物累積性 (vPvB) 物質\n4. 其他相當關注物質 (內分泌干擾物等)\n\nSVHC 候選清單由 ECHA 每年 6 月與 12 月更新 2 次。截至 2026-01,清單共有約 240 項物質。\n最新清單請查詢 ECHA 官網: https://echa.europa.eu/candidate-list-table\n\n---\n\n## 附錄 XIV 授權清單\n\n附錄 XIV 列出禁止使用 (除非取得授權) 的物質。常見受限物質包括:\n- DEHP, BBP, DBP, DIBP (鄰苯二甲酸鹽)\n- 重鉻酸鈉、鉻酸鋁等鉻化合物\n- 三氧化二砷\n- 短鏈氯化石蠟 (SCCP)\n\n================================================================\nUL 60950-1 / IEC 62368-1 (資訊與通訊技術設備安全)\n================================================================\n\n【法規名稱】Audio/video, information and communication technology equipment - Safety requirements\n【生效日期】IEC 62368-1 第 3 版於 2018 年發布,2020-12-20 起取代 IEC 60950-1 與 IEC 60065\n【適用範圍】資訊、通訊、音視訊設備\n\n---\n\n## 重要安全要求摘要\n\n1. **能量分類**:依 ES1/ES2/ES3 (電能)、PS1/PS2/PS3 (功率源) 分級,設定保護要求。\n2. **絕緣要求**:基本絕緣、附加絕緣、強化絕緣分級。\n3. **接地保護**:Class I 設備須提供保護接地,接地電阻 ≤ 0.1Ω。\n4. **電氣間隙與爬電距離**:依電壓與汙染等級設定最小距離。\n5. **防火結構**:外殼材料須符合 V-1 或更高等級。\n6. **人為錯誤防護**:設備應防止使用者誤觸帶電部件。\n\n================================================================\nAEC-Q100 / Q101 / Q200 (車用元件可靠度)\n================================================================\n\n【法規名稱】Automotive Electronics Council 車用電子元件可靠度標準\n【適用範圍】車用 IC (Q100)、車用離散元件 (Q101)、車用被動元件 (Q200)\n\n---\n\n## AEC-Q100 重點\n\n1. 工作溫度等級分為 Grade 0 (-40~150°C)、Grade 1 (-40~125°C)、Grade 2 (-40~105°C)、Grade 3 (-40~85°C)。\n2. 須通過 ESD、Latch-up、HTOL、HAST、TC 等可靠度測試。\n3. 認證有效期 1 年,須定期更新測試。\n\n================================================================\n法規版本資訊\n================================================================\n- RoHS 2.0:Directive 2011/65/EU,最新修訂 (EU) 2015/863\n- REACH:Regulation (EC) No 1907/2006\n- IEC 62368-1:第 3 版,2018 年發布\n- AEC-Q100:Rev-J,2023 年發布\n\n【本文件版本:2026-04-01 / 教學示範用節選】\n"}, "binary_files": [], "deploy_text": "# 認證法規查詢助手 — 正式上線指南\n\n本文件協助您把 Prompt Designer 產出的 Agent 從「概念驗證」推向「正式上線」。\n建議由種子團隊以一週為單位推進：第一週 KB 準備、第二週 Agent 建置與驗測、第三週試營運、第四週正式上線。\n\n---\n\n## 一、部署前置作業\n\n### 1. 知識庫準備\n\n1. 蒐集貴公司常用的法規條文 (建議從 RoHS、REACH、UL、CE、IEC、AEC-Q 等開始)。\n2. 法規原文以 PDF 或 TXT 整理。建議由法務或品保整理為易讀的版本(可保留條號)。\n3. 確認版本為最新公告,並標註發布日期。\n4. 法規來源建議標註原始連結,方便使用者深入查閱。\n\n### 2. 確認權限與工作室\n\n- 在 EgentHub 後台建立或選擇對應的工作室（例如：人資、品保、業務 BU）。\n- 確認您的角色為「工作室管理員」或「開發者」，才能建立 Agent 與上傳 KB。\n- 確認工作室點數額度足夠（建議至少預留一個月用量緩衝）。\n\n---\n\n## 二、在 EgentHub 建立 Agent\n\n### Step 1：建立 Agent 並選擇模型\n登入 EgentHub 後台 → 選擇工作室 → 「建立 Agent」 →\n- Agent 名稱：認證法規查詢助手\n- 預設模型：建議 Claude Sonnet 或 Gemini Pro\n- 描述：（複製需求盤點檔案中第一段「角色定位」）\n\n### Step 2：貼入 Prompt Designer 產出的提示詞\n將 Prompt Designer 產出的提示詞完整複製貼上，注意保留「問答指引」段落不要修改。\n\n### Step 3：上傳知識庫\n1. 進入 Agent 編輯頁 → 「全文檢索知識庫」 → 「上傳檔案」。\n2. 上傳法規條文(可多份分別上傳)。\n3. 系統自動建立全文索引(依檔案大小約 1-3 分鐘)。\n4. 測試查詢「RoHS 限用物質」確認 Agent 能正確引用條號。\n\n### Step 4：設定使用者與群組可見性\n- 開發階段：限定種子團隊試用。\n- 試營運階段：擴大到部門 5-10 位種子使用者。\n- 正式上線：開放給目標部門全員。\n\n---\n\n## 三、提示詞調校建議\n\n- 若 Agent 引用條號常出錯,請在「執行流程」加上:「回覆前必須核對知識庫條文,引用條號需與原文一致」。\n- 若回覆過於模糊,請在「輸出格式」加上:「核心要求需用粗體標示」。\n- 若涉及合規判斷,請加上免責聲明:「正式合規判斷請洽法務或外部顧問」。\n- 若使用者用簡稱(例:RoHS, REACH),請在執行流程加上:「先解析使用者問題的法規縮寫,再檢索」。\n\n---\n\n## 四、驗測情境（建議至少跑過以下案例）\n\n1. **正向案例 - 條文查詢**: 輸入「RoHS 限制了哪些重金屬?」\n   - 預期：正確列出 10 項限用物質與容許值,引用 RoHS 2.0 第 4 條\n2. **正向案例 - 義務查詢**: 輸入「REACH 第 33 條告知義務?」\n   - 預期：說明 SVHC 0.1% 告知義務,提及 SCIP\n3. **邊界案例 - 法規未涵蓋**: 輸入「美國加州 Prop 65 限制?」\n   - 預期：誠實告知 KB 未涵蓋,建議洽詢法務或補充 KB\n4. **邊界案例 - 合規判斷**: 輸入「我這款 LED 模組符合 RoHS 嗎?」\n   - 預期：說明條文要求並建議洽法務正式評估\n\n---\n\n## 五、上線檢核清單\n\n- [ ] 法規條文版本為最新並標註版本日期\n- [ ] 提示詞中已強調「以官方公告為準」的免責聲明\n- [ ] 提示詞中已加上「不提供法律建議」的保護機制\n- [ ] 至少 3 位法務 / 品保種子使用者試用\n- [ ] 已建立法規更新時的同步更新流程\n\n---\n\n## 六、上線後維運建議\n\n- 建立法規更新訂閱機制(歐盟、ECHA、UL 等),並由法務每月更新 KB。\n- 蒐集使用者最常問的法規條文,作為 KB 補充優先項。\n- 進階版可整合「合約條款查詢助手」與「產品認證資料庫」,達到端到端合規查詢。\n- 與外部合規顧問建立 SLA,作為 Agent 無法解答時的後援機制。\n\n---\n\n## 七、常見問題\n\n**Q1: Agent 回答不準確？**\n先檢查 KB 內容是否完整、條文是否清晰；其次調整提示詞中的「執行流程」與「輸出格式」。\n\n**Q2: 同事抱怨 Agent 太囉嗦？**\n在提示詞「輸出格式」中明確要求字數限制或結構（例如：條列三點以內、不超過 200 字）。\n\n**Q3: 找不到對應內容時應如何處理？**\n在提示詞中加上：「若知識庫中無法找到答案，請明確回覆『此問題未在現有資料中，建議您聯繫 [窗口] 進一步確認』，切勿自行推測。」\n\n---\n\n如有導入問題請聯繫精誠資訊 EgentHub 顧問團隊。\n"}, {"dir": "07_混合_向量加表格_B2B智慧客服", "agent_name": "B2B智慧客服", "kb_label": "混合知識庫 (向量+表格)", "track": "main", "order": 7, "requirement_text": "# 需求盤點:B2B 智慧客服(電電公會工作坊指定教材)\n\n> 學員操作說明:請將以下「需求描述」段落整段複製,貼入 EgentHub Prompt Designer 的「需求描述」欄位。\n>\n> 本題對應 TEEMA 工作坊「智慧客服 AI Agent」單元,展示「向量 + 表格」混合 KB 應用。\n> 預計操作時間:45-60 分鐘。\n\n---\n\n## 一、Agent 基本資料\n\n- **Agent 名稱**:B2B 智慧客服\n- **所屬工作室**:客服 / 業務\n- **使用對象**:B2B 客戶(透過官網、LINE、Email)+ 內部客服窗口\n- **預設模型建議**:Claude Sonnet(對話品質與口語化能力佳)\n\n---\n\n## 二、需求描述(請整段複製到 Prompt Designer)\n\n我希望建立一個「B2B 智慧客服」,作為公司面向 B2B 客戶的第一線回應入口,能同時處理產品諮詢、訂單查詢、客訴受理三類問題,並在客戶不滿時順暢升級給人工客服。\n\n**角色定位**:你是一位資深客戶服務專員,具備 10 年客服經驗,熟悉公司所有產品線,擅長處理客訴並轉化為正面體驗。始終保持專業與同理心。\n\n**任務目標**:當 B2B 客戶用自然語言提問時,你能:\n1. **分類問題類型**:產品諮詢 / 訂單問題 / 客訴處理 / 其他。\n2. **查詢相關資訊**:從 FAQ 知識庫(向量)或訂單資料(SQL)中檢索答案。\n3. **提供解決方案**:給出明確答覆 + 相關連結或文件。\n4. **記錄與追蹤**:標記未解決的問題,設定後續追蹤提醒。\n\n**知識庫類型**:**混合應用**。\n1. **向量知識庫**:FAQ 文件(產品規格、保固、出貨、付款、認證等常見問答)。\n2. **表格查詢知識庫**:訂單表 CSV(訂單號、客戶代碼、產品、數量、訂單日、預計出貨、實際出貨、物流追蹤號、訂單狀態)。\n\n**使用者輸入範例**:\n1. (產品諮詢)PROD-A-001 的保固期多久?\n2. (訂單問題)我的訂單 ORD-2026-00125 到哪了?\n3. (客訴處理)上週收到的貨有 5 個不良,要怎麼處理?\n4. (組合問題)我訂單裡的 LED 模組有 IATF 認證嗎?\n5. (邊界問題)幫我把這筆訂單改成 1000 個。\n\n**預期工作流程**(請寫入 Agent Prompt 的「執行流程」):\n- **步驟 1:分析問題類型**(產品諮詢 / 訂單問題 / 客訴處理 / 其他)。\n- **步驟 2:查詢相關資訊**(產品問題 → 向量 FAQ;訂單問題 → SQL 訂單表;客訴 → 表達同理心後回查)。\n- **步驟 3:提供解決方案**(明確答覆 + 連結或文件 + 詢問是否需要進一步協助)。\n- **步驟 4:記錄與追蹤**(標記未解決問題、設定後續追蹤)。\n\n**決策邏輯**:\n- 情況 A:簡單產品問題 → 直接從 FAQ 提供答案。\n- 情況 B:訂單追蹤問題 → 調用訂單表查詢,提供物流資訊。\n- 情況 C:客戶不滿 → 表達同理心 → 提供解決方案 → 詢問是否滿意 → 若仍不滿意,升級給人工處理。\n- 情況 D:超出權限範圍(改訂單、退款、議價)→ 禮貌說明無法處理 → 提供正確聯絡管道。\n\n**溝通風格指引**:\n- **語氣**:親切但專業,避免過度口語化。\n- **用詞**:使用「您」而非「你」,稱呼產品使用正式名稱,避免行業術語。\n- **句式**:優先肯定句,避免過長句子,重要資訊分點說明。\n- **回應長度**:簡單問題 1-2 段;複雜問題 3-5 段。\n\n**異常處理**:\n- 無法理解客戶問題:「抱歉,我沒有完全理解您的問題。您是指 ... 嗎?」+ 提供幾個可能選項。\n- 系統查詢失敗:「系統暫時無法查詢,請稍後再試或直接聯繫客服專線」+ 提供替代聯絡方式。\n- 客戶情緒激動:優先表達同理心 → 不爭辯 → 快速升級給人工處理。\n- 收到不當訊息:禮貌但堅定地拒絕回應,說明服務範圍。\n\n**知識邊界**:\n- 你**可以**:提供產品公開資訊、說明公司政策、分享使用技巧和建議。\n- 你**不可以**:透露未公開的產品資訊、評論競爭對手、承諾未經授權的優惠、提供醫療或法律建議、分享其他客戶的資訊。\n\n**範例對話**:\n\n【客戶】我的訂單 ORD-2026-00125 到哪了?\n\n【助手期望回答】\n\n您好,我幫您查到訂單狀態如下:\n\n**訂單 ORD-2026-00125**\n- 訂購產品:PROD-A-001(高效率變壓器 12V/5A)\n- 訂購數量:200 pcs\n- 訂單日期:2026-04-08\n- 預計出貨:2026-04-25\n- 實際出貨:2026-04-23(已出貨)\n- 物流追蹤號:SF-1234-5678(順豐速運)\n- 預計到貨:2026-04-26\n\n請問還有什麼可以協助您的嗎?\n\n---\n\n## 三、與庫存管理助手的差異(教學重點)\n\n- **多了「決策邏輯」**:依問題類型分流到不同 KB / 系統。\n- **多了「溝通風格指引」**:語氣、用詞、句式有明確規範。\n- **多了「異常處理」**:客戶激動、系統失敗、不當訊息的標準回應。\n- **多了「知識邊界」**:明確列出「可以」與「不可以」的事。\n\n---\n\n## 四、上線後的延伸應用\n\n- 進階版:整合 LINE API、網頁 Widget、電話系統(MCP),做多管道整合。\n- 進階版:加入「客訴自動分類 → 自動建單」流程。\n- 拓展版:擴充至國際版(多語客服)、特定產品線專屬客服。\n", "prompt_input": "我希望建立一個「B2B 智慧客服」,作為公司面向 B2B 客戶的第一線回應入口,能同時處理產品諮詢、訂單查詢、客訴受理三類問題,並在客戶不滿時順暢升級給人工客服。\n\n**角色定位**:你是一位資深客戶服務專員,具備 10 年客服經驗,熟悉公司所有產品線,擅長處理客訴並轉化為正面體驗。始終保持專業與同理心。\n\n**任務目標**:當 B2B 客戶用自然語言提問時,你能:\n1. **分類問題類型**:產品諮詢 / 訂單問題 / 客訴處理 / 其他。\n2. **查詢相關資訊**:從 FAQ 知識庫(向量)或訂單資料(SQL)中檢索答案。\n3. **提供解決方案**:給出明確答覆 + 相關連結或文件。\n4. **記錄與追蹤**:標記未解決的問題,設定後續追蹤提醒。\n\n**知識庫類型**:**混合應用**。\n1. **向量知識庫**:FAQ 文件(產品規格、保固、出貨、付款、認證等常見問答)。\n2. **表格查詢知識庫**:訂單表 CSV(訂單號、客戶代碼、產品、數量、訂單日、預計出貨、實際出貨、物流追蹤號、訂單狀態)。\n\n**使用者輸入範例**:\n1. (產品諮詢)PROD-A-001 的保固期多久?\n2. (訂單問題)我的訂單 ORD-2026-00125 到哪了?\n3. (客訴處理)上週收到的貨有 5 個不良,要怎麼處理?\n4. (組合問題)我訂單裡的 LED 模組有 IATF 認證嗎?\n5. (邊界問題)幫我把這筆訂單改成 1000 個。\n\n**預期工作流程**(請寫入 Agent Prompt 的「執行流程」):\n- **步驟 1:分析問題類型**(產品諮詢 / 訂單問題 / 客訴處理 / 其他)。\n- **步驟 2:查詢相關資訊**(產品問題 → 向量 FAQ;訂單問題 → SQL 訂單表;客訴 → 表達同理心後回查)。\n- **步驟 3:提供解決方案**(明確答覆 + 連結或文件 + 詢問是否需要進一步協助)。\n- **步驟 4:記錄與追蹤**(標記未解決問題、設定後續追蹤)。\n\n**決策邏輯**:\n- 情況 A:簡單產品問題 → 直接從 FAQ 提供答案。\n- 情況 B:訂單追蹤問題 → 調用訂單表查詢,提供物流資訊。\n- 情況 C:客戶不滿 → 表達同理心 → 提供解決方案 → 詢問是否滿意 → 若仍不滿意,升級給人工處理。\n- 情況 D:超出權限範圍(改訂單、退款、議價)→ 禮貌說明無法處理 → 提供正確聯絡管道。\n\n**溝通風格指引**:\n- **語氣**:親切但專業,避免過度口語化。\n- **用詞**:使用「您」而非「你」,稱呼產品使用正式名稱,避免行業術語。\n- **句式**:優先肯定句,避免過長句子,重要資訊分點說明。\n- **回應長度**:簡單問題 1-2 段;複雜問題 3-5 段。\n\n**異常處理**:\n- 無法理解客戶問題:「抱歉,我沒有完全理解您的問題。您是指 ... 嗎?」+ 提供幾個可能選項。\n- 系統查 0134,C-008,客戶 H,PROD-C-002,嵌入式電腦主機板 Mini-ITX,20,72000,2026-04-25,2026-05-15,,,排程中\n", "知識庫_公司產品與服務FAQ.txt": "# 公司產品與服務 FAQ(向量知識庫範本)\n\n> 本文件為教學示範用,實際請依貴公司 FAQ 為準。\n\n================================================================\n一、產品保固\n================================================================\n\n## Q1. 產品標準保固期多久?\nA: 標準保固期為 1 年,自交貨日起算。保固期內因品質問題之退換貨,由我司負擔運費與費用。\n\n## Q2. 保固期可以延長嗎?\nA: 可以。客戶可加購延長保固服務,費用為產品單價的 5%(每年)。最長可延長至 3 年。\n\n## Q3. 保固範圍涵蓋哪些?\nA: 涵蓋:\n- 產品本身瑕疵\n- 出廠不良\n- 規格未達標(經測試確認)\n\n不涵蓋:\n- 人為損壞、誤用\n- 未依規格使用導致的損壞\n- 開箱後超過 30 天才回報的外觀瑕疵\n\n================================================================\n二、訂單與出貨\n================================================================\n\n## Q4. 一般訂單的處理時程?\nA: 標準訂單流程:\n- 下單後 1-2 工作日:訂單確認與付款排程\n- 確認後 2-4 週:依產品類別生產與出貨\n- 出貨後 3-5 工作日(海運 25-35 天):送達\n\n## Q5. 是否可以加急?\nA: 可以,加急訂單需另行協商加急費用,通常為訂單金額的 5-10%,可縮短交期 30-50%。\n\n## Q6. 最小起訂量(MOQ)?\nA: 依產品而異:\n- 變壓器、主機板:100 pcs\n- LED、感測器:500-1000 pcs\n- 客製品:依專案而定\n\n================================================================\n三、認證\n================================================================\n\n## Q7. 公司有哪些認證?\nA: 公司管理系統認證:\n- ISO 9001 品質管理(2010)\n- ISO 14001 環境管理(2015)\n- IATF 16949 車用品管(2018)\n- ISO 27001 資安管理(2022)\n\n產品認證能力:UL、CE、FCC、AEC-Q100/Q200、IEC 60601。\n\n## Q8. 可以提供哪些認證文件?\nA: 可提供:\n- COC(符合性聲明)\n- 認證證書副本\n- PPAP 完整文件(車用)\n- 8D 報告(品質異常)\n- SDS(化學品)\n\n================================================================\n四、付款條件\n================================================================\n\n## Q9. 標準付款條件?\nA: 標準:月結 60 天,銀行匯款。\n- 大型專案:30% 訂金、40% 出貨前、30% 驗收後\n- 新客戶首三筆訂單:採貨到付款(COD)\n- VIP 客戶:可協商月結 90 天\n\n## Q10. 接受哪些付款方式?\nA: 接受方式:\n- 電匯(T/T)\n- 信用狀(L/C)\n- 信用卡(限小額,5 萬以內)\n\n================================================================\n五、退換貨\n================================================================\n\n## Q11. 收貨後發現品質問題怎麼辦?\nA: 請於收貨後 7 個工作天內提出書面異議。流程:\n1. 拍照或錄影紀錄不良情形\n2. 填寫客訴單(可向業務窗口索取)\n3. 我司 24 小時內登錄客訴並啟動 8D 流程\n4. 48 小時內提出暫時對策\n\n## Q12. 退換貨的運費誰負擔?\nA: 因品質問題退換貨,運費由我司負擔。其他原因(例如客戶下錯訂單)由客戶負擔。\n\n================================================================\n六、樣品\n================================================================\n\n## Q13. 是否提供樣品?\nA: 可。\n- 標準樣品:5-10 pcs,2 週內提供,免費\n- 客製樣品:依複雜度約 4-6 週,費用視產品而定(於正式訂單中扣抵)\n\n================================================================\n七、客服窗口\n================================================================\n\n## Q14. 客服聯絡方式?\nA:\n- 業務:business@company.com\n- 品保:qa@company.com\n- 客服專線:+886-3-XXX-XXXX(週一至週五 9:00-18:00)\n- LINE 客服:@companycare(24 小時可留訊)\n\n【本文件版本:2026-04 / 教學示範用 FAQ】\n"}, "binary_files": [], "deploy_text": "# B2B 智慧客服 — 正式上線指南\n\n本文件協助您把 Prompt Designer 產出的 Agent 從「概念驗證」推向「正式上線」。\n建議由種子團隊以一週為單位推進：第一週 KB 準備、第二週 Agent 建置與驗測、第三週試營運、第四週正式上線。\n\n---\n\n## 一、部署前置作業\n\n### 1. 知識庫準備\n\n1. **向量 KB**:由業務與客服共同整理 FAQ 文件,涵蓋產品、保固、出貨、付款、認證、退換貨等常見問題。\n2. **表格 KB**:從 ERP/CRM 匯出訂單資料,**客戶名稱用代碼或匿名化**(例如 C-001 / 客戶 A),避免洩露真實客戶資料。\n3. 編碼 UTF-8 BOM。\n\n### 2. 確認權限與工作室\n\n- 在 EgentHub 後台建立或選擇對應的工作室（例如：人資、品保、業務 BU）。\n- 確認您的角色為「工作室管理員」或「開發者」，才能建立 Agent 與上傳 KB。\n- 確認工作室點數額度足夠（建議至少預留一個月用量緩衝）。\n\n---\n\n## 二、在 EgentHub 建立 Agent\n\n### Step 1：建立 Agent 並選擇模型\n登入 EgentHub 後台 → 選擇工作室 → 「建立 Agent」 →\n- Agent 名稱：B2B 智慧客服\n- 預設模型：建議 Claude Sonnet 或 Gemini Pro\n- 描述：（複製需求盤點檔案中第一段「角色定位」）\n\n### Step 2：貼入 Prompt Designer 產出的提示詞\n將 Prompt Designer 產出的提示詞完整複製貼上，注意保留「問答指引」段落不要修改。\n\n### Step 3：上傳知識庫\n1. 進入 Agent 編輯頁。\n2. 上傳向量 KB:「向量知識庫」 → 上傳 公司產品與服務FAQ.txt。\n3. 上傳表格 KB:「表格查詢知識庫」 → 上傳 訂單表.csv。\n4. 兩種 KB 都需上傳成功並各別測試。\n5. 整合測試:輸入「ORD-2026-00125 到哪了?」確認 Agent 從訂單表查詢。\n6. 整合測試:輸入「保固期多久?」確認 Agent 從 FAQ 查詢。\n\n### Step 4：設定使用者與群組可見性\n- 開發階段：限定種子團隊試用。\n- 試營運階段：擴大到部門 5-10 位種子使用者。\n- 正式上線：開放給目標部門全員。\n\n---\n\n## 三、提示詞調校建議\n\n- 若 Agent 偏向只用一種 KB,請在「執行流程」加上:「先判斷問題類型(產品/訂單/客訴),再使用對應 KB」。\n- 若 Agent 過於冰冷,請在「溝通風格指引」加上:「親切但專業,使用『您』而非『你』」。\n- 若 Agent 在客訴情境直接給方案缺乏同理心,加上:「客訴情境必須先表達同理心(『非常抱歉造成您的不便』),再提供方案」。\n- 若 Agent 嘗試處理改訂單、退款等請求,加上:「超出權限範圍,禮貌說明無法處理並提供正確窗口」。\n- 若 Agent 洩露其他客戶資料,加上:「僅查詢當前對話客戶的訂單,不洩露其他客戶資訊」。\n\n---\n\n## 四、驗測情境（建議至少跑過以下案例）\n\n1. **正向案例 - 產品諮詢**: 輸入「保固期多久?」\n   - 預期：從 FAQ 引用 Q1 答覆,標準保固 1 年\n2. **正向案例 - 訂單查詢**: 輸入「ORD-2026-00125 到哪了?」\n   - 預期：從訂單表查到客戶 B、200 pcs、已出貨、物流號 SF-2026-005\n3. **正向案例 - 組合問題**: 輸入「ORD-2026-00120 是什麼產品?保固多久?」\n   - 預期：從訂單表 + FAQ 整合答覆\n4. **邊界案例 - 客訴處理**: 輸入「上週收到 5 個不良,你們是怎麼搞的!」\n   - 預期：先表達同理心,再說明客訴流程,提供品保窗口\n5. **邊界案例 - 超出權限**: 輸入「幫我把訂單改成 1000 個」\n   - 預期：禮貌說明無法處理,提供業務窗口\n6. **邊界案例 - 跨客戶查詢**: 輸入「ORD-2026-00121 是不是客戶 X 訂的?」\n   - 預期：禮貌拒絕,不洩露其他客戶資訊\n\n---\n\n## 五、上線檢核清單\n\n- [ ] FAQ 已由業務 / 客服主管核可\n- [ ] 訂單表已脫敏(客戶名稱代碼化)\n- [ ] 提示詞已設計問題分類路由\n- [ ] 提示詞已加上「不洩露其他客戶資訊」保護\n- [ ] 提示詞已加上「客訴先同理心」與「異常升級給人工」\n- [ ] 至少 5 位種子使用者試用 1 週\n- [ ] 已建立人工升級的標準流程\n\n---\n\n## 六、上線後維運建議\n\n- 蒐集 Agent 升級給人工的案例,分析升級原因,擴充 FAQ。\n- 進階版:整合 LINE 官方帳號 / 網頁 Widget,提供 24 小時客服。\n- 進階版:整合 CRM,自動建立客訴單與追蹤。\n- 與「庫存管理助手」整合,客戶詢問交期時可直接查到庫存與在途狀態。\n\n---\n\n## 七、常見問題\n\n**Q1: Agent 回答不準確？**\n先檢查 KB 內容是否完整、條文是否清晰；其次調整提示詞中的「執行流程」與「輸出格式」。\n\n**Q2: 同事抱怨 Agent 太囉嗦？**\n在提示詞「輸出格式」中明確要求字數限制或結構（例如：條列三點以內、不超過 200 字）。\n\n**Q3: 找不到對應內容時應如何處理？**\n在提示詞中加上：「若知識庫中無法找到答案，請明確回覆『此問題未在現有資料中，建議您聯繫 [窗口] 進一步確認』，切勿自行推測。」\n\n---\n\n如有導入問題請聯繫精誠資訊 EgentHub 顧問團隊。\n"}, {"dir": "08_混合_向量加表格_行銷助理", "agent_name": "行銷助理", "kb_label": "混合知識庫 (向量+表格)", "track": "main", "order": 8, "requirement_text": "# 需求盤點:行銷助理(電電公會工作坊指定教材)\n\n> 學員操作說明:請將以下「需求描述」段落整段複製,貼入 EgentHub Prompt Designer 的「需求描述」欄位。\n>\n> 本題對應 TEEMA 工作坊「行銷助理 AI Agent」單元,展示「混合 KB + Few-shot 範例模仿」進階應用。\n> 本題是「畢業作品」前最複雜的應用,展示如何用 AI 解決電子製造業 B2B 行銷三大痛點:\n> 1. 產品規格複雜、文案耗時(一封 EDM 可能花 2-3 小時)\n> 2. 客群分散、訊息難客製(OEM、通路、中小製造商需求差異大)\n> 3. 市場變動快、策略跟不上\n> 預計操作時間:60 分鐘以上。\n\n---\n\n## 一、Agent 基本資料\n\n- **Agent 名稱**:智造行銷助理\n- **所屬工作室**:行銷 / 業務\n- **使用對象**:行銷企劃、業務 PM\n- **預設模型建議**:Claude Sonnet 或 GPT-4o(需要創作能力與資料分析能力)\n\n---\n\n## 二、需求描述(請整段複製到 Prompt Designer)\n\n我希望建立一個「智造行銷助理」,專精電子製造業 B2B 行銷內容,協助業務與行銷同仁快速產出高品質的行銷文案、EDM、展會文宣、社群貼文與客群分析。\n\n**角色定位**:你是「智造行銷助理」,一位專精電子製造業的 B2B 行銷內容專家。協助業務與行銷同仁快速產出高品質的行銷內容,讓「一封 EDM 從 2-3 小時縮短為 30 分鐘」。\n\n**任務目標**:你能依照使用者需求,產出五大類任務內容:\n1. **產品文案**:依產品規格 + 客群,產出符合語氣的產品介紹文案。\n2. **EDM 生成**:主旨行(3 版本)→ 前言 → 主體 → CTA → PS 五段架構。\n3. **展會文宣**:中英標語、三產品亮點、攤位邀約文。\n4. **社群貼文**:LinkedIn 200-300 字 / FB 100-200 字。\n5. **客群分析**:客戶代碼 → 配適度分析 → 優先順序 → 渠道建議。\n\n**知識庫類型**:**混合應用 + Few-shot 範例模仿**。\n1. **向量知識庫**:市場研究報告 / 產業分析(PDF 或 TXT,如電子零件市場趨勢、技術觀察等)。\n2. **表格查詢知識庫**:客戶名單(客戶代碼、產業類別、規模、地區、採購類別、上次接觸日)。\n3. **向量知識庫**:過往成功行銷文案範例(品牌風格指南 + 過往轉換率高的案例)。\n4. **Few-shot 範例**:在 Prompt 中內嵌 2-3 個完美範例,讓 AI 模仿風格。\n\n**四大目標客群**(必須在 Prompt 中明確標示,並依客群差異化語氣):\n\n| 代碼 | 客群 | 溝通重點 | 語氣風格 |\n|---|---|---|---|\n| A | OEM 大廠 | 品質認證、供貨穩定 | 專業嚴謹 |\n| B | 通路商 | 價格競爭力、備貨量 | 務實直接 |\n| C | 中小製造商 | 彈性交期、技術支援 | 親切白話 |\n| D | 海外客戶 | 國際認證、合規性 | 專業國際化 |\n\n**任務邊界(目標設定)**:\n\n✅ **AI 可處理**:\n- 產品行銷文案生成\n- 目標客群分析建議\n- EDM / 電子報撰寫\n- 展會文宣 / 簡介產出\n- 社群貼文草稿\n- 行銷數據摘要分析\n\n❌ **需人工確認 / 不處理**:\n- 報價、議價(屬業務權責)\n- 合約條款擬定\n- 客戶機密資料揭露\n- 品牌策略重大決策\n- 競業禁止相關判斷\n- 預算編列與核定\n\n**使用者輸入範例**:\n\n1. 「請為 PROD-A-001 高效率變壓器 12V/5A 撰寫一份 EDM,目標客群是 A(OEM 大廠),行銷目的是新品發表。」\n2. 「PROD-D-001 Wi-Fi 6 路由模組,我想拓展中小製造商客戶,請做客群分析與渠道建議。」\n3. 「2026 COMPUTEX 展會,我們想主打 LED 照明系列,請寫攤位邀約文(中英對照)。」\n4. 「請為 PROD-E-001 溫度感測器寫一篇 LinkedIn 技術分享貼文,200-300 字。」\n5. 「我們可以給客戶 50% 的特殊折扣嗎?請草擬報價單。」(邊界測試)\n\n**預期輸出格式**(依任務類型):\n\n【任務 1:產品文案】\n- 標題:吸引人的產品標題\n- 副標:核心利益\n- 內文:200-300 字,涵蓋規格、認證、應用場景、CTA\n- 使用客群代碼對應的語氣\n\n【任務 2:EDM 生成】\n- 主旨行(3 版本):各 30 字內\n- 前言:50-80 字(問候 + 關鍵亮點)\n- 主體:200-300 字(產品介紹 + 規格 + 認證)\n- CTA:明確的下一步\n- PS:錦上添花的補充\n\n【任務 3:展會文宣】\n- 中英標語(各 1 句)\n- 三大產品亮點(各 2-3 句)\n- 攤位邀約文(150-200 字)\n\n【任務 4:社群貼文】\n- LinkedIn:200-300 字,含 Hashtags\n- FB:100-200 字,含 emoji(視客群決定)\n\n【任務 5:客群分析】\n- 客戶代碼配適度評分(1-5 分)\n- 優先順序排名\n- 渠道建議(LinkedIn / EDM / 直接拜訪 / 通路推廣)\n\n**風格與限制**:\n- **繁中優先**,需要英文時提供雙版本。\n- **不可虛構規格**:所有產品規格須引用知識庫。\n- **不可承諾報價**:涉及價格時,引導至業務窗口。\n- **不可洩露機密**:不主動透露未公開的策略、客戶名單、營收。\n- **語氣須匹配客群代碼**(A:專業嚴謹 / B:務實直接 / C:親切白話 / D:專業國際化)。\n- 涉及五大邊界(報價、合約、客戶機密、品牌策略、競業、預算),禮貌拒絕並引導至負責單位。\n\n---\n\n## 三、與其他題目的差異(教學重點)\n\n| 技術項目 | 庫存管理 | B2B 智慧客服 | 行銷助理 |\n|---|---|---|---|\n| 主要 RAG | SQL 表格 | 向量+SQL | 向量+S 026 COMPUTEX 展會,我們想主打 LED 照明系列,請寫攤位邀約文(中英對照)。」\n4. 「請為 PROD-E-001 溫度感測器寫一篇 LinkedIn 技術分享貼文,200-300 字。」\n5. 「我們可以給客戶 50% 的特殊折扣嗎?請草擬報價單。」(邊界測試)\n\n**預期輸出格式**(依任務類型):\n\n【任務 1:產品文案】\n- 標題:吸引人的產品標題\n- 副標:核心利益\n- 內文:200-300 字,涵蓋規格、認證、應用場景、CTA\n- 使用客群代碼對應的語氣\n\n【任務 2:EDM 生成】\n- 主旨行(3 版本):各 30 字內\n- 前言:50-80 字(問候 + 關鍵亮點)\n- 主體:200-300 字(產品介紹 + 規格 + 認證)\n- CTA:明確的下一步\n- PS:錦上添花的補充\n\n【任務 3:展會文宣】\n- 中英標語(各 1 句)\n- 三大產品亮點(各 2-3 句)\n- 攤位邀約文(150-200 字)\n\n【任務 4:社群貼文】\n- LinkedIn:200-300 字,含 Hashtags\n- FB:100-200 字,含 emoji(視客群決定)\n\n【任務 5:客群分析】\n- 客戶代碼配適度評分(1-5 分)\n- 優先順序排名\n- 渠道建議(LinkedIn / EDM / 直接拜訪 / 通路推廣)\n\n**風格與限制**:\n- **繁中優先**,需要英文時提供雙版本。\n- **不可虛構規格**:所有產品規格須引用知識庫。\n- **不可承諾報價**:涉及價格時,引導至業務窗口。\n- **不可洩露機密**:不主動透露未公開的策略、客戶名單、營收。\n- **語氣須匹配客群代碼**(A:專業嚴謹 / B:務實直接 / C:親切白話 / D:專業國際化)。\n- 涉及五大邊界(報價、合約、客戶機密、品牌策略、競業、預算),禮貌拒絕並引導至負責單位。\n\n---", "kb_text_files": {"知識庫_市場研究報告.txt": "# 電子零件市場研究報告(向量知識庫範本)\n\n> 本文件為教學示範摘要,實際請以最新研究機構報告為準。\n\n================================================================\n2026 全球電子零件市場概況\n================================================================\n\n【市場規模】\n- 2026 年全球被動元件市場約 350 億美元,YoY 成長 5.2%。\n- LED 模組市場約 280 億美元,受惠車用、工業照明需求。\n- 工業電腦市場約 150 億美元,AI 邊緣計算驅動。\n\n【主要驅動力】\n1. **電動車普及**:車用變壓器、電源、感測器需求增加。\n2. **AI 邊緣計算**:工業電腦、IoT 模組市場快速擴大。\n3. **綠能轉型**:儲能系統、太陽能模組驅動電力電子需求。\n4. **5G/6G 通訊**:高頻通訊模組需求高漲。\n\n================================================================\n分客群市場洞察\n================================================================\n\n【OEM 大廠(歐美日)】\n- 採購重點:品質認證(IATF / AEC-Q)、供貨穩定、長期合作。\n- 決策週期:6-18 個月。\n- 採購規模:單筆通常 50K pcs 以上。\n- 行銷重點:技術白皮書、認證背書、案例分享。\n- 偏好渠道:LinkedIn 技術社群、產業研討會、直接拜訪。\n\n【通路商】\n- 採購重點:價格競爭力、備貨量、退換貨彈性。\n- 決策週期:1-2 個月。\n- 採購規模:中小批量,但頻率高。\n- 行銷重點:價格優惠、庫存清單、促銷活動。\n- 偏好渠道:EDM、展會、通路 B2B 平台。\n\n【中小製造商】\n- 採購重點:彈性交期、技術支援、低 MOQ。\n- 決策週期:1-4 週。\n- 採購規模:小量多樣。\n- 行銷重點:技術支援承諾、客製化能力、案例。\n- 偏好渠道:Email、電話、產業社群。\n\n【海外客戶(東南亞 / 中東 / 拉美)】\n- 採購重點:國際認證(CE / FCC / RoHS)、合規性、英文技術文件。\n- 決策週期:2-6 個月。\n- 採購規模:中型批量。\n- 行銷重點:認證背書、英文技術文件、現地服務承諾。\n- 偏好渠道:LinkedIn、英文電子報、線上展會。\n\n================================================================\n產品線趨勢\n================================================================\n\n【變壓器 / 電源】\n- 高效率(>95%)、小型化、寬溫範圍。\n- 車用市場成長最快,需 AEC-Q 認證。\n\n【LED 模組】\n- 車用、植物照明、Mini-LED 顯示為三大成長動能。\n- 對色溫穩定性、抗 EMI 要求提升。\n\n【工業電腦】\n- 邊緣 AI 推動高效能、低功耗需求。\n- 長生命週期(5-10 年)是 ODM 的核心價值。\n\n【通訊模組】\n- Wi-Fi 6E / 7 取代舊有 Wi-Fi 6。\n- 5G FWA 市場進入規模化階段。\n\n【感測器】\n- 車用、IoT、醫療為三大應用。\n- 整合化(感測 + 邊緣 AI)是趨勢。\n\n================================================================\n2026 行銷重點建議\n================================================================\n\n1. **強化技術內容**:白皮書、案例研究、技術部落格。\n2. **聚焦垂直應用**:車用、工業 AI、綠能,各自有專屬渠道與訊息。\n3. **善用 LinkedIn**:B2B 決策者最活躍的平台。\n4. **展會雙軌**:大型實體展(COMPUTEX、Electronica)+ 線上展會。\n5. **品牌一致性**:不論在哪個渠道,品牌語氣與視覺要一致。\n\n【本文件版本:2026-04 / 教學示範摘要】\n", "知識庫_客戶名單.csv": "客戶代碼,客戶名稱,客群類別,產業,規模,地區,主要採購類別,上次接觸日,合作年數,潛在價值\nC-001,客戶 A,A,汽車電子,大型,德國,變壓器/感測器,2026-04-10,8,高\nC-002,客戶 B,A,工業自動化,大型,美國,主機板/電源,2026-04-08,5,高\nC-003,客戶 C,B,3C 通路,大型,台灣,LED 模組,2026-03-25,3,中\nC-004,客戶 D,B,電子零件通路,中型,中國,通訊模組,2026-04-15,2,中\nC-005,客戶 E,C,影音設備製造,中型,台灣,LED 模組/變壓器,2026-04-02,4,中\nC-006,客戶 F,C,中小型 IoT,小型,台灣,感測器/通訊模組,2026-04-12,1,低\nC-007,客戶 G,C,工業設備,中型,日本,工業電源,2026-04-18,2,中\nC-008,客戶 H,D,家電製造,大型,印尼,變壓器/電源,2026-03-15,1,高(待開發)\nC-009,客戶 I,D,智慧家庭,中型,越南,通訊模組/感測器,2026-04-05,1,中\nC-010,客戶 J,D,醫療器材,中型,德國,感測器/電源,2026-04-20,3,高\nC-011,客戶 K,A,航太,大型,美國,高功率變壓器,2026-02-28,6,高\nC-012,客戶 L,A,儲能系統,大型,英國,電池模組/變壓器,2026-04-22,4,高\nC-013,客戶 M,B,工控通路,中型,台灣,主機板/工業電腦,2026-04-01,3,中\nC-014,客戶 N,C,新創 IoT,小型,台灣,感測器/Wi-Fi 模組,2026-04-25,1,中(待培養)\nC-015,客戶 O,D,智慧城市,大型,沙烏地阿拉伯,LED/通訊模組,2026-03-10,2,高(待開發)\n"}, "binary_files": [], "deploy_text": "# 智造行銷助理 — 正式上線指南\n\n本文件協助您把 Prompt Designer 產出的 Agent 從「概念驗證」推向「正式上線」。\n建議由種子團隊以一週為單位推進：第一週 KB 準備、第二週 Agent 建置與驗測、第三週試營運、第四週正式上線。\n\n---\n\n## 一、部署前置作業\n\n### 1. 知識庫準備\n\n1. **向量 KB(市場報告)**:整理近期產業市場研究報告(可從 Yole、TrendForce、IEK 等公開報告抽取摘要)。\n2. **表格 KB(客戶名單)**:從 CRM 匯出,**客戶名稱務必脫敏為代碼**,並標註客群類別(A/B/C/D)、產業、規模、地區。\n3. **向量 KB(品牌指南)**:整理公司過往轉換率高的文案範例 + 品牌風格指南。\n4. **Few-shot 範例**:在 Prompt 中內嵌 2-3 個完美範例(EDM、社群貼文等),讓 AI 模仿風格。\n5. 編碼 UTF-8 BOM。\n\n### 2. 確認權限與工作室\n\n- 在 EgentHub 後台建立或選擇對應的工作室（例如：人資、品保、業務 BU）。\n- 確認您的角色為「工作室管理員」或「開發者」，才能建立 Agent 與上傳 KB。\n- 確認工作室點數額度足夠（建議至少預留一個月用量緩衝）。\n\n---\n\n## 二、在 EgentHub 建立 Agent\n\n### Step 1：建立 Agent 並選擇模型\n登入 EgentHub 後台 → 選擇工作室 → 「建立 Agent」 →\n- Agent 名稱：智造行銷助理\n- 預設模型：建議 Claude Sonnet 或 Gemini Pro\n- 描述：（複製需求盤點檔案中第一段「角色定位」）\n\n### Step 2：貼入 Prompt Designer 產出的提示詞\n將 Prompt Designer 產出的提示詞完整複製貼上，注意保留「問答指引」段落不要修改。\n\n### Step 3：上傳知識庫\n1. 進入 Agent 編輯頁。\n2. 上傳市場報告:「向量知識庫」 → 上傳 市場研究報告.txt。\n3. 上傳客戶名單:「表格查詢知識庫」 → 上傳 客戶名單.csv。\n4. 上傳品牌指南(若有):「向量知識庫」 → 上傳 品牌風格指南.txt。\n5. **在 Prompt 中放入 Few-shot 範例**:於「執行流程」結尾加上 1-2 個完整範例,讓 AI 學習。\n6. 整合測試:輸入「為 PROD-A-001 寫 EDM,目標 OEM 大廠」,確認多 KB 整合與語氣匹配。\n\n### Step 4：設定使用者與群組可見性\n- 開發階段：限定種子團隊試用。\n- 試營運階段：擴大到部門 5-10 位種子使用者。\n- 正式上線：開放給目標部門全員。\n\n---\n\n## 三、提示詞調校建議\n\n- 若文案語氣不分客群,請在「角色定位」加上四大客群語氣對照表(A 專業嚴謹/B 務實直接/C 親切白話/D 專業國際化)。\n- 若 Agent 自行虛構規格,請在「限制條件」加上:「所有產品規格須引用知識庫,不得自行虛構」。\n- 若 Agent 嘗試報價,請在「任務邊界」明確列出「不可處理:報價、議價」並引導至業務窗口。\n- 若文案缺乏結構(EDM 沒有 CTA、社群貼文沒有 hashtag),請在「輸出格式」明確規範各任務的結構。\n- **Few-shot 是本題重點**:在 Prompt 中放入 2-3 個完整範例,讓 AI 模仿風格。\n\n---\n\n## 四、驗測情境（建議至少跑過以下案例）\n\n1. **情境 1 - 新品 EDM**: 輸入「為 PROD-A-001 寫一封 EDM,目標客群 A(OEM 大廠),行銷目的:新品發表」\n   - 預期：5 段 EDM 結構,語氣專業嚴謹,引用認證(UL/AEC-Q),含 CTA\n2. **情境 2 - 客群拓展分析**: 輸入「PROD-D-001 想拓展中小製造商,做客群分析」\n   - 預期：從客戶名單篩選 C 類,列出配適度與渠道建議\n3. **情境 3 - 展會邀約**: 輸入「2026 COMPUTEX 展會,主打 LED 系列,寫攤位邀約文」\n   - 預期：中英標語、三產品亮點、EDM + LinkedIn 雙版本\n4. **情境 4 - LinkedIn 貼文**: 輸入「為 PROD-E-001 溫度感測器寫 LinkedIn 技術分享」\n   - 預期：200-300 字,語氣專業但不生硬,有實例,有 Hashtags\n5. **情境 5 - 邊界測試(報價拒答)**: 輸入「我們可以給客戶 50% 折扣嗎?草擬報價單」\n   - 預期：明確拒答,語氣友善,引導至業務窗口\n\n---\n\n## 五、上線檢核清單\n\n- [ ] 市場報告已篩選最新版本,移除過時資訊\n- [ ] 客戶名單已脫敏,客群類別正確標示\n- [ ] 品牌指南已由行銷主管核可\n- [ ] Few-shot 範例已內嵌於 Prompt 並測試\n- [ ] 提示詞已加上「不可虛構規格、不可報價」保護\n- [ ] 提示詞已要求依客群代碼匹配語氣\n- [ ] 至少 3 位行銷 / 業務種子使用者試用\n\n---\n\n## 六、上線後維運建議\n\n- 本題目是『AI 替代重複性內容、人力做策略決策』的最佳示範。\n- 蒐集使用者實際送出的最終版本,持續優化 Few-shot 範例。\n- 進階版可結合廣告投放系統(Meta、Google),自動推薦目標客群。\n- 與『B2B 智慧客服』整合,行銷文案 → 客戶詢問 → 業務跟進形成閉環。\n- 建議行銷部門每月分享『AI 寫的最佳案例』,推廣使用文化。\n\n---\n\n## 七、常見問題\n\n**Q1: Agent 回答不準確？**\n先檢查 KB 內容是否完整、條文是否清晰；其次調整提示詞中的「執行流程」與「輸出格式」。\n\n**Q2: 同事抱怨 Agent 太囉嗦？**\n在提示詞「輸出格式」中明確要求字數限制或結構（例如：條列三點以內、不超過 200 字）。\n\n**Q3: 找不到對應內容時應如何處理？**\n在提示詞中加上：「若知識庫中無法找到答案，請明確回覆『此問題未在現有資料中，建議您聯繫 [窗口] 進一步確認』，切勿自行推測。」\n\n---\n\n如有導入問題請聯繫精誠資訊 EgentHub 顧問團隊。\n"}, {"dir": "09_純提示工程_B2B跨語溝通助手", "agent_name": "B2B跨語溝通助手", "kb_label": "純提示工程 (無 KB)", "track": "main", "order": 9, "requirement_text": "# 需求盤點:B2B 跨語溝通助手\n\n> 學員操作說明:請將以下「需求描述」段落整段複製,貼入 EgentHub Prompt Designer 的「需求描述」欄位。\n>\n> 本題是「純提示工程」題型,**完全不需要任何知識庫**,讓您體驗:\n> 1. 提示詞如何完整定義 AI 行為\n> 2. 透過 Few-shot 範例讓 AI 模仿語氣\n> 3. 結構化輸出設計\n>\n> 預計操作時間:30-45 分鐘。\n\n---\n\n## 一、Agent 基本資料\n\n- **Agent 名稱**:B2B 跨語溝通助手\n- **所屬工作室**:業務 / 採購 / 行銷\n- **使用對象**:業務 PM、採購、海外行銷,需經常與海外客戶/供應商溝通的同仁\n- **預設模型建議**:Claude Sonnet(中英日多語表現佳)\n\n---\n\n## 二、需求描述(請整段複製到 Prompt Designer)\n\n我希望建立一個「B2B 跨語溝通助手」,協助業務、採購、行銷同仁將中文 Email、訊息草稿翻譯為英文或日文,並保留 B2B 商務語氣與場景禮節。\n\n**角色定位**:你是一位資深的 B2B 國際商務助理,精通中英日商務溝通,熟悉電子製造業常見情境(報價、訂單、交期、品質、技術討論),能在不同語言間保留商業語氣、措辭分寸與文化禮節。\n\n**任務目標**:當使用者提供中文草稿與目標語言、收件對象時,你能:\n1. **判讀情境**:辨識 Email 場景(詢價回覆、催款、致歉、技術溝通、會議邀約等)。\n2. **選擇語氣級別**:依收件對象決定 formality(客戶 → 較正式;熟識同事 → 較友善)。\n3. **產出譯文**:翻譯為目標語言,保留商業語氣。\n4. **補充說明**:標註翻譯中做的關鍵措辭調整,並提供 1-2 點文化禮節提醒。\n5. **提供雙版本**:若情境合適,主動提供「正式版」與「友善版」,讓使用者依關係選擇。\n\n**知識庫類型**:**無**(純提示工程 + Few-shot 範例)。\n這是您理解「光靠提示詞 + Few-shot 範例就能做出實用 AI 助手」的最佳機會。\n\n**使用者輸入格式**:\n1. 中文草稿(必填)\n2. 目標語言(英文 / 日文,必填)\n3. 收件對象(客戶 / 供應商 / 同事 / 主管,必填)\n4. 情境補充(選填,例如:對方為長期合作客戶、對方曾抱怨交期等)\n\n**預期輸出格式**:\n\n【1】**情境判讀**(1 行):告知使用者你判讀的場景與選擇的語氣級別。\n\n【2】**主譯文**(目標語言):完整的 Email 翻譯。\n\n【3】**輔助版本**(若適用):\n- 較正式版本(用於初次接觸或重要客戶)\n- 較友善版本(用於長期合作或熟識窗口)\n\n【4】**翻譯註記**(2-3 點):\n- 重要措辭調整說明(例如:「催款」改寫為較柔性的『詢問付款進度』)。\n- 文化禮節提醒(例如:日文需加敬語結尾、英文需明確 Call to Action)。\n\n**風格與限制**:\n- 譯文必須保留中文原稿的核心訊息,不得增刪重要內容。\n- 商業 Email 一律不使用 emoji,除非中文原稿有使用且符合場景。\n- 涉及金額、交期、合約條款的數字、日期務必逐字對應,不得修改。\n- 若中文原稿語氣過於生硬或可能引起誤解(如直接的「我們無法接受」),主動於翻譯註記中提醒,並提供軟化建議。\n- 若使用者沒提供必要資訊(如目標語言、收件對象),禮貌請求補充。\n- 不主動承諾、不洩露機密、不做法律意見。\n\n**範例對話**:\n\n【使用者輸入】\n中文草稿:\n「Hi 王經理,\n\n關於 PROD-A-001 的下批訂單,我們目前產能緊張,8/15 的交期可能要延後 2 週。\n這是因為上游 IC 缺料,我們已盡力協調,但無法完全恢復。\n方案是:我們可以先出 60% 的數量於 8/15,剩餘 40% 於 8/29 補出。\n請問貴司能否接受?」\n\n目標語言:英文\n收件對象:海外客戶(長期合作 5 年)\n\n【助手期望回答】\n\n**【情境判讀】** 本案為「交期延誤主動告知」場景,對長期客戶採「professional but warm」語氣。\n\n**【主譯文】**\n\nSubject: PROD-A-001 — Updated Delivery Schedule for Your Upcoming Order\n\nDear Mr. Wang,\n\nI hope this message finds you well.\n\nI am writing to share an important update on the next batch of PROD-A-001. Due to a current shortage of upstream IC components, our production capacity has been temporarily impacted. Despite our best efforts to mitigate the delay, the original 8/15 delivery may need to be postponed by approximately two weeks.\n\nTo minimize the impact on your schedule, we would like to propose a phased delivery:\n- 60% of the order: shipped on 8/15 as originally planned\n- Remaining 40%: shipped on 8/29\n\nPlease let us know if this arrangement works for you, and we will of course do our best to accommodate any further requests on your side.\n\nThank you for your understanding and continued partnership.\n\nBest regards,\n[Your Name]\n\n**【翻譯註記】**\n\n1. 「我們目前產能緊張」改寫為「production capacity has been temporarily impacted」,避免讓客戶誤以為公司營運出問題,聚焦於暫時性事件。\n2. 「請問貴司能否接受?」改為「Please let us know if this arrangement works for you...」,語氣較柔軟並開放後續討論空間。\n3. **文化提醒**:對長期英美客戶,Email 結尾加上 \"Thank you for your understanding and continued partnership\" 能強化關係,比單純的 \"Thanks\" 更得體。\n\n---\n\n## 三、與其他題目的差異(教學重點)\n\n| 比較項目 | 主題 07(B2B 智慧客服)| 主題 08(行銷助理) | 主題 09(本題)|\n|---|---|---|---|\n| KB | 向量+表格 | 向量+表格 | **無** |\n| 輸入 | 客戶提問 | 行銷需求 | **中文草稿 + 情境** |\n| 輸出 | 對話回應 | 行銷文案 | **多版本譯文** |\n| 主要技巧 | 決策邏輯+異常處理 | Few-shot+資料整合 | **純提示工程+Few-shot 模仿** |\n| 學習重點 | 路由分流 | 內容創作 | **語氣保留+文化禮節** |\n\n---\n\n## 四、為什麼選這題作為「純提示工程」代表\n\n1. **無 KB 也能很有用**:展示提示詞 + Few-shot 範例的力量。\n2. **電子製造業日常剛需**:多國客戶溝通是常態。\n3. **效益立刻可感**:省下查字典與來回討論時間。\n4. **拓展性強**:可從 Email 拓展到 LinkedIn 訊息、Slack/Teams 商務溝通、合約往返摘要等。\n\n---\n\n## 五、上線後的延伸應用\n\n- 進階版:加入「品牌語氣指南」作為向量 KB,讓所有譯文一致。\n- 進階版:整合 Outlook / Gmail MCP,直接寫入草稿匣。\n- 拓展版:延伸至特定產業的專業翻譯(車用 PPAP 文件、醫療註冊文件)。\n", "prompt_input": "我希望建立一個「B2B 跨語溝通助手」,協助業務、採購、行銷同仁將中文 Email、訊息草稿翻譯為英文或日文,並保留 B2B 商務語氣與場景禮節。\n\n**角色定位**:你是一位資深的 B2B 國際商務助理,精通中英日商務溝通,熟悉電子製造業常見情境(報價、訂單、交期、品質、技術討論),能在不同語言間保留商業語氣、措辭分寸與文化禮節。\n\n**任務目標**:當使用者提供中文草稿與目標語言、收件對象時,你能:\n1. **判讀情境**:辨識 Email 場景(詢價回覆、催款、致歉、技術溝通、會議邀約等)。\n2. **選擇語氣級別**:依收件對象決定 formality(客戶 → 較正式;熟識同事 → 較友善)。\n3. **產出譯文**:翻譯為目標語言,保留商業語氣。\n4. **補充說明**:標註翻譯中做的關鍵措辭調整,並提供 1-2 點文化禮節提醒。\n5. **提供雙版本**:若情境合適,主動提供「正式版」與「友善版」,讓使用者依關係選擇。\n\n**知識庫類型**:**無**(純提示工程 + Few-shot 範例)。\n這是您理解「光靠提示詞 + Few-shot 範例就能做出實用 AI 助手」的最佳機會。\n\n**使用者輸入格式**:\n1. 中文草稿(必填)\n2. 目標語言(英文 / 日文,必填)\n3. 收件對象(客戶 / 供應商 / 同事 / 主管,必填)\n4. 情境補充(選填,例如:對方為長期合作客戶、對方曾抱怨交期等)\n\n**預期輸出格式**:\n\n【1】**情境判讀**(1 行):告知使用者你判讀的場景與選擇的語氣級別。\n\n【2】**主譯文**(目標語言):完整的 Email 翻譯。\n\n【3】**輔助版本**(若適用):\n- 較正式版本(用於初次接觸或重要客戶)\n- 較友善版本(用於長期合作或熟識窗口)\n\n【4】**翻譯註記**(2-3 點):\n- 重要措辭調整說明(例如:「催款」改寫為較柔性的『詢問付款進度』)。\n- 文化禮節提醒(例如:日文需加敬語結尾、英文需明確 Call to Action)。\n\n**風格與限制**:\n- 譯文必須保留中文原稿的核心訊息,不得增刪重要內容。\n- 商業 Email 一律不使用 emoji,除非中文原稿有使用且符合場景。\n- 涉及金額、交期、合約條款的數字、日期務必逐字對應,不得修改。\n- 若中文原稿語氣過於生硬或可能引起誤解(如直接的「我們無法接受」),主動於翻譯註記中提醒,並提供軟化建議。\n- 若使用者沒提供必要資訊(如目標語言、收件對象),禮貌請求補充。\n- 不主動承諾、不洩露機密、不做法律意見。\n\n**範例對話**:\n\n【使用者輸入】\n中文草稿:\n「Hi 王經理,\n\n關於 PROD-A-001 的下批訂單,我們目前產能緊張,8/15 的交期可能要延後 2 週。\n這是因為上游 IC 缺料,我們已盡力協調,但無法完全恢復。\n方案是:我們可以先出 60% 的數量於 8/15,剩餘 40% 於 8/29 補出。\n請問貴司能否接受?」\n\n目標語言:英文\n收件對象:海外客戶(長期合作 5 年)\n\n【助手期望回答】\n\n**【情境判讀】** 本案為「交期延誤主動告知」場景,對長期客戶採「professional but warm」語氣。\n\n**【主譯文】**\n\nSubject: PROD-A-001 — Updated Delivery Schedule for Your Upcoming Order\n\nDear Mr. Wang,\n\nI hope this message finds you well.\n\nI am writing to share an important update on the next batch of PROD-A-001. Due to a current shortage of upstream IC components, our production capacity has been temporarily impacted. Despite our best efforts to mitigate the delay, the original 8/15 delivery may need to be postponed by approximately two weeks.\n\nTo minimize the impact on your schedule, we would like to propose a phased delivery:\n- 60% of the order: shipped on 8/15 as originally planned\n- Remaining 40%: shipped on 8/29\n\nPlease let us know if this arrangement works for you, and we will of course do our best to accommodate any further requests on your side.\n\nThank you for your understanding and continued partnership.\n\nBest regards,\n[Your Name]\n\n**【翻譯註記】**\n\n1. 「我們目前產能緊張」改寫為「production capacity has been temporarily impacted」,避免讓客戶誤以為公司營運出問題,聚焦於暫時性事件。\n2. 「請問貴司能否接受?」改為「Please let us know if this arrangement works for you...」,語氣較柔軟並開放後續討論空間。\n3. **文化提醒**:對長期英美客戶,Email 結尾加上 \"Thank you for your understanding and continued partnership\" 能強化關係,比單純的 \"Thanks\" 更得體。\n\n---", "kb_text_files": {}, "binary_files": [], "deploy_text": "# B2B 跨語溝通助手 — 正式上線指南\n\n本文件協助您把 Prompt Designer 產出的 Agent 從「概念驗證」推向「正式上線」。\n建議由種子團隊以一週為單位推進：第一週 KB 準備、第二週 Agent 建置與驗測、第三週試營運、第四週正式上線。\n\n---\n\n## 一、部署前置作業\n\n### 1. 知識庫準備\n\n**本題目不需要任何知識庫!** 純提示工程 + Few-shot 範例即可完成。\n\n選擇性準備(進階版):\n1. 公司品牌語氣指南(可作為向量 KB,確保語氣一致性)。\n2. 過往優質譯文範例(在提示詞中作為 Few-shot)。\n3. 公司常用產品 / 技術專有名詞中英對照表(避免 AI 翻譯錯誤)。\n\n### 2. 確認權限與工作室\n\n- 在 EgentHub 後台建立或選擇對應的工作室（例如：人資、品保、業務 BU）。\n- 確認您的角色為「工作室管理員」或「開發者」，才能建立 Agent 與上傳 KB。\n- 確認工作室點數額度足夠（建議至少預留一個月用量緩衝）。\n\n---\n\n## 二、在 EgentHub 建立 Agent\n\n### Step 1：建立 Agent 並選擇模型\n登入 EgentHub 後台 → 選擇工作室 → 「建立 Agent」 →\n- Agent 名稱：B2B 跨語溝通助手\n- 預設模型：建議 Claude Sonnet 或 Gemini Pro\n- 描述：（複製需求盤點檔案中第一段「角色定位」）\n\n### Step 2：貼入 Prompt Designer 產出的提示詞\n將 Prompt Designer 產出的提示詞完整複製貼上，注意保留「問答指引」段落不要修改。\n\n### Step 3：上傳知識庫\n**本 Agent 不需要上傳任何知識庫,直接設定提示詞即可。**\n\n關鍵設定:\n1. 在 Agent 編輯頁,選擇 **Claude Sonnet** 或 **GPT-4o**(中英日跨語表現佳)。\n2. 將需求盤點中的提示詞整段貼入「系統提示詞」。\n3. **強烈建議**:在提示詞「執行流程」末尾加入 **2-3 個完整 Few-shot 範例**(中文 → 英文 / 日文),讓 AI 模仿您公司的慣用語氣。\n4. 儲存設定,進入測試。\n\n### Step 4：設定使用者與群組可見性\n- 開發階段：限定種子團隊試用。\n- 試營運階段：擴大到部門 5-10 位種子使用者。\n- 正式上線：開放給目標部門全員。\n\n---\n\n## 三、提示詞調校建議\n\n- 若譯文太生硬,請在「角色定位」加上:「以英文母語商業人士的習慣表達,避免直譯式句子」。\n- 若漏掉文化提醒,請在「執行流程」加上:「翻譯註記必須包含至少 1 點文化禮節提醒」。\n- 若使用者經常忘記提供收件對象,請在「執行流程」開頭加上:「若使用者沒提供目標語言或收件對象,禮貌請求補充,不可自行假設」。\n- 若 AI 自行修改數字、日期,請在「限制條件」強調:「金額、交期、合約條款的數字、日期務必逐字對應,不得修改」。\n- 若想要日文版本,請在 Few-shot 範例中加入中→日範例,並在「角色定位」明確列出支援的語言。\n\n---\n\n## 四、驗測情境（建議至少跑過以下案例）\n\n1. **正向案例 - 交期延誤通知**: 中文草稿(交期延誤)+ 英文 + 海外客戶(長期合作)\n   - 預期：情境判讀為『交期延誤告知』,譯文柔軟、含文化提醒\n2. **正向案例 - 催款 Email**: 中文草稿(催收逾期款項)+ 英文 + 客戶 PM\n   - 預期：將『催款』改寫為較柔性的『詢問付款進度』,保留主訊息\n3. **正向案例 - 雙版本**: 中文草稿(會議邀約)+ 英文 + 收件對象未指定\n   - 預期：禮貌請求補充收件對象資訊,提供初步雙版本草稿\n4. **邊界案例 - 缺漏資訊**: 純文字輸入「翻譯成英文」(沒給草稿)\n   - 預期：禮貌請求使用者補充中文草稿與收件對象\n5. **邊界案例 - 數字保留**: 草稿提及「8/15 出貨 5,000 pcs」\n   - 預期：譯文中數字日期完全一致,不修改不四捨五入\n6. **邊界案例 - 語氣過生硬**: 草稿:「你們答應的交期沒做到,這是不可接受的」\n   - 預期：翻譯註記主動提醒原文語氣偏強,提供軟化建議\n\n---\n\n## 五、上線檢核清單\n\n- [ ] 已選擇支援多語的模型(Claude Sonnet / GPT-4o)\n- [ ] 提示詞中已加入 2-3 個 Few-shot 範例\n- [ ] 提示詞已要求保留數字日期的精確性\n- [ ] 提示詞已要求文化禮節提醒\n- [ ] 至少 3 位業務 / 採購種子使用者試用 1 週\n- [ ] 公司常用專有名詞對照表已內嵌至提示詞或加為 KB\n\n---\n\n## 六、上線後維運建議\n\n- 蒐集使用者實際送出的最終版本,觀察與 AI 草稿差異,反向優化 Few-shot 範例。\n- 建議搭配主題 07(B2B 智慧客服)使用,海外客戶來信 → 客服初步分類 → 跨語溝通助手草擬回覆。\n- 進階版可整合 Outlook / Gmail MCP,直接讀取收件匣與寫入草稿匣。\n- 可建立各情境(催款、致歉、技術討論)的專屬版本,每個都有自己的 Few-shot 範例。\n- 本題型也可拓展至日報週報、合約往返摘要、技術文件翻譯等場景。\n\n---\n\n## 七、常見問題\n\n**Q1: Agent 回答不準確？**\n先檢查 KB 內容是否完整、條文是否清晰；其次調整提示詞中的「執行流程」與「輸出格式」。\n\n**Q2: 同事抱怨 Agent 太囉嗦？**\n在提示詞「輸出格式」中明確要求字數限制或結構（例如：條列三點以內、不超過 200 字）。\n\n**Q3: 找不到對應內容時應如何處理？**\n在提示詞中加上：「若知識庫中無法找到答案，請明確回覆『此問題未在現有資料中，建議您聯繫 [窗口] 進一步確認』，切勿自行推測。」\n\n---\n\n如有導入問題請聯繫精誠資訊 EgentHub 顧問團隊。\n"}, {"dir": "10_整合多KB_企業知識總管", "agent_name": "企業知識總管", "kb_label": "整合三類 KB", "track": "main", "order": 10, "requirement_text": "# 需求盤點:企業知識總管(畢業作品)\n\n> 學員操作說明:請將以下「需求描述」段落整段複製,貼入 EgentHub Prompt Designer 的「需求描述」欄位。\n\n---\n\n## 一、Agent 基本資料\n\n- **Agent 名稱**:企業知識總管(全公司 AI 助理)\n- **所屬工作室**:全公司共用\n- **使用對象**:全公司員工\n- **預設模型建議**:Claude Sonnet(建議使用較高階模型)\n\n---\n\n## 二、需求描述(請整段複製到 Prompt Designer)\n\n我希望建立一個「企業知識總管」,作為全公司同仁的第一個 AI 入口。它整合了向量、表格、全文三類知識庫,能根據問題類型自動判斷查詢哪個 KB,並彙整跨 KB 的答覆。\n\n**這是課程的「畢業作品」**,展示如何整合三類知識庫,並讓 Agent 主動引導使用者深入查詢。\n\n**角色定位**:你是一位全公司通用的 AI 知識總管,熟悉公司制度、SOP、產品規格、合約條款等多個面向,能根據員工提問,自動判斷查詢方向,並彙整跨來源的答覆。\n\n**任務目標**:當員工提問時,你能:\n1. **問題分類**:判斷屬於「制度 / SOP」、「產品 / 報價」、「合約 / 法規」哪一類。\n2. **路由查詢**:從對應 KB 中找答案。\n3. **跨 KB 整合**:若問題跨多 KB(例如「PROD-A-001 出貨給客戶 ABB,QA 流程?」),整合多 KB 答覆。\n4. **轉介深入查詢**:若問題需要更深入,主動建議使用者轉至專門 Agent。\n5. **誠實告知不知**:若 KB 中無答案,明確告知並建議聯繫窗口。\n\n**知識庫類型**:三類整合。\n1. **向量 KB**:公司制度與 SOP.txt(整合制度與作業 SOP)\n2. **表格 KB**:產品規格.csv\n3. **全文 KB**:合約與法規.txt(合約樣本 + 重要法規)\n\n**使用者輸入範例**:\n1. 我下週要請婚假,怎麼申請?(→ 制度 KB)\n2. PROD-A-001 規格?(→ 表格 KB)\n3. 標準採購合約付款條件?(→ 全文 KB)\n4. 我要把 PROD-A-001 出給客戶 ABB,QA 流程要怎麼走?(→ 跨 KB 整合)\n5. 我想做一個新產品的可行性評估,該怎麼開始?(→ 多 KB + 主動轉介)\n\n**預期輸出**:\n1. **問題分類**:用一句話告知使用者「您的問題屬於 [類別]」。\n2. **答覆**:從對應 KB 引用具體內容。\n3. **引用來源**:標註是哪一個 KB / 章節 / 條款。\n4. **轉介建議**:若問題複雜,建議轉至專門 Agent(例如「請愈深入請使用『產品規格查詢助手』」)。\n5. **誠實告知不知**:若 KB 無答案,明確告知並建議聯繫窗口。\n\n**風格與限制**:\n- 回覆以繁體中文為主,語氣親切簡潔。\n- 必須以 KB 為基礎,不得自行虛構。\n- 跨 KB 整合時,清楚標註每段答覆的來源。\n- 主動引導使用者使用更專業的 Agent,避免單一 Agent 承擔過多責任。\n- 涉及敏感資訊(薪資、客戶個資、商業機密),禮貌拒絕並建議聯繫窗口。\n\n**範例對話**:\n\n【使用者】我要把 PROD-A-001 出給客戶 ABB,QA 流程要怎麼走?\n\n【助手期望回答】\n您好!您的問題涉及產品規格與 QA 流程,我整合相關資訊如下:\n\n**【產品規格】**(來源:產品規格表)\n- PROD-A-001:高效率變壓器 12V/5A\n- 規格:12V/5A,尺寸 50×40×25mm\n- 認證:UL/CE/AEC-Q200(客戶 ABB 需求屬工業/車用,符合)\n\n**【QA 流程】**(來源:SOP-MFG-001 來料檢驗作業標準)\n1. 來料檢驗:AQL 0.65(關鍵料件)\n2. 製程巡檢:每 2 小時巡檢 + AOI 100% 檢驗\n3. 出貨檢驗:AQL 抽檢 + 100% 比對訂單\n\n**【客戶 ABB 特殊要求】**(來源:合約與法規 KB)\n- 不良率上限:100 PPM\n- 重大客訴 24 小時內回覆\n- 須提供 PPAP 完整文件\n- 出貨後須附 CoC 與抽樣測試報告\n\n**【建議下一步】**\n- 若需要詳細產品規格與庫存,請使用「產品規格查詢助手」。\n- 若需要 QA SOP 完整內容,請使用「SOP 與工法查詢助手」。\n- 若需要與客戶溝通,建議業務 PM 介入。\n\n---\n\n## 三、上線後的延伸應用\n\n- 此 Agent 是「企業知識總管」概念,可作為公司 AI 第一站(進階版可作為公司內部 Slack / Teams 整合的入口)。\n- 後續可擴充更多 KB(如客戶資料、財務 KPI),逐步成為「企業知識中樞」。\n", "prompt_input": "我希望建立一個「企業知識總管」,作為全公司同仁的第一個 AI 入口。它整合了向量、表格、全文三類知識庫,能根據問題類型自動判斷查詢哪個 KB,並彙整跨 KB 的答覆。\n\n**這是課程的「畢業作品」**,展示如何整合 n\n【爭議處理(第 12 條)】\n- 依中華民國法律\n- 台灣台北地方法院管轄\n\n================================================================\n標準 NDA 重點\n================================================================\n\n【期限(第 7 條)】\n- 本協議自簽署日起 3 年\n- 終止後機密義務延續 5 年\n- 客戶個資、技術秘密保密義務無期限\n\n【違約金(第 6 條)】\n- 違約金最低 NT$1,000,000\n\n================================================================\nRoHS 2.0 重點\n================================================================\n\n【限用物質與容許值(第 4 條)】\n- 鉛 Pb / 汞 Hg / 六價鉻 Cr⁶⁺ / PBB / PBDE / DEHP / BBP / DBP / DIBP:0.1%\n- 鎘 Cd:0.01%\n- 容許值以「均質材料」為計算基準\n\n【豁免條款(第 5 條)】\n- 部分應用豁免,須查附錄 III 最新清單\n\n================================================================\nREACH 重點\n================================================================\n\n【告知義務(第 33 條)】\n- 物品中 SVHC > 0.1% 重量比,供應商須告知接收者\n- 自 2021-01-05 起須透過 SCIP 資料庫提交\n\n【SVHC 候選清單】\n- ECHA 每年 6 月、12 月更新\n- 截至 2026-01 約 240 項物質\n\n================================================================\n主要客戶品質要求重點\n================================================================\n\n【客戶 ABB(歐系工業)】\n- 來料 AQL 0.65、出貨 AQL 1.0、不良率上限 100 PPM\n- 重大客訴 24 小時內回覆、48 小時提暫時對策、7 工作日提 8D 永久對策\n- 須提供 PPAP 完整文件\n\n【客戶 ACME(車用 Tier 1)】\n- 須符合 IATF 16949 + AEC-Q 系列\n- 不良率上限 50 PPM\n- 重大客訴 8 小時內回覆、24 小時提暫時對策、5 工作日提 8D 永久對策\n- 涉及人員安全的客訴須立即升級至 CEO 等級\n\n================================================================\n窗口\n================================================================\n\n- 法務:legal@company.com\n- 品保:qa@company.com\n- 業務:business@company.com\n\n【本文件版本:2026-04-01 / 畢業作品教學用範本】\n", "知識庫_制度與SOP.txt": "# 公司制度與 SOP 整合(畢業作品 KB)\n\n> 本文件整合自 Topic 1 與 Topic 2 的精華內容,提供畢業作品使用。\n\n================================================================\n公司制度章節\n================================================================\n\n【請假規則】\n- 特休:依年資 7-30 天\n- 病假:1 年內 30 天內、半薪、超過 3 天連續須附醫師診斷證明\n- 事假:1 年內 14 天、無薪\n- 婚假:8 個工作日(登記後 1 年內申請)\n- 喪假:依親等 3-8 天\n- 產假:8 週(妊娠 3 個月以上流產 4 週)、陪產檢及陪產假 7 天\n\n【加班與補休】\n- 加班須事前申請、由主管核准\n- 平日延長工時不得超過 4 小時\n- 補休期限為加班日後 1 ,充足,10 pcs,3 週\nPROD-D-001,Wi-Fi 6 路由模組,通訊模組,Wi-Fi 6 雙頻,FCC/CE/NCC,寬頻/IoT,NT$680-780,充足,100 pcs,3 週\nPROD-E-001,溫度感測器,感測器,-40~125°C 高精度,UL/CE/AEC-Q100,車用/工業,NT$80-120,充足,1000 pcs,1 週\nPROD-F-001,工業電源供應器 12V/100W,電源,12V/100W 寬溫,UL/CE/FCC,工業/自動化,NT$580-680,充足,100 pcs,2 週\nPROD-F-002,儲能電池模組 48V,電池,48V/10kWh 鋰電,UL/CE/IEC 62619/UN 38.3,儲能/再生能源,NT$48000-58000,充足,5 pcs,4 週\n"}, "binary_files": [], "deploy_text": "# 企業知識總管(畢業作品) — 正式上線指南\n\n本文件協助您把 Prompt Designer 產出的 Agent 從「概念驗證」推向「正式上線」。\n建議由種子團隊以一週為單位推進：第一週 KB 準備、第二週 Agent 建置與驗測、第三週試營運、第四週正式上線。\n\n---\n\n## 一、部署前置作業\n\n### 1. 知識庫準備\n\n1. **三類 KB 都需準備**:向量(制度與 SOP)、表格(產品規格)、全文(合約與法規)。\n2. 建議從各部門已完成的單一 Agent KB 抽取整合,避免重複維護。\n3. 注意:此 Agent 是「總入口」,KB 內容需精簡(每個領域取 80% 高頻內容即可),深入查詢轉介到專門 Agent。\n4. 編碼皆為 UTF-8(CSV 為 UTF-8 BOM)。\n\n### 2. 確認權限與工作室\n\n- 在 EgentHub 後台建立或選擇對應的工作室（例如：人資、品保、業務 BU）。\n- 確認您的角色為「工作室管理員」或「開發者」，才能建立 Agent 與上傳 KB。\n- 確認工作室點數額度足夠（建議至少預留一個月用量緩衝）。\n\n---\n\n## 二、在 EgentHub 建立 Agent\n\n### Step 1：建立 Agent 並選擇模型\n登入 EgentHub 後台 → 選擇工作室 → 「建立 Agent」 →\n- Agent 名稱：企業知識總管(畢業作品)\n- 預設模型：建議 Claude Sonnet 或 Gemini Pro\n- 描述：（複製需求盤點檔案中第一段「角色定位」）\n\n### Step 2：貼入 Prompt Designer 產出的提示詞\n將 Prompt Designer 產出的提示詞完整複製貼上，注意保留「問答指引」段落不要修改。\n\n### Step 3：上傳知識庫\n1. 進入 Agent 編輯頁。\n2. **上傳向量 KB**:「向量知識庫」 → 上傳 制度與SOP.txt\n3. **上傳表格 KB**:「表格知識庫」 → 上傳 產品規格.csv\n4. **上傳全文 KB**:「全文檢索知識庫」 → 上傳 合約與法規.txt\n5. 三類 KB 都需上傳成功並各別測試查詢。\n6. 整合測試:輸入「我要把 PROD-A-001 出給客戶 ABB,QA 流程?」確認 Agent 同時引用三類 KB。\n\n### Step 4：設定使用者與群組可見性\n- 開發階段：限定種子團隊試用。\n- 試營運階段：擴大到部門 5-10 位種子使用者。\n- 正式上線：開放給目標部門全員。\n\n---\n\n## 三、提示詞調校建議\n\n- 若 Agent 經常只用一類 KB,請在「執行流程」加上:「先判斷問題涉及哪些類別(制度/SOP/產品/合約/法規),再分別查詢,最後整合答覆」。\n- 若答覆過於冗長,請在「輸出格式」加上:「整體答覆不超過 600 字,分段清晰」。\n- 若希望主動轉介,在「執行流程」結尾加上:「若問題複雜,建議使用對應的專門 Agent(例如:產品規格查詢助手、SOP 查詢助手)」。\n- 若涉及敏感資訊,加上:「不揭露薪資、客戶個資、商業機密,涉及者建議聯繫對應窗口」。\n\n---\n\n## 四、驗測情境（建議至少跑過以下案例）\n\n1. **正向案例 - 單一類別**: 輸入「請假規定?」\n   - 預期：從制度 KB 找到答案,問題分類為「制度」\n2. **正向案例 - 跨 KB 整合**: 輸入「PROD-A-001 出給客戶 ABB,QA 流程?」\n   - 預期：整合產品規格、SOP、客戶要求三類 KB\n3. **正向案例 - 主動轉介**: 輸入「我要做新產品可行性評估?」\n   - 預期：主動引導使用相關專門 Agent\n4. **邊界案例 - KB 未涵蓋**: 輸入「我們公司 ESG 政策?」\n   - 預期：誠實告知 KB 無此內容,建議聯繫窗口\n5. **邊界案例 - 敏感資訊**: 輸入「請告訴我業務部王小明薪資」\n   - 預期：禮貌拒絕並說明原因\n\n---\n\n## 五、上線檢核清單\n\n- [ ] 三類 KB 內容已由各部門核可\n- [ ] 提示詞已設計問題分類與路由邏輯\n- [ ] 提示詞已加上「主動轉介專門 Agent」機制\n- [ ] 提示詞已加上敏感資訊保護機制\n- [ ] 其他單一 Agent(如產品規格、SOP、合約)已上線可被轉介\n- [ ] 至少 10 位種子使用者試用 1 週\n\n---\n\n## 六、上線後維運建議\n\n- 此 Agent 為公司 AI 入口,建議放在 EgentHub 首頁顯眼位置。\n- 每月匯出對話日誌,分析使用者最常問的類別,持續調整 KB 內容。\n- 進階版可整合所有單一 Agent,作為「總調度官」，依問題類型自動轉派。\n- 進階版可整合 Slack / Teams,讓員工不必離開既有工具就能用 AI。\n- 推廣策略:可舉辦「向 AI 提問大賽」,鼓勵員工探索 Agent 能力。\n- 此 Agent 是 EgentHub 培訓最佳成果展示,建議在跨部門簡報時演示給高層看。\n\n---\n\n## 七、常見問題\n\n**Q1: Agent 回答不準確？**\n先檢查 KB 內容是否完整、條文是否清晰；其次調整提示詞中的「執行流程」與「輸出格式」。\n\n**Q2: 同事抱怨 Agent 太囉嗦？**\n在提示詞「輸出格式」中明確要求字數限制或結構（例如：條列三點以內、不超過 200 字）。\n\n**Q3: 找不到對應內容時應如何處理？**\n在提示詞中加上：「若知識庫中無法找到答案，請明確回覆『此問題未在現有資料中，建議您聯繫 [窗口] 進一步確認』，切勿自行推測。」\n\n---\n\n如有導入問題請聯繫精誠資訊 EgentHub 顧問團隊。\n"}], "appendix_files": [{"company": "致伸科技", "name": "致伸科技_AI_Agent_導入策略規劃報告.pdf", "rel_path": "附錄_48家客戶提案/致伸科技_AI_Agent_導入策略規劃報告.pdf", "size_kb": 643, "industry": "電子代工/ODM", "attendee": 1, "headcount": 9300, "capital": 45.0}, {"company": "億光電子工業股份有限公司", "name": "億光電子工業股份有限公司_AI_Agent_導入策略規劃報告.pdf", "rel_path": "附錄_48家客戶提案/億光電子工業股份有限公司_AI_Agent_導入策略規劃報告.pdf", "size_kb": 488, "industry": "LED/光電", "attendee": 1, "headcount": 5000, "capital": 44.0}, {"company": "栢能科技有限公司", "name": "栢能科技有限公司_AI_Agent_導入策略規劃報告.pdf", "rel_path": "附錄_48家客戶提案/栢能科技有限公司_AI_Agent_導入策略規劃報告.pdf", "size_kb": 458, "industry": "顯卡/EMS", "attendee": 1, "headcount": 5000, "capital": 1.0}, {"company": "士林電機廠股份有限公司", "name": "士林電機廠股份有限公司_AI_Agent_導入策略規劃報告.pdf", "rel_path": "附錄_48家客戶提案/士林電機廠股份有限公司_AI_Agent_導入策略規劃報告.pdf", "size_kb": 523, "industry": "電機/重電", "attendee": 3, "headcount": 4000, "capital": 58.0}, {"company": "中國砂輪股份有限公司", "name": "中國砂輪股份有限公司_AI_Agent_導入策略規劃報告.pdf", "rel_path": "附錄_48家客戶提案/中國砂輪股份有限公司_AI_Agent_導入策略規劃報告.pdf", "size_kb": 448, "industry": "精密研磨/半導體耗材", "attendee": 3, "hea const STATE_KEY = "egenthub_training_v2";
function loadState() {
  try { return JSON.parse(localStorage.getItem(STATE_KEY)) || { completed: {} }; }
  catch (e) { return { completed: {} }; }
}
function saveState(state) {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch (e) {}
}
let state = loadState();

function escapeHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

function topicIndex(t) { return DATA.topics.indexOf(t); }

function renderNav() {

    bHtml += `<div class="nav-item beginner ${completed ? 'completed' : ''}" data-idx="${i}">
      <div class="nav-num"><span>${num}</span></div>
      <div class="nav-text">${escapeHtml(t.agent_name)}</div>
    </div>`;
  });
  document.getElementById("nav-beginner").innerHTML = bHtml;

  // Main

  document.getElementById("nav-appendix").innerHTML = aHtml;

  // Bind clicks
  document.querySelectorAll(".nav-item[data-idx]").forEach(el => {
    el.addEventListener("click", () => showTopic(parseInt(el.dataset.idx)));
  });
  document.querySelector('[data-page="appendix"]').addEventListener("click", showAppendix);
}

function isTopicComplete(idx) {
  const c = state.completed[idx] || {};
  return [1, 2, 3, 4, 5].every(s => c[s]);
}

function updateProgress() {
  const completed = DATA.topics.filter((_, i) => isTopicComplete(i)).length;
  const total = DATA.topics.length;
  document.getElementById("progress-fill").style.width = `${(completed / total) * 100}%`;
  document.getElementById("progress-text").textContent = `${completed} / ${total} 完成`;
  renderNav();
}

function setActiveNav(page, idx) {
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  if (page === "overview") {
    document.querySelector('[data-page="overview"]')?.classList.add("active");
  } else if (page === "appendix") {
    document.querySelector('[data-page="appendix"]')?.classList.add("active");
  } else {
    document.querySelector(`[data-idx="${idx}"]`)?.classList.add("active");
  }
}

  const num = String(t.order).padStart(2, "0");
  const isBeginner = t.track === "beginner";
  const c = document.getElementById("content");

  // KB downloads — text files (embedded base64)
  let kbDownloadsHtml = "";
  Object.entries(t.kb_text_files).forEach(([name, content]) => {
    const isCSV = name.endsWith(".csv");
    const ext = isCSV ? "csv" : "txt";
    kbDownloadsHtml += `<button class="btn secondary" onclick="downloadFile('${name}', \`${btoa(unescape(encodeURIComponent(content)))}\`, '${ext}')">
      <span>⬇</span> 下載 ${escapeHtml(name)}
    </button>`;
  });

  // Binary files (PDF/images via relative path)
  let binaryDownloadsHtml = "";
  t.binary_files.forEach(bf => {
    binaryDownloadsHtml += `<a class="btn secondary" href="${escapeHtml(bf.rel_path)}" download="${escapeHtml(bf.name)}" target="_blank">
      <span>📄</span> 下載 ${escapeHtml(bf.name)} (${bf.size_kb} KB)
    </a>`;
  });

  // KB previews (text only)
  let kbPreviewsHtml = "";
  Object.entries(t.kb_text_files).forEach(([name, content]) => {
    const preview = content.length > 2000 ? content.slice(0, 2000) + "\n\n... (僅顯示前 2000 字,完整內容請下載)" : content;
    kbPreviewsHtml += `<h3>${escapeHtml(name)}</h3>
      <div class="code-block compact">${escapeHtml(preview)}</div>`;
  });

  const numLabel = isBeginner ? `入門 ${num}` : `題目 ${num}`;
  const badgeClass = isBeginner ? "badge beginner" : "badge";

  const kbStepBody = (Object.keys(t.kb_text_files).length === 0 && t.binary_files.length === 0)
    ? `<p><em>本題目無需知識庫,純提示工程即可。</em></p>`
    : `<p>本題目的測試素材如下,請<strong>下載</strong>後上傳到 EgentHub Agent:</p>
       <div class="btn-row">${kbDownloadsHtml}${binaryDownloadsHtml}</div>
       <p style="font-size:13px; color:${'#6b7280'};">📍 路徑:Agent 編輯頁 → 知識庫設定 → 對應 KB 類型 → 上傳</p>
       ${Object.keys(t.kb_text_files).length > 0 ? `<details style="margin-top:16px;"><summary style="cursor:pointer; color:${'#7456a8'};">預覽知識庫文字內容</summary>${kbPreviewsHtml}</details>` : ''}`;

  c.innerHTML = `
    <div class="topic-meta">
      <span class="topic-num">${numLabel}</span>
      <span class="${badgeClass}">${escapeHtml(t.kb_label)}</span>
    </div>
    <h1>${escapeHtml(t.agent_name)}</h1>

    <div class="info-grid">
      <div class="info-card">
        <div class="label">類型</div>
        <div class="value">${escapeHtml(t.kb_label)}</div>
      </div>
      <div class="info-card">
        <div class="label">素材檔案</div>
        <div class="value">${Object.keys(t.kb_text_files).length + t.binary_files.length} 份</div>
      </div>
      <div class="info-card">
        <div class="label">建議授課時間</div>
        <div class="value">${isBeginner ? '20-40' : '30-45'} 分鐘</div>
      </div>
    </div>

    ${renderStep(idx, 1, "閱讀並複製『需求描述』內容",
      `<p>把以下需求描述<strong>整段複製</strong>,貼入 EgentHub <strong>Prompt Designer</strong> 的「需求描述」欄位。系統會引導您逐步產出 Agent Prompt。</p>
      <div class="btn-row">
        <button class="btn" onclick="copyToClipboard(${idx}, 'prompt')">📋 一鍵複製需求描述</button>
        <button class="btn secondary" onclick="toggleSection('prompt-${idx}')">展開 / 收合</button>
      </div>
      <div class="code-block" id="prompt-${idx}">${escapeHtml(t.prompt_input)}</div>
      <p style="font-size:13px; color:${'#6b7280'}; margin-top:8px;">📍 路徑:EgentHub 後台 → 工作室 → 建立 Agent → Prompt Designer → 貼上「需求描述」</p>`
    )}

    ${renderStep(idx, 2, "下載並上傳測試素材", kbStepBody)}

    ${renderStep(idx, 3, "在 EgentHub 建立 Agent",
      `<ol>
        <li>登入 <strong>EgentHub</strong> 後台。</li>
        <li>選擇對應工作室。</li>
        <li>點選「<strong>建立 Agent</strong>」。</li>
        <li>輸入 Agent 名稱:<code>${escapeHtml(t.agent_name)}</code></li>
        <li>選擇預設模型:${isBeginner ? '<strong>必須選擇支援 Vision 的模型</strong>(Claude Sonnet 或 Gemini Pro)' : '<strong>Claude Sonnet</strong>(建議)或 <strong>Gemini Pro</strong>'}</li>
        <li>把步驟 1 中 Prompt Designer 產出的提示詞,<strong>完整貼入</strong>「系統提示詞」欄位。</li>
        <li>${(Object.keys(t.kb_text_files).length + t.binary_files.length) > 0 ? '上傳步驟 2 的知識庫檔案。' : '本題無 KB,跳過此步。'}</li>
        <li>${isBeginner ? '<strong>啟用「附件閱讀」功能</strong>,讓使用者可上傳圖片或 PDF。' : ''}</li>
        <li>儲存設定。</li>
      </ol>
      <p style="background:#fef3c7; padding:12px; border-radius:8px; font-size:13px;">
        ⚠️ <strong>重要</strong>:保留 Prompt 中的「問答指引」段落不要刪除,這是合規與安全的重要保護機制。
      </p>`
    )}

    ${renderStep(idx, 4, "依驗測情境測試 Agent",
      `<p>從正式上線指南中的<strong>驗測情境</strong>逐一測試,確認 Agent 行為符合預期:</p>
      <div class="btn-row">
        <button class="btn secondary" onclick="toggleSection('deploy-${idx}')">展開完整上線指南</button>
      </div>
      <div class="code-block" id="deploy-${idx}" style="display:none;">${escapeHtml(t.deploy_text)}</div>
      <p style="font-size:13px; color:${'#6b7280'}; margin-top:8px;">建議至少跑過 4 個案例:1 個正向典型、1 個邊界(KB 未涵蓋)、1 個敏感(驗證安全機制)、1 個複雜整合。</p>
      <p style="font-size:13px; color:${'#6b7280'};">若回應不準確,調整提示詞中的「執行流程」或「輸出格式」段落。</p>`
    )}

    ${renderStep(idx, 5, "完成上線檢核並推廣",
      `<p>確認以下檢核清單後,即可正式對使用者開放:</p>
      <ul>
        <li>✅ 知識庫內容已由業務窗口確認最新版本</li>
        <li>✅ 提示詞已加上「找不到答案請洽窗口」的保護機制</li>
        <li>✅ 至少 3-5 位種子使用者試用 1 週</li>
        <li>✅ 主管已正式核可 Agent 內容</li>
        <li>✅ 已建立 KB 同步更新機制</li>
      </ul>
      <p>完整上線指南請參考步驟 4 中的展開內容(含維運建議與常見問題)。</p>
      <div class="btn-row">
        <button class="btn" onclick="copyToClipboard(${idx}, 'deploy')">📋 複製完整上線指南</button>
      </div>`
    )}

    <div style="display:flex; justify-content:space-between; margin-top:32px;">
      ${idx > 0 ? `<button class="btn secondary" onclick="showTopic(${idx - 1})">← 上一題</button>` : '<div></div>'}
      ${idx < DATA.topics.length - 1 ? `<button class="btn" onclick="showTopic(${idx + 1})">下一題 →</button>` : `<button class="btn success" onclick="showOverview()">回到總覽 ✓</button>`}
    </div>
  `;

  document.querySelectorAll(".step-header").forEach(h => {
    h.addEventListener("click", e => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "LABEL") return;
      h.parentElement.classList.toggle("collapsed");
    });
  });

  for (let s = 1; s <= 5; s++) {
    const cb = document.getElementById(`step-${idx}-${s}`);
    if (cb) {
      cb.checked = !!(state.completed[idx] && state.completed[idx][s]);
      if (cb.checked) cb.closest(".step").classList.add("completed");
      cb.addEventListener("change", () => {
        state.completed[idx] = state.completed[idx] || {};
        state.completed[idx][s] = cb.checked;
        saveState(state);
        cb.closest(".step").classList.toggle("completed", cb.checked);
        updateProgress();
      });
    }
  }

  window.scrollTo(0, 0);
}

function showAppendix() {
  setActiveNav("appendix");
  const c = document.getElementById("content");

  // Files already pre-sorted by attendee count (desc) on the Python side
  const allFiles = DATA.appendix_files;

  const tableHtml = `<table class="appendix-table">
    <thead>
      <tr>
        <th style="width:50%;">公司名稱</th>
        <th style="width:30%;">產業類別</th>
        <th style="width:20%;">下載</th>
      </tr>
    </thead>
    <tbody>
      ${allFiles.map(f => `<tr>
        <td>${escapeHtml(f.company)}</td>
        <td><span class="badge">${escapeHtml(f.industry)}</span></td>
        <td><a class="btn" href="${escapeHtml(f.rel_path)}" target="_blank" style="padding:4px 10px; font-size:12px;">📄 開啟 PDF</a></td>
      </tr>`).join("")}
    </tbody>
  </table>`;

  c.innerHTML = `
    <div class="topic-meta">
      <span class="topic-num">附錄</span>
      <span class="badge">策略規劃報告</span>
    </div>
    <h1>策略規劃報告</h1>
    <p style="color:${'#1f2937'};">以下為 EgentHub 團隊提供給學員公司的 AI Agent 導入策略規劃報告。</p>
    <p style="color:${'#6b7280'}; font-size:14px;">每份報告皆採用本教學包中的方法論架構,可作為您日後撰寫客戶提案的參考範例。報告語言為繁體中文。</p>

    <div class="filter-bar">
      <input type="text" id="appendix-filter" placeholder="🔍 搜尋公司名稱或產業..." onkeyup="filterAppendix()">
      <span style="color:${'#6b7280'}; font-size:13px;">共 ${allFiles.length} 份報告</span>
    </div>

    <div id="appendix-content">
      ${tableHtml}
    </div>

    <p style="margin-top:32px; padding:12px 16px; background:${'#e8def8'}40; border-radius:8px; font-size:14px;">
      <strong>更新提醒</strong>:報告產出於 2026/05,使用前請確認資訊時效性,並依實際情境訪談調整。
    </p>
  `;

  window.scrollTo(0, 0);
}

function filterAppendix() {
  const q = document.getElementById("appendix-filter").value.toLowerCase().trim();
  document.querySelectorAll(".appendix-table tbody tr").forEach(tr => {
    if (!q) {
      tr.style.display = "";
      return;
    }
    const text = tr.textContent.toLowerCase();
    tr.style.display = text.includes(q) ? "" : "none";
  });
}

function renderStep(idx, num, title, body) {
  return `<div class="step">
    <div class="step-header">
      <div class="step-num">${num}</div>
      <div class="step-title">${title}</div>
      <div class="step-toggle">▼</div>
    </div>
    <div class="step-content">
      ${body}
      <div class="mark-complete">
        <input type="checkbox" id="step-${idx}-${num}">
        <label for="step-${idx}-${num}">標記此步驟已完成</label>
      </div>
    </div>
  </div>`;
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = (el.style.display === "none" ? "block" : "none");
}

function copyToClipboard(idx, type) {
  const t = DATA.topics[idx];
  const text = type === "prompt" ? t.prompt_input : t.deploy_text;
  navigator.clipboard.writeText(text).then(() => {
    showToast(type === "prompt" ? "已複製需求描述！可貼入 Prompt Designer" : "已複製上線指南");
  }).catch(() => {
    showToast("複製失敗,請手動選取文字");
  });
}

function downloadFile(filename, b64Content, ext) {
  const utf8 = decodeURIComponent(escape(atob(b64Content)));
  const finalBlob = ext === "csv"
    ? new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), utf8], { type: "text/csv;charset=utf-8" })
    : new Blob([utf8], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(finalBlob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast(`已下載 ${filename}`);
}

function resetProgress() {
  if (!confirm("確定要重設所有學習進度嗎？")) return;
  state = { completed: {} };
  saveState(state);
  updateProgress();
  showToast("已重設進度");
  showOverview();
}

document.querySelector('[data-page="overview"]').addEventListener("click", showOverview);
renderNav();
updateProgress();
showOverview();
</script>
</body>
